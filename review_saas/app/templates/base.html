<!-- filename: review_saas/app/templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}Review Intel AI{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    {% block styles %}{% endblock %}
</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->
    <nav class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center">
        <h1 class="text-lg font-semibold">Review Intel AI</h1>

        {% set user = request.session.get("user") %}
        {% if user %}
        <div class="flex items-center gap-4">
            <span class="text-sm">
                {{ user["name"] }}
            </span>
            <a href="/logout" class="bg-white text-indigo-600 px-3 py-1 rounded hover:bg-gray-100">
                Logout
            </a>
        </div>
        {% endif %}
    </nav>

    <!-- MAIN CONTENT -->
    <main class="p-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center text-gray-500 text-sm mt-10 mb-4">
        © 2026 Review Intel AI. All rights reserved.
    </footer>

    {% block scripts %}{% endblock %}

</body>
</html>
