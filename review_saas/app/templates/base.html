<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ReviewIQ | Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root { --brand: #4f46e5; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    .navbar { backdrop-filter: blur(10px); background: rgba(255,255,255,0.8); border-bottom: 1px solid #e2e8f0; }
    .navbar-brand { font-weight: 800; color: var(--brand)!important; }
    .btn-brand { background: var(--brand); color: #fff; border: none; font-weight: 600; }
    .hero { background: radial-gradient(circle at top left, rgba(79,70,229,0.05), transparent); padding: 80px 0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">Review<span class="text-primary">IQ</span></a>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        </ul>
        <div class="d-flex gap-2">
          {% if current_user %}<a class="btn btn-outline-primary" href="/logout">Logout</a>
          {% else %}<button class="btn btn-brand" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>{% endif %}
        </div>
      </div>
    </div>
  </nav>
  {% if request and request.url.path == '/' %}<div class="hero container text-center"><h1>Master Your Reputation.</h1></div>{% endif %}
  <main class="py-5"><div class="container">{% block content %}{% endblock %}</div></main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
