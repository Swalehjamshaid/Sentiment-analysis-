<!-- filename: templates/base.html -->
<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ReviewSaaS{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="/static/vendor/bootstrap-5.3.3.min.css" rel="stylesheet"
        onerror="this.href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css'">

  <!-- App styles -->
  <style>
    body { background: var(--bs-body-bg); }
    .brand-title { font-weight: 800; letter-spacing: .2px; }
    .card-kpi {
      border-radius: 14px;
      border: 1px solid rgba(125,125,125,.15);
      background: var(--bs-body-bg);
    }
    .form-panel {
      border-radius: 14px;
      border: 1px solid rgba(125,125,125,.15);
      background: var(--bs-body-bg);
      padding: 1.25rem;
    }
    .hero {
      background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(59,130,246,.08));
      border: 1px solid rgba(125,125,125,.15);
      border-radius: 16px;
      padding: 2rem;
    }
    .empty { color: var(--bs-secondary-color); font-style: italic; }
    .theme-toggle { border: 1px solid rgba(125,125,125,.25); }
  </style>

  {% block head_extra %}{% endblock %}
</head>
<body>
  <!-- Top Nav -->
  <nav class="navbar navbar-expand-lg border-bottom" style="backdrop-filter: blur(6px);">
    <div class="container-fluid">
      <a class="navbar-brand brand-title" href="/dashboard?show=about">ReviewSaaS</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <a class="btn btn-sm btn-outline-primary" href="/dashboard?show=register">Register</a>
        <a class="btn btn-sm btn-success" href="/dashboard?show=login">Login</a>
        <button id="themeToggle" class="btn btn-sm theme-toggle" type="button" title="Toggle theme">🌓</button>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Bootstrap bundle -->
  <script src="/static/vendor/bootstrap.bundle-5.3.3.min.js"
          onerror="this.src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'"></script>

  <!-- Chart.js -->
  <script src="/static/vendor/chart.umd-4.4.1.min.js"
          onerror="this.src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'"></script>

  <!-- Global helpers -->
  <script>
    // Dark/Light theme toggle with persistence
    (function () {
      const html = document.documentElement;
      const key = "theme";
      const saved = localStorage.getItem(key);
      if (saved) html.setAttribute("data-bs-theme", saved);
      document.getElementById("themeToggle")?.addEventListener("click", () => {
        const current = html.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
        html.setAttribute("data-bs-theme", current);
        localStorage.setItem(key, current);
      });
    })();
  </script>

  {% block scripts_extra %}{% endblock %}
</body>
</html>
