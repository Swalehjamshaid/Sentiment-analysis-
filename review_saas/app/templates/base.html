<!DOCTYPE html>
<html lang="en" class="scroll-smooth" x-data="{
  darkMode: localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches),
  toggleDark() { this.darkMode = !this.darkMode; localStorage.setItem('darkMode', this.darkMode); },
  init() { if(this.darkMode) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); this.$watch('darkMode', val => { if(val) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }); }
}" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BizChat Dashboard{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { accent: '#7c3aed', accentdark: '#6d28d9', card: 'rgba(30,41,59,0.6)' } } }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 min-h-screen font-sans antialiased">

  <!-- Header -->
  {% block header %}
  <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-4">
          <span class="text-2xl font-bold bg-gradient-to-r from-violet-400 to-accent bg-clip-text text-transparent">BizChat</span>
          <span class="text-sm text-slate-400">Review Intelligence Platform</span>
        </div>
        <div class="flex items-center gap-5">
          <button @click="toggleDark()" class="p-2 rounded-full hover:bg-slate-800 transition">
            <template x-if="darkMode">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
              </svg>
            </template>
            <template x-if="!darkMode">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
              </svg>
            </template>
          </button>

          <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" class="flex items-center gap-3 hover:opacity-90 transition">
              <div class="w-9 h-9 rounded-full bg-gradient-to-br from-violet-500 to-accent flex items-center justify-center font-semibold">RJ</div>
              <span class="hidden md:inline font-medium">Rai Jamshaid</span>
            </button>
            <div x-show="open" @click.away="open = false" class="absolute right-0 mt-3 w-56 bg-slate-800 border border-slate-700 rounded-xl shadow-2xl py-2 z-50">
              <a href="#" class="block px-5 py-2.5 hover:bg-slate-700/70 transition">Profile</a>
              <a href="#" class="block px-5 py-2.5 hover:bg-slate-700/70 transition">Settings</a>
              <hr class="my-2 border-slate-700"/>
              <a href="#" class="block px-5 py-2.5 text-rose-400 hover:bg-rose-950/30 transition">Sign out</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
  {% endblock %}

  <!-- Main Content -->
  <main class="flex-grow py-10 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
