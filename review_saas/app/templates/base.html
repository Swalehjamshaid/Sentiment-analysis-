<!-- filename: templates/base.html -->
<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ReviewSaaS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: var(--bs-body-bg); }
    .brand-title { font-weight: 800; letter-spacing: .2px; }
    .card-kpi { border-radius: 14px; border: 1px solid rgba(125,125,125,.15); background: var(--bs-body-bg); }
    .form-panel { border-radius: 14px; border: 1px solid rgba(125,125,125,.15); background: var(--bs-body-bg); padding: 1.25rem; }
    .hero { background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(59,130,246,.08)); border: 1px solid rgba(125,125,125,.15); border-radius: 16px; padding: 2rem; }
    .empty { color: var(--bs-secondary-color); font-style: italic; }
    .theme-toggle { border: 1px solid rgba(125,125,125,.25); }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg border-bottom" style="backdrop-filter: blur(6px);">
    <div class="container-fluid">
      <a class="navbar-brand brand-title" href="/dashboard?show=about">ReviewSaaS</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
      <div id="navMain" class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/dashboard?show=about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="/dashboard?show=register">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="/dashboard?show=login">Login</a></li>
        </ul>
        <div class="ms-2">
          <button id="themeToggle" class="btn btn-sm theme-toggle" type="button" title="Toggle theme">🌓</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function(){
      const html = document.documentElement; const key='theme';
      const saved = localStorage.getItem(key); if(saved) html.setAttribute('data-bs-theme', saved);
      document.getElementById('themeToggle')?.addEventListener('click', ()=>{
        const cur = html.getAttribute('data-bs-theme')==='dark'?'light':'dark';
        html.setAttribute('data-bs-theme', cur); localStorage.setItem(key, cur);
      });
    })();
  </script>
  {% block scripts_extra %}{% endblock %}
</body>
</html>
