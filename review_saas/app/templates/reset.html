
{% extends 'base.html' %}
{% block content %}
<h2>Reset Password</h2>
<form method="post" action="/auth/password/reset" class="mt-3" style="max-width:520px">
  <div class="mb-3"><label>New Password</label><input name="password" type="password" class="form-control" required /></div>
  <div class="mb-3"><label>Confirm Password</label><input name="password2" type="password" class="form-control" required /></div>
  <button class="btn btn-primary">Update</button>
</form>
{% endblock %}
