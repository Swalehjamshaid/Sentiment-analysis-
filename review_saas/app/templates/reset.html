{% extends 'base.html' %}
{% block content %}
<h2>Password Reset</h2>
<form method="post" action="/auth/reset/request" class="mt-3" style="max-width:420px">
  <div class="mb-3">
    <label>Email</label>
    <input name="email" type="email" class="form-control" required />
  </div>
  <button class="btn btn-primary">Send reset link</button>
</form>
{% endblock %}
