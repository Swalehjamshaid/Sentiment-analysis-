
<!-- filename: app/templates/reset.html -->
<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset — ReviewSaaS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="bg-light"><div class="container py-5">
  <div class="row justify-content-center"><div class="col-md-6">
    <div class="card shadow-sm"><div class="card-body">
      <h5>Reset password</h5>
      <form method="post" action="/reset">
        <input type="hidden" name="token" value="{{ token }}">
        <div class="mb-3"><label class="form-label">New Password</label><input class="form-control" type="password" name="password" required></div>
        <button class="btn btn-primary w-100">Reset</button>
      </form>
    </div></div>
  </div></div>
</div></body></html>
