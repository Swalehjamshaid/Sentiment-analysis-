<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <form class="needs-validation" method="POST" action="/login" novalidate>
        <div class="modal-header border-bottom-0">
          <h5 class="modal-title fw-bold" id="loginModalLabel">Login to <span class="text-primary">ReviewIQ</span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label for="loginEmail" class="form-label small fw-bold">Email Address</label>
            <input type="email" class="form-control form-control-lg" id="loginEmail" name="email" placeholder="name@company.com" required>
          </div>
          <div class="mb-3">
            <label for="loginPassword" class="form-label small fw-bold">Password</label>
            <input type="password" class="form-control form-control-lg" id="loginPassword" name="password" required>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
              <label class="form-check-label small" for="rememberMe">Remember me</label>
            </div>
            <a href="/reset-password" class="small text-decoration-none">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-brand btn-lg w-100 shadow-sm">Sign In</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <form class="needs-validation" method="POST" action="/register" novalidate>
        <div class="modal-header border-bottom-0">
          <h5 class="modal-title fw-bold" id="registerModalLabel">Create Account</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label for="regFullName" class="form-label small fw-bold">Full Name</label>
            <input type="text" class="form-control form-control-lg" id="regFullName" name="full_name" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label for="regEmail" class="form-label small fw-bold">Business Email</label>
            <input type="email" class="form-control form-control-lg" id="regEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label for="regPassword" class="form-label small fw-bold">Password</label>
            <input type="password" class="form-control form-control-lg" id="regPassword" name="password" required>
            <div class="strength mt-2">
                <div id="pwBar"></div>
            </div>
            <div class="form-hint mt-1">Use 8+ characters with a mix of letters, numbers & symbols.</div>
          </div>
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
            <label class="form-check-label small" for="termsCheck">
              I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a>.
            </label>
          </div>
          <button type="submit" class="btn btn-brand btn-lg w-100 shadow-sm">Start Free Trial</button>
        </div>
      </form>
    </div>
  </div>
</div>
