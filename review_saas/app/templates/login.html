
<!-- filename: app/templates/login.html -->
<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — ReviewSaaS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="bg-light"><div class="container py-5">
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card shadow-sm"><div class="card-body">
    <h4>Welcome back</h4>
    <form method="post" action="/login">
      <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
      <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
      <div class="d-grid"><button class="btn btn-primary">Login</button></div>
      <div class="text-center small mt-2"><a href="/forgot">Forgot password?</a></div>
    </form>
  </div></div>
</div></div>
</body></html>
