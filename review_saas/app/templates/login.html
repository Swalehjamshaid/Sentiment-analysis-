<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 0% 0%, #4338ca, transparent 40%),
                        radial-gradient(circle at 100% 100%, #6d28d9, transparent 40%),
                        #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            outline: none;
        }

        /* Smooth button hover effect */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="p-4 md:p-6">

<div class="w-full max-w-md">
    <div class="login-card rounded-[2.5rem] p-8 md:p-12">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600/20 rounded-2xl mb-6 border border-indigo-500/30">
                <i class="fas fa-fingerprint text-3xl text-indigo-400"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Welcome Back</h1>
            <p class="text-indigo-200/40 text-sm mt-2 font-medium">Please enter your details to sign in</p>
        </div>

        {% if msg %}
        <div class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl flex items-center text-emerald-400 text-sm">
            <i class="fas fa-check-circle mr-3"></i>
            <span>{{ msg }}</span>
        </div>
        {% endif %}

        {% if error %}
        <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-2xl flex items-center text-rose-400 text-sm">
            <i class="fas fa-circle-exclamation mr-3"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/auth/login" method="POST" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-indigo-300/70 uppercase tracking-[0.15em] ml-1">Email Address</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-indigo-300/30 group-focus-within:text-indigo-400 transition-colors">
                        <i class="fas fa-at"></i>
                    </span>
                    <input type="email" name="username" required
                        class="form-input block w-full pl-11 pr-4 py-4 rounded-2xl text-white placeholder-indigo-300/20"
                        placeholder="huda@company.com">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center ml-1">
                    <label class="text-xs font-bold text-indigo-300/70 uppercase tracking-[0.15em]">Password</label>
                    <a href="/forgot-password" class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 uppercase tracking-widest">Forgot?</a>
                </div>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-indigo-300/30 group-focus-within:text-indigo-400 transition-colors">
                        <i class="fas fa-key"></i>
                    </span>
                    <input type="password" name="password" required
                        class="form-input block w-full pl-11 pr-4 py-4 rounded-2xl text-white placeholder-indigo-300/20"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="btn-primary w-full py-4 px-6 text-white font-bold rounded-2xl shadow-lg mt-4 text-sm tracking-wide">
                Secure Sign In
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-transparent px-4 text-indigo-300/20 font-bold tracking-widest">or</span></div>
        </div>

        <div class="text-center">
            <p class="text-indigo-200/40 text-sm font-medium">
                Don't have an account? 
                <a href="/register" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors ml-1 border-b border-indigo-400/30">Create one now</a>
            </p>
        </div>
    </div>

    <div class="mt-10 flex flex-col items-center justify-center space-y-2 opacity-30">
        <div class="flex items-center space-x-3">
            <i class="fas fa-lock text-[10px] text-white"></i>
            <span class="text-white text-[10px] font-bold uppercase tracking-[0.2em]">End-to-End Encrypted</span>
        </div>
        <p class="text-white text-[9px] font-medium tracking-tighter">© 2026 {{ title }} SaaS Production Environment</p>
    </div>
</div>

</body>
</html>
