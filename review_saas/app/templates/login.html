
{% extends 'base.html' %}
{% block content %}
<h2>Login</h2>
<form method="post" action="/auth/token" class="mt-3" style="max-width:420px">
  <div class="mb-3"><label>Email</label><input name="email" type="email" class="form-control" required /></div>
  <div class="mb-3"><label>Password</label><input name="password" type="password" class="form-control" required /></div>
  <button class="btn btn-primary">Login</button>
  <a class="btn btn-outline-secondary" href="/auth/google/login">Login with Google</a>
</form>
{% endblock %}
