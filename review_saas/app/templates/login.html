<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Review Intel AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-grad: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); --dark-sidebar: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1e293b; min-height: 100vh; margin: 0; }
        .sidebar { background: var(--dark-sidebar); min-height: 100vh; position: fixed; width: 260px; padding: 2rem 1.5rem; transition: all 0.3s; z-index: 1000; }
        .main-wrapper { margin-left: 260px; padding: 2rem; transition: all 0.3s; }
        .nav-link { color: #94a3b8; padding: 0.8rem 1rem; border-radius: 12px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }
        .glass-card { background: white; border: none; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); }
        @media (max-width: 992px) { .sidebar { width: 0; padding: 0; overflow: hidden; } .main-wrapper { margin-left: 0; } }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% if request.session.get('user') %}
    <div class="sidebar">
        <div class="mb-5 d-flex align-items-center gap-2 px-2">
            <i class="bi bi-robot fs-2 text-primary"></i>
            <span class="fs-4 fw-800 text-white letter-spacing-1">Review Intel</span>
        </div>
        <ul class="nav flex-column">
            <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/dashboard"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <a class="nav-link {% if active_page == 'companies' %}active{% endif %}" href="/api/companies"><i class="bi bi-building"></i> Businesses</a>
            <hr class="text-white opacity-10">
            <a class="nav-link text-danger mt-auto" href="/logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </ul>
    </div>
    {% endif %}

    <div class="{% if request.session.get('user') %}main-wrapper{% endif %}">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
