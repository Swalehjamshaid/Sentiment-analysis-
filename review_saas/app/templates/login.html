<!-- filename: review_saas/app/templates/login.html -->
{% extends "base.html" %}

{% block title %}Login | Review Intel AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white shadow-lg rounded-lg p-6">
    <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">Welcome Back</h1>

    {% if error %}
    <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="post" class="space-y-4">
        <!-- Email Input -->
        <div>
            <label for="email" class="block text-gray-700 font-medium mb-1">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="you@example.com"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <!-- Password Input -->
        <div>
            <label for="password" class="block text-gray-700 font-medium mb-1">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="********"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <!-- Magic Link Option -->
        <div class="flex items-center justify-between text-sm">
            <label class="inline-flex items-center">
                <input type="checkbox" name="magic_link" class="form-checkbox text-indigo-600">
                <span class="ml-2 text-gray-600">Send me a magic link instead</span>
            </label>
            <a href="#" class="text-indigo-500 hover:underline">Need help?</a>
        </div>

        <!-- Submit Button -->
        <div>
            <button
                type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
            >
                Log In
            </button>
        </div>
    </form>

    <p class="mt-6 text-center text-gray-500 text-sm">
        Don’t have an account?
        <a href="/register" class="text-indigo-500 hover:underline">Sign up</a>
    </p>
</div>
{% endblock %}
