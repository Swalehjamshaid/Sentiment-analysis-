{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center animate-fadeIn">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock text-warning display-4"></i>
            <h2 class="fw-800 text-dark mt-2">System Access</h2>
            <p class="text-muted small">Enter your credentials to manage Project 1 & 2</p>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-2">
            <div class="card-body p-4">
                
                {% if error %}
                <div class="alert alert-danger border-0 small rounded-3 mb-4">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>
                {% endif %}

                <form method="post" action="/login">
                    <div class="mb-4">
                        <label class="form-label fw-600 small text-uppercase letter-spacing-1">Authorization Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input class="form-control bg-light border-start-0 ps-0 shadow-none" 
                                   type="email" name="email" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label fw-600 small text-uppercase letter-spacing-1">Access Token</label>
                            <a href="#" class="small text-decoration-none text-warning fw-bold">Reset?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted">
                                <i class="bi bi-key"></i>
                            </span>
                            <input class="form-control bg-light border-start-0 ps-0 shadow-none" 
                                   type="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button class="btn btn-premium btn-lg shadow-sm">
                            Verify & Authenticate <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>

                    <div class="text-center">
                        <p class="small text-muted mb-0">
                            Don't have access? <a href="/api/auth/register" class="text-dark fw-bold text-decoration-none">Request Entry</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <span class="badge bg-light text-muted border fw-normal py-2 px-3">
                <i class="bi bi-terminal me-1"></i> NODE_ID: PK_LHE_OPSI_01
            </span>
        </div>
    </div>
</div>

<style>
    /* Premium input focus effect */
    .form-control:focus {
        background-color: #fff !important;
        border-color: var(--accent-gold) !important;
        box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1) !important;
    }
    .animate-fadeIn {
        animation: fadeIn 0.6s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
