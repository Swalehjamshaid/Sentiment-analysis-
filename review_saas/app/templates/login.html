<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Styles same as register.html */
        body { font-family: 'Inter', sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6">
<div class="w-full max-w-md">
    <div class="glass-panel rounded-3xl p-8 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Welcome Back</h1>
        </div>

        {% if message %}
        <div class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl flex items-center text-emerald-400">
            <i class="fas fa-check-circle mr-3"></i>
            <span class="text-sm font-medium">{{ message }}</span>
        </div>
        {% endif %}

        {% if error %}
        <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl flex items-center text-rose-400">
            <i class="fas fa-exclamation-circle mr-3"></i>
            <span class="text-sm font-medium">{{ error }}</span>
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-5">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Email</label>
                <input type="email" name="email" required class="input-field block w-full px-4 py-3.5 rounded-2xl focus:outline-none" placeholder="swaleh@example.com">
            </div>
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Password</label>
                <input type="password" name="password" required class="input-field block w-full px-4 py-3.5 rounded-2xl focus:outline-none" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all mt-4">
                Login
            </button>
        </form>
    </div>
</div>
</body>
</html>
