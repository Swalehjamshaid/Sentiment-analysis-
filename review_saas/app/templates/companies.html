
<!-- filename: app/templates/companies.html -->
<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Companies — ReviewSaaS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://maps.googleapis.com/maps/api/js?key={{ request.app.state.google_key or '' }}&libraries=places"></script>
</head><body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark"><div class="container-fluid">
  <a class="navbar-brand" href="/dashboard">Dashboard</a>
  <div class="d-flex gap-2">
    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
</div></nav>
<div class="container py-4">
  <h4 class="mb-3">Companies</h4>
  <form class="row g-2" method="post" action="/companies/create">
    <div class="col-md-3"><input class="form-control" id="placeSearch" name="name" placeholder="Company name" required></div>
    <input type="hidden" name="place_id" id="placeId">
    <div class="col-md-2"><input class="form-control" name="phone" id="placePhone" placeholder="Phone"></div>
    <div class="col-md-3"><input class="form-control" name="address" id="placeAddr" placeholder="Address"></div>
    <div class="col-md-2"><input class="form-control" name="website" id="placeWeb" placeholder="Website"></div>
    <div class="col-md-2 d-grid"><button class="btn btn-primary">Add</button></div>
  </form>
  <script>
  try{
    const input=document.getElementById('placeSearch');
    if(window.google&&google.maps&&google.maps.places){
      const ac=new google.maps.places.Autocomplete(input,{types:['establishment']});
      ac.addListener('place_changed',()=>{
        const p=ac.getPlace();
        document.getElementById('placeId').value=p.place_id||'';
        document.getElementById('placeAddr').value=(p.formatted_address||'');
        document.getElementById('placePhone').value=(p.formatted_phone_number||'');
        document.getElementById('placeWeb').value=(p.website||'');
      });
    }
  }catch(e){}
  </script>
  <hr>
  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead><tr><th>Name</th><th>Rating</th><th>Reviews</th><th>Last Updated</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
      {% for c in items %}
        <tr>
          <td>{{ c.name }}</td>
          <td>{{ '%.2f' % c.avg_rating if c.avg_rating else '-' }}</td>
          <td>{{ c.review_count or 0 }}</td>
          <td>{{ c.last_updated or '-' }}</td>
          <td>{{ c.status }}</td>
          <td>
            <form class="d-inline" method="post" action="/companies/{{c.id}}/sync"><button class="btn btn-sm btn-outline-success">Sync</button></form>
            <form class="d-inline" method="post" action="/companies/{{c.id}}/delete" onsubmit="return confirm('Delete company?')"><button class="btn btn-sm btn-outline-danger">Delete</button></form>
            <a class="btn btn-sm btn-outline-primary" href="/dashboard?company_id={{c.id}}">Analyze</a>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</div>
</body></html>
