<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ReviewSaaS Dashboard | Executive Intelligence</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#f4f7f6;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.card{
  border:none;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}
.kpi{
  font-size:28px;
  font-weight:700;
  color: #2c3e50;
}
.section-title{
  font-weight:600;
  margin-bottom:10px;
  color: #34495e;
}
.status-badge { 
  font-size: 0.75rem; 
  padding: 6px 14px; 
  border-radius: 20px; 
  font-weight: bold; 
}
.review{
  border-bottom:1px solid #eee;
  padding:15px 0;
}
.small-muted{font-size:.85rem;color:#6c757d;}
.urgent-item { border-left: 4px solid #dc3545; padding-left: 10px; background: #fff5f5; }
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">
      Review<span class="text-primary">SaaS</span> 
      <small class="text-muted" style="font-size: 0.65rem;">v2.0</small>
    </span>
    <div>
      <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
        <i class="fa fa-plus"></i> Add Business
      </button>
      <a href="/logout" class="btn btn-warning btn-sm">Logout</a>
    </div>
  </div>
</nav>

<div class="container py-4">

<!-- ░░ FILTER BAR ░░ -->
<div class="card p-4">
  <div class="row g-3 align-items-end">
    <div class="col-md-4">
      <label class="form-label fw-bold">Active Business</label>
      <select id="companySelect" class="form-select"></select>
      <div id="companyHint" class="small-muted mt-1"></div>
    </div>

    <div class="col-md-3">
      <label class="form-label fw-bold">Start Date</label>
      <input id="startDate" type="date" class="form-control">
    </div>

    <div class="col-md-3">
      <label class="form-label fw-bold">End Date</label>
      <input id="endDate" type="date" class="form-control">
    </div>

    <div class="col-md-2 d-grid">
      <button id="fetchBtn" class="btn btn-primary fw-bold">Update Dashboard</button>
    </div>
  </div>
</div>


<!-- ░░ KPI BAR ░░ -->
<div class="row g-3 mb-2">
  <div class="col-md-3">
    <div class="card p-3 text-center">
      <div class="small-muted text-uppercase fw-bold">Total Reviews</div>
      <div id="kpi_reviews" class="kpi">0</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-3 text-center">
      <div class="small-muted text-uppercase fw-bold">Avg Rating</div>
      <div id="kpi_rating" class="kpi">0</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-3 text-center">
      <div class="small-muted text-uppercase fw-bold">Avg Sentiment</div>
      <div id="kpi_sentiment" class="kpi">0</div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card p-3 text-center">
      <div class="small-muted text-uppercase fw-bold">New (7d)</div>
      <div id="kpi_new" class="kpi">0</div>
    </div>
  </div>
</div>


<!-- ░░ CHARTS ░░ -->
<div class="row g-3">
  <div class="col-md-6">
    <div class="card p-3">
      <div class="section-title">Review Volume</div>
      <canvas id="chartVolume"></canvas>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card p-3">
      <div class="section-title">Rating Trend</div>
      <canvas id="chartRating"></canvas>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card p-3">
      <div class="section-title">Sentiment Trend</div>
      <canvas id="chartSentiment"></canvas>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card p-3">
      <div class="section-title">Rating Distribution</div>
      <canvas id="chartStars"></canvas>
    </div>
  </div>
</div>


<!-- ░░ AI EXECUTIVE SUMMARY ░░ -->
<div class="row mt-3">
  <div class="col-lg-8">
    <div class="card p-4">
      <h5>
        <i class="fa fa-robot text-primary"></i> AI Executive Summary
      </h5>

      <div id="conclusion_box"></div>

      <p id="ai_summary" class="mt-2"></p>

      <h6 class="fw-bold mt-3">Priority Actions:</h6>
      <ul id="ai_actions"></ul>
    </div>
  </div>

  <div class="col-lg-4">
    <div class="card p-4 h-100">
      <h5><i class="fa fa-bell text-danger"></i> System Alerts</h5>
      <ul id="alerts" class="ps-3"></ul>
    </div>
  </div>
</div>


<!-- ░░ THEMES + FEED ░░ -->
<div class="row mt-2">
  <div class="col-md-4">
    <div class="card p-4">
      <h5>Customer Themes</h5>
      <div id="themes"></div>
    </div>
  </div>

  <div class="col-md-8">
    <div class="card p-4">
      <h5>Intelligence Feed (Annotated)</h5>
      <div id="reviews"></div>
    </div>
  </div>
</div>

</div> <!-- container end -->


<!-- GOOGLE AUTOCOMPLETE -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_KEY&libraries=places"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ---------------------------------------------------------
   UNIVERSAL JS HELPERS
------------------------------------------------------------*/
let charts = {};
const $ = (id) => document.getElementById(id);
const safeNum = (n, d=0)=> isNaN(parseFloat(n)) ? d : parseFloat(n);

/* ---------------------------------------------------------
   LOAD COMPANIES
------------------------------------------------------------*/
async function loadCompanies() {
  const res = await fetch(`/api/companies/list`);
  const data = await res.json();
  const sel = $("companySelect");

  sel.innerHTML =
    data.companies.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
}

/* ---------------------------------------------------------
   MAIN DASHBOARD FETCH LOGIC
------------------------------------------------------------*/
async function fetchDashboard() {
  const cid = $("companySelect").value;
  const s = $("startDate").value;
  const e = $("endDate").value;

  const params = `company_id=${cid}&start=${s}&end=${e}`;

  /* ---------------- KPIs ---------------- */
  const kpi = await (await fetch(`/api/kpis?${params}`)).json();
  $("kpi_reviews").innerText = kpi.total_reviews;
  $("kpi_rating").innerText = safeNum(kpi.avg_rating).toFixed(1);
  $("kpi_sentiment").innerText = safeNum(kpi.avg_sentiment).toFixed(3);
  $("kpi_new").innerText = kpi.new_reviews;


  /* ------------- AI EXEC SUMMARY (v2 first) ------------- */
  let summary = await fetch(`/api/v2/ai/executive-summary?${params}`);
  let data = summary.ok ? await summary.json() :
                         await (await fetch(`/api/ai/executive-summary?${params}`)).json();

  $("ai_summary").innerText = data.summary || "No summary available.";

  $("ai_actions").innerHTML = (data.top_actions || [])
    .map(a => `<li>${a}</li>`).join("");

  if (data.conclusion) {
    const color = data.conclusion.includes("Attention") ? "#dc3545" : "#198754";
    $("conclusion_box").innerHTML =
      `<span class="status-badge" style="background:${color}22;color:${color};">${data.conclusion}</span>`;
  }


  /* ---------------- ALERTS ---------------- */
  const alerts = await (await fetch(`/api/alerts?${params}`)).json();
  $("alerts").innerHTML = alerts.alerts.length
    ? alerts.alerts.map(a => `<li>${a.message}</li>`).join("")
    : `<li class="text-muted">No active alerts</li>`;


  /* ---------------- THEMES ---------------- */
  const themes = await (await fetch(`/api/keywords/themes?${params}`)).json();
  $("themes").innerHTML = `
      <div><b>Positive:</b> ${themes.positive_keywords?.join(", ") || "—"}</div>
      <div><b>Negative:</b> ${themes.negative_keywords?.join(", ") || "—"}</div>
      <div class="mt-2 text-primary fw-bold"><b>Trending:</b> ${themes.emerging?.join(", ") || "—"}</div>
  `;


  /* ---------------- REVIEW FEED ---------------- */
  const feed = await (await fetch(`/api/reviews/feed?${params}`)).json();
  $("reviews").innerHTML = feed.items.map(r => `
      <div class="review ${r.is_urgent ? "urgent-item" : ""}">
        <div class="d-flex justify-content-between">
          <strong>${r.author_name}</strong>
          <span class="text-warning">${"★".repeat(parseInt(r.rating || 0))}</span>
        </div>
        <p class="small">${r.text}</p>
      </div>
  `).join("");


  /* ---------------- CHARTS ---------------- */
  renderCharts(
    await (await fetch(`/api/series/overview?${params}`)).json(),
    await (await fetch(`/api/ratings/distribution?${params}`)).json()
  );
}

/* ---------------------------------------------------------
   Chart Rendering
------------------------------------------------------------*/
function renderCharts(series, dist) {
  Object.values(charts).forEach(c => c?.destroy());
  charts = {};

  if (series.volume) {
    charts.vol = new Chart($("chartVolume"), {
      type: 'line',
      data: { 
        labels: series.volume.map(x => x.date),
        datasets: [{ data: series.volume.map(x => x.value), borderColor: "#0d6efd", tension: 0.4 }]
      }
    });
  }

  if (series.rating) {
    charts.rat = new Chart($("chartRating"), {
      type: 'line',
      data: { 
        labels: series.rating.map(x => x.date),
        datasets: [{ data: series.rating.map(x => x.value), borderColor: "#198754", tension: 0.4 }]
      }
    });
  }

  if (series.sentiment) {
    charts.sent = new Chart($("chartSentiment"), {
      type: 'line',
      data: { 
        labels: series.sentiment.map(x => x.date),
        datasets: [{ data: series.sentiment.map(x => x.value), borderColor: "#6610f2", tension: 0.4 }]
      },
      options: { scales:{ y:{ min:-1, max:1 }}}
    });
  }

  if (dist.distribution) {
    charts.dist = new Chart($("chartStars"), {
      type: 'bar',
      data: { 
        labels: Object.keys(dist.distribution),
        datasets: [{ 
          data: Object.values(dist.distribution),
          backgroundColor: "#ffc107"
        }]
      }
    });
  }
}

/* ---------------------------------------------------------
   Initialize
------------------------------------------------------------*/
window.onload = async () => {
  await loadCompanies();
  const end = new Date();
  const start = new Date();
  start.setDate(start.getDate() - 30);
  $("endDate").value = end.toISOString().split("T")[0];
  $("startDate").value = start.toISOString().split("T")[0];

  if ($("companySelect").value) fetchDashboard();
};

$("fetchBtn").onclick = fetchDashboard;
</script>

</body>
</html>
