<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReviewSaaS • Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        header.navbar { backdrop-filter: saturate(1.2) blur(6px); background-color: rgba(var(--bs-body-bg-rgb), 0.85); border-bottom: 1px solid var(--bs-border-color); }
        .kpi-card .kpi-title { font-size: .85rem; color: var(--bs-secondary-color); font-weight: 600; text-transform: uppercase; }
        .kpi-card .kpi-value { font-size: 1.8rem; font-weight: 800; color: #0d6efd; }
        .badge-sentiment { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-positive { background: #16a34a; color: white; }
        .badge-neutral { background: #64748b; color: white; }
        .badge-negative { background: #dc2626; color: white; }
        .kw-badge { border:1px solid var(--bs-border-color); border-radius: 999px; padding: .25rem .5rem; margin: .125rem; display:inline-block; font-size:.8rem; background: rgba(13, 110, 253, 0.05); }
        .chart-wrap { height: 300px; }
        .activity-item { border-bottom: 1px dashed var(--bs-border-color); padding: 10px 0; }
    </style>
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a href="/dashboard" class="navbar-brand fw-bold text-primary"><i class="bi bi-bar-chart-fill me-2"></i> ReviewSaaS</a>
            <div class="d-flex align-items-center gap-2">
                <select id="companySelect" class="form-select form-select-sm" style="width: 200px;">
                    {% if companies %}
                        {% for c in companies %}
                            <option value="{{ c.id }}" {% if c.id == active_company_id %}selected{% endif %}>{{ c.name }}</option>
                        {% endfor %}
                    {% else %}
                        <option value="">No businesses found</option>
                    {% endif %}
                </select>
                <input id="startDate" type="date" class="form-control form-control-sm" style="width: 140px;" />
                <input id="endDate" type="date" class="form-control form-control-sm" style="width: 140px;" />
                <button id="btnRefresh" class="btn btn-primary btn-sm">Apply</button>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm border-0">
                    <div class="card-body">
                        <div class="kpi-title">Total Reviews</div>
                        <div id="kpiTotalReviews" class="kpi-value">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm border-0">
                    <div class="card-body">
                        <div class="kpi-title">Avg Rating</div>
                        <div id="kpiAvgRating" class="kpi-value">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm border-0">
                    <div class="card-body">
                        <div class="kpi-title">Avg Sentiment</div>
                        <div id="kpiAvgSentiment" class="kpi-value">—</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card shadow-sm border-0">
                    <div class="card-body">
                        <div class="kpi-title">New (7d)</div>
                        <div id="kpiNewReviews" class="kpi-value">—</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-xl-8">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white fw-bold">Sentiment & Volume Trend</div>
                    <div class="card-body chart-wrap">
                        <canvas id="overviewChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-xl-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-header bg-white fw-bold">Sentiment Distribution</div>
                    <div class="card-body d-flex align-items-center">
                        <canvas id="sentPie"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">Top Keywords</div>
                    <div class="card-body">
                        <h6 class="small fw-bold text-success">Positive</h6>
                        <div id="kwPositive" class="mb-3"></div>
                        <h6 class="small fw-bold text-danger">Negative</h6>
                        <div id="kwNegative" class="mb-3"></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold d-flex justify-content-between">
                        <span>Recent Reviews</span>
                    </div>
                    <div class="card-body overflow-auto" style="max-height: 400px;" id="reviewsFeed">
                        <div class="text-center py-5 text-muted">Select a company to view reviews.</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const $ = (s) => document.querySelector(s);
        let overviewChart = null, sentPie = null;

        // Fetch query parameters
        function getQS() {
            const cid = $('#companySelect').value;
            if (!cid) return null;
            return `company_id=${cid}&start=${$('#startDate').value}&end=${$('#endDate').value}`;
        }

        async function refresh() {
            const qs = getQS();
            if (!qs) return;

            // 1. Load KPIs
            fetch(`/api/kpis?${qs}`).then(r => r.json()).then(data => {
                $('#kpiTotalReviews').textContent = data.total_reviews;
                $('#kpiAvgRating').textContent = data.avg_rating;
                $('#kpiAvgSentiment').textContent = data.avg_sentiment;
                $('#kpiNewReviews').textContent = data.new_reviews;
            });

            // 2. Load Charts (Series Overview)
            fetch(`/api/series/overview?${qs}`).then(r => r.json()).then(data => {
                if (overviewChart) overviewChart.destroy();
                overviewChart = new Chart($('#overviewChart'), {
                    type: 'line',
                    data: {
                        labels: data.volume.map(d => d.date),
                        datasets: [
                            { label: 'Reviews', data: data.volume.map(d => d.value), borderColor: '#0d6efd', tension: 0.3 },
                            { label: 'Sentiment', data: data.sentiment.map(d => d.value), borderColor: '#fd7e14', tension: 0.3 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            });

            // 3. Load Sentiment Share
            fetch(`/api/sentiment/share?${qs}`).then(r => r.json()).then(data => {
                if (sentPie) sentPie.destroy();
                sentPie = new Chart($('#sentPie'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Positive', 'Neutral', 'Negative'],
                        datasets: [{
                            data: [data.counts.positive, data.counts.neutral, data.counts.negative],
                            backgroundColor: ['#16a34a', '#64748b', '#dc2626']
                        }]
                    }
                });
            });

            // 4. Load Keywords
            fetch(`/api/v2/keywords?${qs}`).then(r => r.json()).then(data => {
                const badge = (k) => `<span class="kw-badge">${k.term} (${k.freq})</span>`;
                $('#kwPositive').innerHTML = data.positive.slice(0, 10).map(badge).join('');
                $('#kwNegative').innerHTML = data.negative.slice(0, 10).map(badge).join('');
            });

            // 5. Load Review Feed
            fetch(`/api/reviews/list?${qs}`).then(r => r.json()).then(data => {
                $('#reviewsFeed').innerHTML = data.items.map(r => `
                    <div class="activity-item">
                        <div class="d-flex justify-content-between">
                            <strong>${r.author_name}</strong>
                            <span class="text-warning">${'★'.repeat(r.rating)}</span>
                        </div>
                        <p class="small mb-1">${r.text}</p>
                        <small class="text-muted">${r.review_time}</small>
                    </div>
                `).join('');
            });
        }

        // Init Dates
        document.addEventListener('DOMContentLoaded', () => {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - 30);
            $('#endDate').value = end.toISOString().split('T')[0];
            $('#startDate').value = start.toISOString().split('T')[0];
            
            $('#btnRefresh').onclick = refresh;
            $('#companySelect').onchange = refresh;
            
            refresh();
        });
    </script>
</body>
</html>
