<script>

let chartInstances = {};
let reviewsDataTable = null;

function escapeHtml(str) {

    if (!str) return '';

    return str.replace(/[&<>]/g, m => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;'
    }[m]));
}

async function loadCompanies() {

    try {

        const res = await fetch('/api/companies');

        const data = await res.json();

        const companies = Array.isArray(data)
            ? data
            : (data.companies || []);

        const select = document.getElementById('companySelect');

        select.innerHTML = companies.map(c => `
            <option value="${c.id}">
                ${escapeHtml(c.name || c.business_name)}
            </option>
        `).join('');

        if (companies.length > 0) {
            setTimeout(() => triggerAllLoads(), 500);
        }

    } catch (e) {

        console.error(e);
    }
}

function renderCharts(vis) {

    const radarCtx = document.getElementById('chartEmotions');

    if (chartInstances.emotions) {
        chartInstances.emotions.destroy();
    }

    chartInstances.emotions = new Chart(radarCtx, {

        type: 'radar',

        data: {

            labels: Object.keys(vis.emotions || {}),

            datasets: [{

                label: 'Emotion Score',

                data: Object.values(vis.emotions || {}),

                backgroundColor: 'rgba(168,85,247,0.2)',

                borderColor: '#a855f7',

                borderWidth: 2
            }]
        }
    });

    const lineCtx = document.getElementById('chartMonthly');

    if (chartInstances.monthly) {
        chartInstances.monthly.destroy();
    }

    chartInstances.monthly = new Chart(lineCtx, {

        type: 'line',

        data: {

            labels: (vis.sentiment_trend || []).map(x => x.week || x.month),

            datasets: [{

                label: 'Sentiment',

                data: (vis.sentiment_trend || []).map(x => x.avg || 0),

                borderColor: '#10b981',

                fill: true
            }]
        }
    });

    const barCtx = document.getElementById('chartRatings');

    if (chartInstances.ratings) {
        chartInstances.ratings.destroy();
    }

    const ratings = vis.ratings || {};

    chartInstances.ratings = new Chart(barCtx, {

        type: 'bar',

        data: {

            labels: ['1★','2★','3★','4★','5★'],

            datasets: [{

                label: 'Reviews',

                data: [
                    ratings['1'] || 0,
                    ratings['2'] || 0,
                    ratings['3'] || 0,
                    ratings['4'] || 0,
                    ratings['5'] || 0
                ],

                backgroundColor: '#6366f1'
            }]
        }
    });
}

async function loadLatestReviews(companyId) {

    const res = await fetch(`/api/dashboard/latest-reviews?company_id=${companyId}&limit=100`);

    const reviews = await res.json();

    const tbody = document.getElementById('reviewsTbody');

    if (!reviews || reviews.length === 0) {

        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center py-4">
                    No reviews found
                </td>
            </tr>
        `;

        return;
    }

    tbody.innerHTML = reviews.map(r => `

        <tr>

            <td>${'★'.repeat(r.rating || 0)}</td>

            <td>${r.sentiment || 'neutral'}</td>

            <td class="review-text">
                ${escapeHtml(r.review_text || 'No content')}
            </td>

            <td>${(r.review_date || '').split('T')[0]}</td>

            <td>Google</td>

        </tr>

    `).join('');

    if (reviewsDataTable) {
        reviewsDataTable.destroy();
    }

    reviewsDataTable = $('#reviewsTable').DataTable({
        pageLength: 10
    });
}

async function triggerAllLoads() {

    const cid = document.getElementById('companySelect').value;

    if (!cid) return;

    try {

        const res = await fetch(`/api/dashboard/ai/insights?company_id=${cid}`);

        const data = await res.json();

        document.getElementById('kpiTotal').innerText = data.metadata?.total_reviews || 0;

        document.getElementById('kpiRating').innerText = data.kpis?.average_rating?.toFixed(1) || '—';

        document.getElementById('riskSentiment').innerText = (data.kpis?.reputation_score || 0) + '%';

        renderCharts(data.visualizations || {});

        await loadLatestReviews(cid);

    } catch (e) {

        console.error(e);
    }
}

document.getElementById('syncBtn').onclick = async () => {

    const cid = document.getElementById('companySelect').value;

    if (!cid) return;

    try {

        const res = await fetch(`/api/reviews/ingest/${cid}`, {
            method: 'POST'
        });

        const result = await res.json();

        alert(`Sync complete: ${result.reviews_count || 0}`);

        triggerAllLoads();

    } catch (e) {

        console.error(e);
    }
};

document.getElementById('addCompanyForm').onsubmit = async (e) => {

    e.preventDefault();

    const payload = {

        name: document.getElementById('companyName').value,

        place_id: document.getElementById('placeId').value,

        address: document.getElementById('companyAddress').value
    };

    const res = await fetch('/api/companies', {

        method: 'POST',

        headers: {
            'Content-Type': 'application/json'
        },

        body: JSON.stringify(payload)
    });

    if (res.ok) {

        alert('Business added successfully');

        location.reload();
    }
};

function initGoogleAutocomplete() {

    const input = document.getElementById('googleSearchInput');

    if (!input) return;

    const autocomplete = new google.maps.places.Autocomplete(input, {

        fields: [
            'place_id',
            'name',
            'formatted_address'
        ],

        types: ['establishment']
    });

    autocomplete.addListener('place_changed', () => {

        const place = autocomplete.getPlace();

        if (!place || !place.place_id) return;

        document.getElementById('companyName').value = place.name || '';

        document.getElementById('placeId').value = place.place_id || '';

        document.getElementById('companyAddress').value = place.formatted_address || '';
    });
}

document.getElementById('toggleTheme').onclick = () => {

    const current = document.documentElement.getAttribute('data-theme');

    const target = current === 'light' ? 'dark' : 'light';

    document.documentElement.setAttribute('data-theme', target);
};

document.addEventListener('DOMContentLoaded', () => {

    loadCompanies();
});

</script>
