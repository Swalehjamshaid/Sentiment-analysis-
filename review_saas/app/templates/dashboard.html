<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ReviewSaaS Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f7f6;
font-family:Segoe UI;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.kpi{
font-size:28px;
font-weight:700;
}

.section-title{
font-weight:600;
margin-bottom:10px;
}

.preview-box{
display:none;
background:#f9f9f9;
border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.pac-container{
z-index:2000!important;
}

.review{
border-bottom:1px solid #eee;
padding:10px 0;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">
Review<span class="text-primary">SaaS</span>
</span>

<div>

<button class="btn btn-primary btn-sm"
data-bs-toggle="modal"
data-bs-target="#addCompanyModal">

<i class="fa fa-plus"></i> Add Business

</button>

<a href="/logout" class="btn btn-warning btn-sm">Logout</a>

</div>

</div>

</nav>


<div class="container py-4">

<div class="card p-4 mb-4">

<div class="row g-3">

<div class="col-md-4">

<label class="form-label">Business</label>
<select id="companySelect" class="form-select"></select>

</div>

<div class="col-md-3">

<label class="form-label">Start</label>
<input id="startDate" type="date" class="form-control">

</div>

<div class="col-md-3">

<label class="form-label">End</label>
<input id="endDate" type="date" class="form-control">

</div>

<div class="col-md-2 d-grid">

<button id="fetchBtn" class="btn btn-primary">Fetch</button>

</div>

</div>

</div>


<!-- KPI -->

<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="card p-3 text-center">
<div>Total Reviews</div>
<div id="kpi_reviews" class="kpi">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<div>Average Rating</div>
<div id="kpi_rating" class="kpi">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<div>Sentiment</div>
<div id="kpi_sentiment" class="kpi">0</div>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 text-center">
<div>New Reviews</div>
<div id="kpi_new" class="kpi">0</div>
</div>
</div>

</div>


<!-- Charts -->

<div class="row g-3">

<div class="col-md-6">
<div class="card p-3">
<div class="section-title">Review Volume</div>
<canvas id="chartVolume"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<div class="section-title">Rating Trend</div>
<canvas id="chartRating"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<div class="section-title">Sentiment Trend</div>
<canvas id="chartSentiment"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<div class="section-title">Rating Distribution</div>
<canvas id="chartStars"></canvas>
</div>
</div>

</div>


<!-- AI SUMMARY -->

<div class="card p-4 mt-4">

<h5>Executive Summary</h5>

<p id="ai_summary"></p>

<ul id="ai_actions"></ul>

</div>


<!-- Alerts -->

<div class="card p-4 mt-4">

<h5>Alerts</h5>

<ul id="alerts"></ul>

</div>


<!-- Themes -->

<div class="card p-4 mt-4">

<h5>Customer Themes</h5>

<div id="themes"></div>

</div>


<!-- Reviews -->

<div class="card p-4 mt-4">

<h5>Recent Reviews</h5>

<div id="reviews"></div>

</div>

</div>


<!-- ADD BUSINESS MODAL -->

<div class="modal fade" id="addCompanyModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header bg-primary text-white">

<h5 class="modal-title">Add Business</h5>

<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<input id="placeSearch"
class="form-control"
placeholder="Search business on Google">

<div id="previewBox" class="preview-box">

<div class="row g-2">

<div class="col-12">
<label>Name</label>
<input id="p_name" class="form-control" readonly>
</div>

<div class="col-12">
<label>Address</label>
<input id="p_address" class="form-control" readonly>
</div>

<div class="col-md-6">
<label>Phone</label>
<input id="p_phone" class="form-control" readonly>
</div>

<div class="col-md-6">
<label>Website</label>
<input id="p_website" class="form-control" readonly>
</div>

<div class="col-12">
<label>Category</label>
<input id="p_category" class="form-control" readonly>
</div>

</div>

</div>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

<button id="saveCompanyBtn" class="btn btn-primary" disabled>
Add Business
</button>

</div>

</div>
</div>
</div>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places"></script>

<script>

let selectedPlace=null

function initGoogle(){

const auto=new google.maps.places.Autocomplete(

document.getElementById("placeSearch"),

{types:["establishment"],
fields:["place_id","name","formatted_address","formatted_phone_number","website","types"]}

)

auto.addListener("place_changed",()=>{

const place=auto.getPlace()

document.getElementById("previewBox").style.display="block"

p_name.value=place.name||""
p_address.value=place.formatted_address||""
p_phone.value=place.formatted_phone_number||""
p_website.value=place.website||""
p_category.value=place.types?place.types[0]:"Business"

selectedPlace={
name:place.name,
address:place.formatted_address,
phone:place.formatted_phone_number||"",
website:place.website||"",
category:place.types?place.types[0]:"Business",
place_id:place.place_id
}

saveCompanyBtn.disabled=false

})

}


saveCompanyBtn.onclick=async()=>{

const r=await fetch("/api/companies/add",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(selectedPlace)

})

const d=await r.json()

if(d.success) location.reload()

}


async function loadCompanies(){

const r=await fetch("/api/companies/list")
const d=await r.json()

companySelect.innerHTML=d.companies.map(c=>
`<option value="${c.id}">${c.name}</option>`
).join("")

}


async function fetchDashboard(){

const cid=companySelect.value
const s=startDate.value
const e=endDate.value


const k=await fetch(`/api/kpis?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

kpi_reviews.innerText=k.total_reviews
kpi_rating.innerText=k.avg_rating
kpi_sentiment.innerText=k.avg_sentiment
kpi_new.innerText=k.new_reviews


const series=await fetch(`/api/series/overview?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

drawChart("chartVolume",series.volume)
drawChart("chartRating",series.rating)
drawChart("chartSentiment",series.sentiment)


const stars=await fetch(`/api/ratings/distribution?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

new Chart(chartStars,{
type:"bar",
data:{
labels:Object.keys(stars.distribution),
datasets:[{data:Object.values(stars.distribution)}]
}
})


const summary=await fetch(`/api/ai/executive-summary?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

ai_summary.innerText=summary.summary

ai_actions.innerHTML=summary.top_actions.map(a=>`<li>${a}</li>`).join("")


const alerts=await fetch(`/api/alerts?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

document.getElementById("alerts").innerHTML=alerts.alerts.map(a=>
`<li>${a.message}</li>`).join("")


const themes=await fetch(`/api/keywords/themes?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

document.getElementById("themes").innerHTML=

"<b>Positive:</b> "+themes.positive_keywords.join(", ")
+"<br><b>Negative:</b> "+themes.negative_keywords.join(", ")


const reviews=await fetch(`/api/reviews/feed?company_id=${cid}&start=${s}&end=${e}`).then(r=>r.json())

document.getElementById("reviews").innerHTML=

reviews.items.map(r=>`
<div class="review">
<b>${r.author_name}</b> ⭐${r.rating}<br>
${r.text}
</div>`).join("")

}


function drawChart(id,data){

new Chart(document.getElementById(id),{
type:"line",
data:{
labels:data.map(x=>x.date),
datasets:[{data:data.map(x=>x.value)}]
}
})

}


fetchBtn.onclick=fetchDashboard

window.onload=()=>{

initGoogle()

loadCompanies()

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
