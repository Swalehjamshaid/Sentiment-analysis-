<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review SaaS Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        :root {
            --transition-speed: .35s;
            --card-radius: 16px;
            --shadow-sm: 0 6px 20px rgba(0,0,0,0.08);
            --shadow-hover: 0 12px 32px rgba(0,0,0,0.14);
        }

        body {
            background: linear-gradient(135deg, #f8f9fc 0%, #e9ecef 100%);
            padding: 32px 24px;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
        }

        [data-theme="dark"] {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #e6edf3;
        }
        [data-theme="dark"] body { background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); }
        [data-theme="dark"] .card           { background: #161b22; border-color: #30363d; color: #e6edf3; }
        [data-theme="dark"] .table          { color: #e6edf3; }
        [data-theme="dark"] .table-light    { background: #21262d; }
        [data-theme="dark"] .form-label,
        [data-theme="dark"] .text-muted     { color: #8b949e !important; }
        [data-theme="dark"] .bg-light       { background: #21262d !important; }

        .navbar {
            border-radius: var(--card-radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .kpi-card {
            border: none;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-speed) ease;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }
        .kpi-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .card {
            border: none;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow var(--transition-speed), transform var(--transition-speed);
        }
        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .chart-wrapper {
            height: 340px;
            width: 100%;
            position: relative;
            padding: 16px 8px 8px;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #ced4da;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13,110,253,.15);
        }

        .btn {
            border-radius: 10px;
            font-weight: 500;
            transition: all var(--transition-speed);
        }

        .sent-pos { color: #2da44e; font-weight: 700; }
        .sent-neu { color: #8250df; font-weight: 700; }
        .sent-neg { color: #d1242f; font-weight: 700; }

        .table-responsive {
            border-radius: var(--card-radius);
            overflow: hidden;
        }
        .table {
            margin-bottom: 0;
        }
        .table th {
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.4px;
            color: #6c757d;
        }
        [data-theme="dark"] .table th { color: #8b949e; }

        #ingestProgressContainer {
            border-radius: var(--card-radius);
            border: 1px solid var(--bs-warning-border-subtle);
            overflow: hidden;
        }

        .spin { animation: spin 1.4s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .display-6 {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .alert-placeholder { min-height: 56px; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-5 shadow">
    <div class="container-fluid px-4 py-3">
        <span class="navbar-brand fw-bold fs-4">
            <i class="bi bi-graph-up-arrow me-3"></i>Review Dashboard
        </span>
        <div class="d-flex gap-3 align-items-center">
            <button id="toggleTheme" class="btn btn-light btn-sm px-3">
                <i class="bi bi-moon-stars-fill me-1"></i> Theme
            </button>
            <a href="/dashboard" class="btn btn-outline-light btn-sm px-3">Home</a>
            <form action="/logout" method="post" class="m-0">
                <button class="btn btn-danger btn-sm px-3">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid">

    <div id="alertHost" class="alert-placeholder mb-4"></div>

    <div id="ingestProgressContainer" class="card shadow-sm border-warning mb-4" style="display:none">
        <div class="card-body py-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold mb-0 text-warning">
                    <i class="bi bi-gear-wide-connected spin me-2"></i>
                    Streaming Live Reviews...
                </h6>
                <span id="progressStats" class="badge bg-warning text-dark fs-6">0 reviews</span>
            </div>
            <div class="progress" style="height: 12px; border-radius: 6px;">
                <div id="ingestProgressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-warning" role="progressbar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="row g-3 align-items-end mb-5 p-4 bg-white rounded-4 border shadow-sm">
        <div class="col-md-3">
            <label class="form-label fw-semibold">Company</label>
            <select id="companySelect" class="form-select"></select>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-semibold">Start Date</label>
            <input id="startDate" type="date" class="form-control">
        </div>
        <div class="col-md-2">
            <label class="form-label fw-semibold">End Date</label>
            <input id="endDate" type="date" class="form-control">
        </div>
        <div class="col-md-5">
            <div class="d-flex gap-3 pt-4 pt-md-0">
                <button id="loadBtn" class="btn btn-primary w-50 fw-semibold">Load Reviews</button>
                <button id="ingestBtn" class="btn btn-warning w-50 fw-semibold">
                    <i class="bi bi-cloud-arrow-down-fill me-2"></i>Ingest & Stream
                </button>
            </div>
        </div>
    </div>

    <div class="d-flex gap-3 mb-5 flex-wrap">
        <button class="btn btn-success px-4 py-2 fw-semibold" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
            <i class="bi bi-plus-circle-fill me-2"></i>Add Company
        </button>
        <div id="loadingSpinner" class="spinner-border text-primary d-none" role="status"></div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-6 col-lg-3 col-6">
            <div class="card kpi-card border-start border-primary border-5">
                <div class="card-body p-4">
                    <div class="text-muted small text-uppercase fw-semibold mb-1">Total Reviews</div>
                    <div id="kpiTotal" class="display-5">–</div>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3 col-6">
            <div class="card kpi-card border-start border-info border-5">
                <div class="card-body p-4">
                    <div class="text-muted small text-uppercase fw-semibold mb-1">Average Rating</div>
                    <div id="kpiRating" class="display-5">–</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-lg-2 col-4">
            <div class="card kpi-card border-start border-success border-5">
                <div class="card-body p-4">
                    <div class="text-muted small text-uppercase fw-semibold mb-1">Positive</div>
                    <div id="kpiPos" class="display-5 sent-pos">–</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-lg-2 col-4">
            <div class="card kpi-card border-start border-secondary border-5">
                <div class="card-body p-4">
                    <div class="text-muted small text-uppercase fw-semibold mb-1">Neutral</div>
                    <div id="kpiNeu" class="display-5 sent-neu">–</div>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-lg-2 col-4">
            <div class="card kpi-card border-start border-danger border-5">
                <div class="card-body p-4">
                    <div class="text-muted small text-uppercase fw-semibold mb-1">Negative</div>
                    <div id="kpiNeg" class="display-5 sent-neg">–</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 text-dark">Rating Distribution</h5>
                    <div class="chart-wrapper">
                        <canvas id="chartDistribution"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 text-dark">Review Trend (Last 15)</h5>
                    <div class="chart-wrapper">
                        <canvas id="chartTrend"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card h-100">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4 text-dark">Sentiment Breakdown</h5>
                    <div class="chart-wrapper">
                        <canvas id="chartSentiment"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow mb-5">
        <div class="card-body p-4">
            <h4 class="fw-bold mb-4">Recent Reviews</h4>
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Author</th>
                            <th>Rating</th>
                            <th>Sentiment</th>
                            <th>Date</th>
                            <th>Review Text</th>
                        </tr>
                    </thead>
                    <tbody id="reviewsTable">
                        <tr><td colspan="5" class="text-center text-muted py-5">No data loaded yet.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<div class="modal fade" id="addCompanyModal">
    <div class="modal-dialog modal-lg">
        <form id="addCompanyForm" class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fw-semibold">Register New Business</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-4 position-relative">
                    <label class="form-label fw-semibold">Search Business (Google Maps)</label>
                    <input id="proxySearchInput" class="form-control" placeholder="Start typing business name…">
                </div>
                <div class="row g-4">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Company Name</label>
                        <input id="companyName" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Google Place ID</label>
                        <input id="placeId" class="form-control" required readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Address</label>
                        <input id="companyAddress" class="form-control">
                    </div>
                </div>
            </div>
            <div class="modal-footer px-4 pb-4">
                <button class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success px-4 fw-semibold" type="submit">Add Business</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places"></script>

</body>
</html>
