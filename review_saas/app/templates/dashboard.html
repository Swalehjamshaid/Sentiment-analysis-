<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewSaaS | Advanced Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; }
        .sidebar-item.active { background: rgba(59, 130, 246, 0.15); border-left: 4px solid #3b82f6; }
        .fetching { opacity: 0.5; pointer-events: none; cursor: wait; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="h-16 glass-card rounded-none border-t-0 border-x-0 px-6 flex items-center justify-between z-50">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg"><i data-lucide="bar-chart-3" class="text-white w-5 h-5"></i></div>
            <span class="font-bold text-xl">Review<span class="text-blue-500">SaaS</span></span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 glass-card px-3 py-1.5 border-slate-700">
                <input type="date" id="startDate" class="bg-transparent text-xs font-medium outline-none">
                <span class="text-slate-500">→</span>
                <input type="date" id="endDate" class="bg-transparent text-xs font-medium outline-none">
                <button id="fetchRangeBtn" class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded-md text-xs font-bold transition">
                    Update Range
                </button>
            </div>
            <button onclick="handleLogout()" class="text-slate-400 hover:text-white"><i data-lucide="log-out" class="w-5 h-5"></i></button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 border-r border-slate-800 bg-slate-900/50 flex flex-col">
            <div class="p-4">
                <div class="relative">
                    <input type="text" id="addCompanyInput" placeholder="Add Company..." class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-sm outline-none focus:ring-1 focus:ring-blue-500">
                    <button onclick="handleAddCompany()" class="absolute right-2 top-2 text-blue-500"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                </div>
            </div>
            <div id="companyList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
                </div>
        </aside>

        <main id="dashboardMain" class="flex-1 overflow-y-auto p-8 hidden">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 id="activeCompanyName" class="text-3xl font-bold text-white">--</h1>
                    <p id="cityText" class="text-slate-400 text-sm flex items-center gap-1"><i data-lucide="map-pin" class="w-4 h-4"></i> --</p>
                </div>
                <button onclick="syncGoogleData()" id="syncBtn" class="flex items-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg hover:brightness-110 transition">
                    <i data-lucide="refresh-cw" id="syncIcon"></i> Sync Google Data
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="glass-card p-5">
                    <p class="text-slate-400 text-xs font-bold uppercase">Total Reviews</p>
                    <h2 id="statTotalReviews" class="text-2xl font-bold mt-1">0</h2>
                </div>
                <div class="glass-card p-5">
                    <p class="text-slate-400 text-xs font-bold uppercase">Avg Rating</p>
                    <h2 id="statAvgRating" class="text-2xl font-bold mt-1">0.0</h2>
                </div>
                <div class="glass-card p-5">
                    <p class="text-slate-400 text-xs font-bold uppercase">Risk Level</p>
                    <h2 id="statRiskLevel" class="text-2xl font-bold mt-1 text-blue-400">--</h2>
                </div>
                <div class="glass-card p-5">
                    <p class="text-slate-400 text-xs font-bold uppercase">Risk Score</p>
                    <h2 id="statRiskScore" class="text-2xl font-bold mt-1">0</h2>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-6">
                    <h3 class="font-bold mb-4">Performance Velocity</h3>
                    <canvas id="trendChart" height="150"></canvas>
                </div>
                <div class="glass-card p-6">
                    <h3 class="font-bold mb-4">Sentiment Distribution</h3>
                    <div class="max-w-[250px] mx-auto"><canvas id="sentimentChart"></canvas></div>
                </div>
            </div>
        </main>

        <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-slate-500">
            <i data-lucide="layout-dashboard" class="w-16 h-16 opacity-20 mb-4"></i>
            <p>Select a company to view intelligence</p>
        </div>
    </div>

    <script>
        // Best Practice: State Management
        const state = {
            activeCompanyId: null,
            isSyncing: false,
            charts: { trend: null, sentiment: null },
            dateRange: { start: '', end: '' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setDefaultDates();
            loadCompanies();
            
            // Event Listener for Date Update
            document.getElementById('fetchRangeBtn').addEventListener('click', () => {
                if (state.activeCompanyId) refreshDashboard();
            });
        });

        function setDefaultDates() {
            const end = new Date();
            const start = new Date();
            start.setDate(end.getDate() - 90);
            
            state.dateRange.start = start.toISOString().split('T')[0];
            state.dateRange.end = end.toISOString().split('T')[0];
            
            document.getElementById('startDate').value = state.dateRange.start;
            document.getElementById('endDate').value = state.dateRange.end;
        }

        async function loadCompanies() {
            try {
                const res = await fetch('/api/dashboard/init');
                const data = await res.json();
                const list = document.getElementById('companyList');
                list.innerHTML = data.companies.map(c => `
                    <div class="sidebar-item p-3 rounded-lg cursor-pointer hover:bg-slate-800 transition mb-1" 
                         id="company-${c.id}" onclick="selectCompany(${c.id})">
                        <p class="text-sm font-semibold">${c.name}</p>
                        <p class="text-[10px] text-slate-500 uppercase">${c.city || 'Pending Sync'}</p>
                    </div>
                `).join('');
            } catch (err) { console.error("Load failed", err); }
        }

        async function selectCompany(id) {
            state.activeCompanyId = id;
            
            // UI Toggle
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`company-${id}`).classList.add('active');
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('dashboardMain').classList.remove('hidden');

            // 1. Immediate UI Load (from existing DB data)
            await refreshDashboard();
            
            // 2. Background Sync (fetch new data from Google)
            syncGoogleData();
        }

        async function refreshDashboard() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const main = document.getElementById('dashboardMain');

            main.classList.add('fetching');
            
            try {
                const [sumRes, tabRes] = await Promise.all([
                    fetch(`/api/dashboard/summary/${state.activeCompanyId}?start=${start}&end=${end}`),
                    fetch(`/api/dashboard/table?company_id=${state.activeCompanyId}&start=${start}&end=${end}`)
                ]);

                const sumData = await sumRes.json();
                updateUI(sumData);
            } catch (err) {
                console.error("Refresh failed", err);
            } finally {
                main.classList.remove('fetching');
            }
        }

        async function syncGoogleData() {
            if (state.isSyncing) return;
            state.isSyncing = true;
            
            const icon = document.getElementById('syncIcon');
            icon.classList.add('animate-spin');

            try {
                const res = await fetch(`/api/reviews/sync/${state.activeCompanyId}`, { method: 'POST' });
                if (res.ok) await refreshDashboard(); // Reload once sync finishes
            } finally {
                state.isSyncing = false;
                icon.classList.remove('animate-spin');
            }
        }

        function updateUI(data) {
            document.getElementById('activeCompanyName').innerText = data.company.name;
            document.getElementById('cityText').innerHTML = `<i data-lucide="map-pin" class="w-4 h-4"></i> ${data.company.city || 'Location N/A'}`;
            document.getElementById('statTotalReviews').innerText = data.metrics.total;
            document.getElementById('statAvgRating').innerText = data.metrics.avg_rating.toFixed(1);
            document.getElementById('statRiskLevel').innerText = data.metrics.risk_level;
            document.getElementById('statRiskScore').innerText = data.metrics.risk_score;
            
            renderCharts(data);
            lucide.createIcons();
        }

        function renderCharts(data) {
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            const sentCtx = document.getElementById('sentimentChart').getContext('2d');

            if (state.charts.trend) state.charts.trend.destroy();
            if (state.charts.sentiment) state.charts.sentiment.destroy();

            state.charts.trend = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: data.trend.labels,
                    datasets: [{
                        label: 'Rating Trend',
                        data: data.trend.data,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { min: 1, max: 5 } } }
            });

            state.charts.sentiment = new Chart(sentCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Pos', 'Neu', 'Neg'],
                    datasets: [{
                        data: [data.sentiment.Positive, data.sentiment.Neutral, data.sentiment.Negative],
                        backgroundColor: ['#10b981', '#64748b', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        function handleLogout() { window.location.href = '/login'; }
    </script>
</body>
</html>
