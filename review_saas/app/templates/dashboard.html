<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ===================================================== -->
<!-- MAIN DASHBOARD SCRIPT -->
<!-- ===================================================== -->

<script>

let chartInstances = {};
let reviewsDataTable = null;

// =====================================================
// ESCAPE HTML
// =====================================================

function escapeHtml(str) {

    if (!str) return '';

    return str.replace(/[&<>]/g, (m) => (
        {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;'
        }[m]
    ));
}

// =====================================================
// LOAD COMPANIES
// =====================================================

async function loadCompanies() {

    try {

        console.log("🔄 Loading companies...");

        const res = await fetch("/api/companies");

        const data = await res.json();

        const sel = document.getElementById("companySelect");

        let companies = Array.isArray(data)
            ? data
            : (data.companies || data.data || []);

        if (companies.length > 0) {

            sel.innerHTML = companies.map(c => `
                <option value="${c.id}">
                    ${escapeHtml(c.name || c.business_name)}
                </option>
            `).join("");

            console.log(`✅ Loaded ${companies.length} companies`);

            setTimeout(() => {
                triggerAllLoads();
            }, 500);

        } else {

            sel.innerHTML =
                '<option value="">No businesses found</option>';
        }

    } catch (e) {

        console.error("❌ Company load failed:", e);

        document.getElementById("companySelect").innerHTML =
            '<option value="">Failed to load</option>';
    }
}

// =====================================================
// LOAD LATEST REVIEWS
// =====================================================

async function loadLatestReviews(companyId) {

    if (!companyId) return;

    try {

        console.log(`🔄 Loading reviews for ${companyId}`);

        const response = await fetch(
            `/api/dashboard/latest-reviews?company_id=${companyId}&limit=100`
        );

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const reviews = await response.json();

        const tbody =
            document.getElementById("reviewsTbody");

        if (!reviews || reviews.length === 0) {

            tbody.innerHTML = `
                <tr>
                    <td colspan="5"
                        class="text-center text-muted py-4">
                        No reviews found
                    </td>
                </tr>
            `;

            return;
        }

        let html = '';

        reviews.forEach(r => {

            let badgeClass =
                `badge-${r.sentiment || 'neutral'}`;

            let stars =
                '★'.repeat(r.rating || 0) +
                '☆'.repeat(5 - (r.rating || 0));

            let reviewDate =
                r.review_date
                    ? r.review_date.split('T')[0]
                    : 'N/A';

            let reviewText =
                r.review_text || "No content";

            let truncatedText =
                reviewText.length > 200
                    ? reviewText.substring(0, 200) + '...'
                    : reviewText;

            html += `
                <tr>

                    <td class="fw-bold text-warning">
                        ${stars} (${r.rating || '?'})
                    </td>

                    <td>
                        <span class="sentiment-badge ${badgeClass}">
                            ${(r.sentiment || 'neutral').toUpperCase()}
                        </span>
                    </td>

                    <td class="review-text">
                        ${escapeHtml(truncatedText)}
                    </td>

                    <td>${reviewDate}</td>

                    <td>
                        <i class="bi bi-google"></i> Google
                    </td>

                </tr>
            `;
        });

        tbody.innerHTML = html;

        if (reviewsDataTable) {
            reviewsDataTable.destroy();
        }

        reviewsDataTable = $('#reviewsTable').DataTable({

            order: [[3, 'desc']],

            pageLength: 10,

            language: {
                search: "🔍 Search:",
                lengthMenu:
                    "Show _MENU_ reviews",
                info:
                    "Showing _START_ to _END_ of _TOTAL_ reviews"
            }
        });

        console.log(`✅ Loaded ${reviews.length} reviews`);

    } catch (err) {

        console.error("❌ Review load failed:", err);

        document.getElementById("reviewsTbody").innerHTML = `
            <tr>
                <td colspan="5"
                    class="text-center text-danger py-4">
                    Failed to load reviews
                </td>
            </tr>
        `;
    }
}

// =====================================================
// MAIN DASHBOARD LOAD
// =====================================================

async function triggerAllLoads() {

    const cid =
        document.getElementById("companySelect").value;

    const start =
        document.getElementById("startDate").value || "";

    const end =
        document.getElementById("endDate").value || "";

    if (!cid) return;

    const loadBtn =
        document.getElementById("loadBtn");

    const originalText = loadBtn.innerHTML;

    loadBtn.disabled = true;

    loadBtn.innerHTML =
        `<span class="loading-spinner"></span> Loading...`;

    try {

        console.log(`📊 Loading dashboard for ${cid}`);

        const res = await fetch(
            `/api/dashboard/ai/insights?company_id=${cid}&start=${start}&end=${end}`
        );

        const data = await res.json();

        document.getElementById("kpiTotal").innerText =
            data.metadata?.total_reviews || 0;

        document.getElementById("kpiRating").innerText =
            data.kpis?.average_rating?.toFixed(1) || "—";

        document.getElementById("riskSentiment").innerText =
            (data.kpis?.reputation_score || 0) + "%";

        if (data.visualizations) {
            renderCharts(data.visualizations);
        }

        const revRes = await fetch(
            `/api/dashboard/revenue?company_id=${cid}`
        );

        const revData = await revRes.json();

        document.getElementById("riskPct").innerText =
            (revData.risk_percent || 0) + "%";

        document.getElementById("riskImpact").innerText =
            revData.impact || "N/A";

        await loadLatestReviews(cid);

        console.log("✅ Dashboard loaded");

    } catch (e) {

        console.error("❌ Dashboard load failed:", e);

    } finally {

        loadBtn.disabled = false;

        loadBtn.innerHTML = originalText;
    }
}

// =====================================================
// SYNC REVIEWS
// =====================================================

document.getElementById("syncBtn").onclick = async () => {

    const cid =
        document.getElementById("companySelect").value;

    const btn =
        document.getElementById("syncBtn");

    if (!cid) return;

    btn.disabled = true;

    btn.innerHTML =
        `<span class="loading-spinner"></span> Syncing...`;

    try {

        const res = await fetch(
            `/api/reviews/ingest/${cid}`,
            {
                method: 'POST'
            }
        );

        const result = await res.json();

        setTimeout(() => {

            triggerAllLoads();

            btn.disabled = false;

            btn.innerHTML = "Sync Live Data";

            alert(
                `✅ Sync Complete! Added ${result.reviews_count || 0} reviews`
            );

        }, 1500);

    } catch (e) {

        console.error("❌ Sync failed:", e);

        btn.disabled = false;

        btn.innerHTML = "Sync Live Data";

        alert("Sync failed");
    }
};

// =====================================================
// SAVE BUSINESS
// =====================================================

document.getElementById('addCompanyForm').onsubmit =
async (e) => {

    e.preventDefault();

    const payload = {

        name:
            document.getElementById('companyName').value,

        place_id:
            document.getElementById('placeId').value,

        address:
            document.getElementById('companyAddress').value
    };

    if (!payload.place_id) {

        alert("Please select a business");

        return;
    }

    try {

        const res = await fetch('/api/companies', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify(payload)
        });

        if (res.ok) {

            alert("✅ Business Added Successfully");

            location.reload();

        } else {

            const error = await res.json();

            alert(
                error.detail || "Failed to save"
            );
        }

    } catch (e) {

        console.error("❌ Save failed:", e);

        alert("Network error");
    }
};

// =====================================================
// GOOGLE AUTOCOMPLETE
// =====================================================

function initGoogleAutocomplete() {

    console.log("🚀 Initializing Google Autocomplete...");

    const input =
        document.getElementById("googleSearchInput");

    if (!input) {

        console.error("❌ Search input missing");

        return;
    }

    if (
        typeof google === "undefined" ||
        !google.maps ||
        !google.maps.places
    ) {

        console.log("⏳ Waiting for Google API...");

        setTimeout(initGoogleAutocomplete, 1000);

        return;
    }

    const autocomplete =
        new google.maps.places.Autocomplete(
            input,
            {
                fields: [
                    "place_id",
                    "name",
                    "formatted_address"
                ],
                types: ["establishment"]
            }
        );

    autocomplete.addListener("place_changed", () => {

        const place = autocomplete.getPlace();

        console.log("📍 Place Selected:", place);

        if (!place || !place.place_id) {

            alert("Invalid Google Place");

            return;
        }

        document.getElementById("companyName").value =
            place.name || "";

        document.getElementById("placeId").value =
            place.place_id || "";

        document.getElementById("companyAddress").value =
            place.formatted_address || "";

        console.log("✅ Autofill completed");
    });

    console.log("✅ Google Places Ready");
}

// =====================================================
// THEME TOGGLE
// =====================================================

document.getElementById("toggleTheme").onclick = () => {

    const current =
        document.documentElement.getAttribute("data-theme");

    const target =
        current === "light"
            ? "dark"
            : "light";

    document.documentElement.setAttribute(
        "data-theme",
        target
    );
};

// =====================================================
// INITIALIZE
// =====================================================

document.addEventListener("DOMContentLoaded", () => {

    console.log("🚀 Dashboard starting...");

    loadCompanies();

    setTimeout(() => {
        initGoogleAutocomplete();
    }, 1000);
});

</script>
