<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReviewSaaS - Strategic Dashboard</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <style>
    :root {
      --primary: #0d6efd;
      --primary-dark: #0b5ed7;
      --light-bg: #f8f9fa;
      --card-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    body {
      background: linear-gradient(135deg, var(--light-bg) 0%, #e9ecef 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    .card { border: none; border-radius: 16px; box-shadow: var(--card-shadow); transition: all 0.25s ease; }
    .kpi-card { border-radius: 14px; background: white; transition: transform 0.2s; padding: 1.5rem; text-align: center; }
    .aspect-card { border-radius: 12px; border-left: 6px solid; transition: all 0.3s; min-height: 110px; background: white; }
    /* Google Autocomplete Fix */
    .pac-container { z-index: 1051 !important; border-radius: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.15); }
    .readonly-field { background-color: #f1f3f5 !important; cursor: not-allowed; }
    .spinner, .success-msg, .nodata-msg, .error-msg { display: none; }
    .recommendation-badge { border-left: 5px solid var(--primary); background: #f0f9ff; padding: 12px; margin-bottom: 10px; border-radius: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold" href="/">Review<span class="text-primary">SaaS</span></a>
    <div class="d-flex gap-3 align-items-center">
      <button class="btn btn-primary btn-sm px-3" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
        <i class="fas fa-plus me-1"></i> Add Company
      </button>
      <a href="/logout" class="btn btn-warning btn-sm px-3">Logout</a>
    </div>
  </div>
</nav>

<div class="container py-5 px-3">
  <div class="card shadow mb-5">
    <div class="card-body p-4">
      <div class="row g-3 align-items-end">
        <div class="col-lg-4">
          <label class="form-label fw-semibold small text-muted">Select Business</label>
          <select class="form-select form-select-lg shadow-sm" id="companySelect"></select>
        </div>
        <div class="col-lg-2 d-grid">
          <button class="btn btn-primary btn-lg shadow" id="fetchBtn">Analyze</button>
        </div>
        <div class="col-lg-3">
          <label class="form-label fw-semibold small text-muted">Start Date</label>
          <input type="date" class="form-control form-control-lg shadow-sm" id="startDate">
        </div>
        <div class="col-lg-3">
          <label class="form-label fw-semibold small text-muted">End Date</label>
          <input type="date" class="form-control form-control-lg shadow-sm" id="endDate">
        </div>
      </div>
    </div>
  </div>

  <div id="loadingBox" class="alert alert-info spinner">Analyzing feedback...</div>
  <div id="successBox" class="alert alert-success success-msg">Dashboard updated successfully.</div>

  <div class="row g-4 mb-5">
    <div class="col-md-3"><div class="kpi-card shadow-sm">Total Reviews <h3 id="kpi-total" class="fw-bold mb-0">0</h3></div></div>
    <div class="col-md-3"><div class="kpi-card shadow-sm text-warning">Avg Rating <h3 id="kpi-rating" class="fw-bold mb-0">0.0</h3></div></div>
    <div class="col-md-3"><div class="kpi-card shadow-sm text-primary">Sentiment <h3 id="kpi-sent" class="fw-bold mb-0">0.000</h3></div></div>
    <div class="col-md-3"><div class="kpi-card shadow-sm text-danger">Complaints <h3 id="kpi-complaint-rate" class="fw-bold mb-0">0%</h3></div></div>
  </div>

  <div class="row g-4 mb-5">
    <div class="col-lg-8">
      <div class="card p-4 h-100">
        <h6 class="fw-bold mb-3"><i class="fas fa-chart-line me-2 text-primary"></i>Volume Trend</h6>
        <canvas id="seriesReviews" height="180"></canvas>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">Ratings Distribution</h6>
        <canvas id="ratingsDist" height="150"></canvas>
      </div>
      <div class="card p-4">
        <h6 class="fw-bold mb-3">Sentiment Trend</h6>
        <canvas id="sentSeries" height="150"></canvas>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card p-4 h-100">
        <h6 class="fw-bold mb-3"><i class="fas fa-brain me-2 text-primary"></i>Departmental Analysis</h6>
        <div class="row g-2" id="aspectsContainer"></div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">AI Recommendations</h6>
        <div id="recommendationsList"></div>
      </div>
      <div class="card p-4">
        <h6 class="fw-bold mb-3">Top Themes</h6>
        <div id="keywordsPositive" class="mb-2"></div>
        <div id="keywordsNegative"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="addCompanyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header text-white">
        <h5 class="modal-title fw-bold">Sync New Business via Google</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="form-label fw-bold">Search Business</label>
          <input type="text" class="form-control form-control-lg" id="placeSearch" placeholder="Start typing hotel name...">
        </div>
        <div id="placePreview" style="display:none;" class="p-3 bg-light rounded border">
          <div class="mb-2">
            <label class="small text-muted">Business Name</label>
            <input type="text" id="p_name" class="form-control readonly-field" readonly>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary fw-bold" id="saveCompanyBtn" disabled>Confirm & Sync</button>
      </div>
    </div>
  </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places"></script>

<script>
const el = {
  companySelect: document.getElementById('companySelect'),
  fetchBtn: document.getElementById('fetchBtn'),
  placeSearch: document.getElementById('placeSearch'),
  saveBtn: document.getElementById('saveCompanyBtn'),
  previewBox: document.getElementById('placePreview'),
  kpiTotal: document.getElementById('kpi-total'),
  kpiRating: document.getElementById('kpi-rating'),
  kpiSent: document.getElementById('kpi-sent'),
  kpiComplaint: document.getElementById('kpi-complaint-rate')
};

let selectedPlaceData = null;
let charts = {};

// 1. Init Google Autocomplete - Optimized for Company Name only
function initAutocomplete() {
    const autocomplete = new google.maps.places.Autocomplete(el.placeSearch, {
        fields: ["place_id", "name"]
    });

    autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.place_id) return;

        el.previewBox.style.display = 'block';
        document.getElementById('p_name').value = place.name;

        selectedPlaceData = {
            name: place.name,
            google_place_id: place.place_id
        };
        el.saveBtn.disabled = false;
    });
}

// 2. Save to Database
el.saveBtn.onclick = async () => {
    el.saveBtn.disabled = true;
    const res = await fetch('/api/companies/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(selectedPlaceData)
    });
    const data = await res.json();
    if (data.success) {
        location.reload();
    } else {
        alert(data.message);
        el.saveBtn.disabled = false;
    }
};

// 3. Fetch Data
async function fetchDashboard() {
    const cid = el.companySelect.value;
    if (!cid) return;

    document.getElementById('loadingBox').style.display = 'block';
    const q = new URLSearchParams({
        company_id: cid,
        start: document.getElementById('startDate').value,
        end: document.getElementById('endDate').value
    }).toString();

    try {
        const [kpis, revS, ratD, sentS, aspects, ops, themes, recs] = await Promise.all([
            fetch(`/api/kpis?${q}`).then(r => r.json()),
            fetch(`/api/series/reviews?${q}`).then(r => r.json()),
            fetch(`/api/ratings/distribution?${q}`).then(r => r.json()),
            fetch(`/api/sentiment/series?${q}`).then(r => r.json()),
            fetch(`/api/aspects/avg?${q}`).then(r => r.json()),
            fetch(`/api/operational/overview?${q}`).then(r => r.json()),
            fetch(`/api/keywords/themes?${q}`).then(r => r.json()),
            fetch(`/api/ai/recommendations?${q}`).then(r => r.json())
        ]);

        el.kpiTotal.innerText = kpis.total_reviews;
        el.kpiRating.innerText = kpis.avg_rating.toFixed(1);
        el.kpiSent.innerText = kpis.avg_sentiment.toFixed(3);
        el.kpiComplaint.innerText = ops.complaint_rate + '%';

        updateCharts(revS, ratD, sentS);
        renderAspects(aspects.aspects);

        document.getElementById('keywordsPositive').innerHTML = themes.positive_keywords.map(k => `<span class="badge bg-success-subtle text-success border border-success me-1">${k}</span>`).join('');
        document.getElementById('keywordsNegative').innerHTML = themes.negative_keywords.map(k => `<span class="badge bg-danger-subtle text-danger border border-danger me-1">${k}</span>`).join('');
        document.getElementById('recommendationsList').innerHTML = recs.top_action_items.map(r => `<div class="recommendation-badge">${r}</div>`).join('');

    } catch (e) { console.error(e); }
    document.getElementById('loadingBox').style.display = 'none';
}

function updateCharts(revS, ratD, sentS) {
    Object.values(charts).forEach(c => c.destroy());
    charts.rev = new Chart(document.getElementById('seriesReviews'), { type: 'line', data: { labels: revS.series.map(s => s.date), datasets: [{ label: 'Reviews', data: revS.series.map(s => s.value), borderColor: '#0d6efd', tension: 0.3 }] } });
    charts.dist = new Chart(document.getElementById('ratingsDist'), { type: 'bar', data: { labels: Object.keys(ratD.distribution), datasets: [{ label: 'Count', data: Object.values(ratD.distribution), backgroundColor: '#ffc107' }] } });
    charts.sent = new Chart(document.getElementById('sentSeries'), { type: 'line', data: { labels: sentS.series.map(s => s.date), datasets: [{ label: 'Sentiment', data: sentS.series.map(s => s.value), borderColor: '#6f42c1', tension: 0.3 }] }, options: { scales: { y: { min: -1, max: 1 } } } });
}

function renderAspects(asp) {
    const container = document.getElementById('aspectsContainer');
    container.innerHTML = '';
    Object.entries(asp).forEach(([key, val]) => {
        const color = val > 0.1 ? '#198754' : val < -0.1 ? '#dc3545' : '#ffc107';
        container.insertAdjacentHTML('beforeend', `
            <div class="col-4">
                <div class="card p-2 text-center aspect-card shadow-sm" style="border-left-color:${color}">
                    <small class="text-uppercase text-muted" style="font-size:0.6rem">${key}</small>
                    <div class="fw-bold" style="color:${color}">${val.toFixed(2)}</div>
                </div>
            </div>`);
    });
}

window.onload = async () => {
    initAutocomplete();
    const res = await fetch('/api/companies/list').then(r => r.json());
    if (res.companies && res.companies.length) {
        el.companySelect.innerHTML = res.companies.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        const end = new Date().toISOString().split('T')[0];
        const start = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
        document.getElementById('startDate').value = start;
        document.getElementById('endDate').value = end;
        fetchDashboard();
    }
};

el.fetchBtn.onclick = fetchDashboard;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
