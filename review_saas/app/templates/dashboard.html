  <script>
    /**
     * Requirement 9 & 10: State Management, Logging & Documentation
     */
    let chartInstances = {};
    let cachedReviews = [];
    let sortKey = 'date';
    let sortDir = 'desc';
    let currentPage = 1;

    // Requirement 9: Unified Logger
    const Logger = {
      info: (msg, data = '') => console.log(`[INFO] ${new Date().toLocaleTimeString()}: ${msg}`, data),
      error: (msg, err = '') => console.error(`[ERROR] ${new Date().toLocaleTimeString()}: ${msg}`, err),
      api: (url, res) => console.log(`[API RESPONSE] ${url}:`, res)
    };

    /**
     * Requirement 1 & 6: CORE INITIALIZATION
     */
    (function initApp() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      
      document.getElementById('toggleTheme').addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        Object.values(chartInstances).forEach(c => c.update());
      });
    })();

    function notify(msg, variant = 'danger') {
      const host = document.getElementById('alertHost');
      const id = 'alert-' + Date.now();
      host.insertAdjacentHTML('beforeend', `
        <div id="${id}" class="alert alert-${variant} alert-dismissible fade show shadow-sm" role="alert">
          ${msg} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>`);
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) bootstrap.Alert.getOrCreateInstance(el).close();
      }, 5000);
    }

    /**
     * Requirement 7: OPTIMIZED FETCH ENGINE (RETRY LOGIC)
     */
    async function apiRequest(url, options = {}, retries = 2) {
      Logger.info(`Requesting: ${url}`);
      for (let i = 0; i <= retries; i++) {
        try {
          const res = await fetch(url, { ...options, credentials: "include" });
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          const data = await res.json();
          Logger.api(url, data);
          return data;
        } catch (err) {
          if (i === retries) {
            Logger.error(`Request Failed: ${url}`, err);
            throw err;
          }
          await new Promise(r => setTimeout(r, 500 * Math.pow(2, i)));
        }
      }
    }

    /**
     * Requirement 2: GOOGLE API AUTO-FETCH (FIXED PROXY)
     */
    const proxyInput = document.getElementById('proxySearchInput');
    const proxyResults = document.getElementById('proxyResults');
    const proxyLoader = document.getElementById('proxyLoader');
    let searchDebounce = null;

    proxyInput.addEventListener('input', () => {
      clearTimeout(searchDebounce);
      const query = proxyInput.value.trim();
      if (query.length < 3) { proxyResults.style.display = 'none'; return; }

      proxyLoader.classList.remove('d-none');
      // Requirement 7: Optimized debounced call to reduce API hits
      searchDebounce = setTimeout(async () => {
        try {
          const data = await apiRequest(`/api/google_autocomplete?input=${encodeURIComponent(query)}`);
          renderProxyResults(data.predictions || []);
        } catch (e) {
          notify("Google Proxy search failed. Check API Key.", "warning");
        } finally {
          proxyLoader.classList.add('d-none');
        }
      }, 400);
    });

    function renderProxyResults(predictions) {
      proxyResults.innerHTML = '';
      if (!predictions.length) { proxyResults.style.display = 'none'; return; }
      predictions.forEach(p => {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        div.textContent = p.description;
        div.onclick = () => {
          document.getElementById('companyName').value = p.description.split(',')[0];
          document.getElementById('placeId').value = p.place_id;
          document.getElementById('companyAddress').value = p.description;
          proxyResults.style.display = 'none';
          proxyInput.value = '';
          Logger.info("Selected Location:", p.place_id);
        };
        proxyResults.appendChild(div);
      });
      proxyResults.style.display = 'block';
    }

    /**
     * Requirement 4: DYNAMIC DASHBOARD ENGINE
     */
    async function loadCompanies() {
      try {
        const data = await apiRequest('/api/companies');
        const sel = document.getElementById('companySelect');
        sel.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        document.getElementById('companyHelp').classList.toggle('d-none', data.length > 0);
      } catch (e) { notify("Failed to sync company portfolio."); }
    }

    async function loadReviews() {
      const companyId = document.getElementById('companySelect').value;
      if (!companyId) return notify("Select a business first", "warning");

      const btn = document.getElementById('loadBtn');
      const spinner = document.getElementById('loadingSpinner');
      
      btn.disabled = true;
      spinner.style.display = 'inline-block';

      const params = new URLSearchParams({
        company_id: companyId,
        start: document.getElementById('startDate').value,
        end: document.getElementById('endDate').value,
        limit: document.getElementById('limitSelect').value
      });

      try {
        const res = await apiRequest(`/api/reviews?${params}`);
        cachedReviews = res.feed || [];
        updateDashboardUI(res);
        notify(`Dashboard synchronized with ${cachedReviews.length} records.`, "success");
      } catch (e) {
        notify("Network sync error. Check backend logs.");
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }

    function updateDashboardUI(data) {
      // 1. KPIs
      const total = cachedReviews.length;
      const avg = total ? cachedReviews.reduce((a, b) => a + b.rating, 0) / total : 0;
      const sent = (k) => cachedReviews.filter(r => r.sentiment_score !== null && (k === 'pos' ? r.sentiment_score > 0 : k === 'neg' ? r.sentiment_score < 0 : r.sentiment_score === 0)).length;

      document.getElementById('kpiTotal').textContent = total;
      document.getElementById('kpiRating').textContent = avg.toFixed(1);
      document.getElementById('kpiPos').textContent = sent('pos');
      document.getElementById('kpiNeu').textContent = sent('neu');
      document.getElementById('kpiNeg').textContent = sent('neg');

      // 2. Charts & Table
      renderCharts();
      renderTablePage(1);

      // 3. AI Summary
      document.getElementById('aiSummary').textContent = total > 0 
        ? `Strategic analysis of ${total} records indicates a ${avg > 4 ? 'strong' : 'moderate'} reputation score. Focus on high-frequency keywords in recent sentiment.` 
        : "Insufficient data for strategic analysis.";
    }

    function renderCharts() {
      Object.values(chartInstances).forEach(c => c.destroy());
      
      const create = (id, type, data, options = {}) => {
        const ctx = document.getElementById(id).getContext('2d');
        chartInstances[id] = new Chart(ctx, { 
          type, data, options: { responsive: true, maintainAspectRatio: false, ...options } 
        });
      };

      // Distribution
      const dist = [1,2,3,4,5].map(n => cachedReviews.filter(r => Math.round(r.rating) === n).length);
      create('chartDistribution', 'bar', {
        labels: ['1★','2★','3★','4★','5★'],
        datasets: [{ label: 'Reviews', data: dist, backgroundColor: '#0d6efd' }]
      });

      // Trend
      const dates = [...new Set(cachedReviews.map(r => r.review_time))].sort();
      create('chartTrend', 'line', {
        labels: dates,
        datasets: [{
          label: 'Volume', data: dates.map(d => cachedReviews.filter(r => r.review_time === d).length),
          borderColor: '#0d6efd', fill: true, backgroundColor: 'rgba(13,110,253,0.1)'
        }]
      });

      // Sentiment Pie
      const sentData = [
        cachedReviews.filter(r => (r.sentiment_score||0) > 0).length,
        cachedReviews.filter(r => (r.sentiment_score||0) === 0).length,
        cachedReviews.filter(r => (r.sentiment_score||0) < 0).length
      ];
      create('chartSentiment', 'doughnut', {
        labels: ['Pos', 'Neu', 'Neg'],
        datasets: [{ data: sentData, backgroundColor: ['#198754', '#6c757d', '#dc3545'] }]
      });

      Logger.info("Charts re-rendered dynamically.");
    }

    /**
     * Requirement 4 & 5: TABLE MANAGEMENT
     */
    function renderTablePage(page) {
      const pSize = parseInt(document.getElementById('pageSizeSelect').value);
      currentPage = page;
      
      const sorted = [...cachedReviews].sort((a,b) => {
        let vA = a[sortKey], vB = b[sortKey];
        if (sortKey === 'date') { vA = new Date(a.review_time); vB = new Date(b.review_time); }
        return sortDir === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
      });

      const slice = sorted.slice((page-1)*pSize, page*pSize);
      const tbody = document.getElementById('reviewsTable');
      
      tbody.innerHTML = slice.map(r => `
        <tr>
          <td><img src="${r.profile_photo_url || ''}" class="rounded-circle me-2" width="24" onerror="this.style.display='none'"> <strong>${r.author_name}</strong></td>
          <td><span class="badge bg-primary">${r.rating} ★</span></td>
          <td><span class="text-uppercase small fw-bold ${r.sentiment_score > 0 ? 'sent-pos' : r.sentiment_score < 0 ? 'sent-neg' : 'sent-neu'}">${r.sentiment_score > 0 ? 'Positive' : r.sentiment_score < 0 ? 'Negative' : 'Neutral'}</span></td>
          <td class="small">${r.review_time}</td>
          <td class="small text-wrap" style="max-width:350px">${r.text || 'No comment provided.'}</td>
        </tr>`).join('') || '<tr><td colspan="5" class="text-center">No results found.</td></tr>';

      const totalP = Math.ceil(cachedReviews.length / pSize) || 1;
      document.getElementById('pageInfo').textContent = `Page ${page} of ${totalP}`;
      document.getElementById('pagePrev').disabled = page === 1;
      document.getElementById('pageNext').disabled = page >= totalP;
    }

    // Sort Handlers
    document.querySelectorAll('th[data-sort]').forEach(th => {
      th.onclick = () => {
        sortDir = (sortKey === th.dataset.sort && sortDir === 'desc') ? 'asc' : 'desc';
        sortKey = th.dataset.sort;
        renderTablePage(1);
      };
    });

    /**
     * Requirement 2: ADD COMPANY (POST)
     */
    document.getElementById('addCompanyForm').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        name: document.getElementById('companyName').value,
        place_id: document.getElementById('placeId').value,
        address: document.getElementById('companyAddress').value
      };

      try {
        await apiRequest('/api/companies', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        notify("Business added to portfolio.", "success");
        bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();
        loadCompanies();
      } catch (err) {
        notify("Failed to add company. Is Place ID valid?", "danger");
      }
    };

    // Event Registration
    document.getElementById('loadBtn').onclick = loadReviews;
    document.getElementById('pagePrev').onclick = () => renderTablePage(currentPage - 1);
    document.getElementById('pageNext').onclick = () => renderTablePage(currentPage + 1);
    document.getElementById('pageSizeSelect').onchange = () => renderTablePage(1);

    // Initial Load
    window.onload = loadCompanies;
  </script>
</body>
</html>
