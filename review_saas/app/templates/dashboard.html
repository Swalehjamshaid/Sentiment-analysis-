<!-- GOOGLE MAPS -->

<script>

window.initGoogleAutocomplete = function () {

    console.log('Google Autocomplete Starting');

    const input = document.getElementById('googleSearchInput');

    if (!input) {
        console.error('Input not found');
        return;
    }

    if (
        typeof google === 'undefined' ||
        !google.maps ||
        !google.maps.places
    ) {
        console.error('Google Places API failed');
        return;
    }

    const autocomplete = new google.maps.places.Autocomplete(input, {
        types: ['establishment'],
        fields: ['place_id','name','formatted_address']
    });

    autocomplete.addListener('place_changed', function () {

        const place = autocomplete.getPlace();

        if (!place || !place.place_id) {
            alert('Invalid Place');
            return;
        }

        document.getElementById('companyName').value = place.name || '';
        document.getElementById('placeId').value = place.place_id || '';
        document.getElementById('companyAddress').value = place.formatted_address || '';

        console.log('Autofill success');
    });

    console.log('Google Places Ready');
};

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&callback=initGoogleAutocomplete">
</script>

<script>

let chartInstances = {};

async function loadCompanies() {

    try {

        const res = await fetch('/api/companies');

        const data = await res.json();

        const companies = Array.isArray(data)
            ? data
            : (data.companies || []);

        const select = document.getElementById('companySelect');

        select.innerHTML = companies.map(c => `
            <option value="${c.id}">
                ${c.name || c.business_name}
            </option>
        `).join('');

        if (companies.length > 0) {
            triggerAllLoads();
        }

    } catch (e) {
        console.error(e);
    }
}

function renderCharts() {

    const emotionsCtx = document.getElementById('chartEmotions');

    if (chartInstances.emotions) {
        chartInstances.emotions.destroy();
    }

    chartInstances.emotions = new Chart(emotionsCtx, {

        type: 'radar',

        data: {
            labels: ['Joy','Anger','Trust','Fear','Sadness'],
            datasets: [{
                label: 'Emotion Score',
                data: [78,22,61,19,35],
                backgroundColor: 'rgba(124,58,237,0.2)',
                borderColor: '#7c3aed',
                borderWidth: 2
            }]
        }
    });

    const monthlyCtx = document.getElementById('chartMonthly');

    if (chartInstances.monthly) {
        chartInstances.monthly.destroy();
    }

    chartInstances.monthly = new Chart(monthlyCtx, {

        type: 'line',

        data: {
            labels: ['Jan','Feb','Mar','Apr','May'],
            datasets: [{
                label: 'Sentiment',
                data: [70,75,78,81,88],
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37,99,235,0.1)',
                fill: true,
                tension: 0.4
            }]
        }
    });

    const ratingsCtx = document.getElementById('chartRatings');

    if (chartInstances.ratings) {
        chartInstances.ratings.destroy();
    }

    chartInstances.ratings = new Chart(ratingsCtx, {

        type: 'bar',

        data: {
            labels: ['1★','2★','3★','4★','5★'],
            datasets: [{
                label: 'Reviews',
                data: [2,5,14,40,120],
                backgroundColor: '#10b981'
            }]
        }
    });
}

async function triggerAllLoads() {

    document.getElementById('kpiTotal').innerText = '181';
    document.getElementById('kpiRating').innerText = '4.8';
    document.getElementById('riskSentiment').innerText = '92%';
    document.getElementById('riskImpact').innerText = '8%';

    renderCharts();

    const tbody = document.getElementById('reviewsTbody');

    tbody.innerHTML = `

        <tr>
            <td>★★★★★</td>
            <td><span class="sentiment-positive">POSITIVE</span></td>
            <td>Excellent customer support and amazing service quality.</td>
            <td>2026-05-12</td>
            <td>Google</td>
        </tr>

        <tr>
            <td>★★★★☆</td>
            <td><span class="sentiment-neutral">NEUTRAL</span></td>
            <td>Delivery was good but packaging needs improvement.</td>
            <td>2026-05-11</td>
            <td>Google</td>
        </tr>

        <tr>
            <td>★★☆☆☆</td>
            <td><span class="sentiment-negative">NEGATIVE</span></td>
            <td>Late response from support team.</td>
            <td>2026-05-10</td>
            <td>Google</td>
        </tr>

    `;

    $('#reviewsTable').DataTable();
}

// SAVE BUSINESS

document.getElementById('addCompanyForm').onsubmit = async (e) => {

    e.preventDefault();

    const payload = {
        name: document.getElementById('companyName').value,
        place_id: document.getElementById('placeId').value,
        address: document.getElementById('companyAddress').value
    };

    if (!payload.place_id) {
        alert('Please select a business');
        return;
    }

    try {

        const res = await fetch('/api/companies', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            alert('Business Added Successfully');
            location.reload();
        } else {
            alert('Failed to save business');
        }

    } catch (e) {
        console.error(e);
    }
};

// LOAD BUTTON

document.getElementById('loadBtn').onclick = () => {
    triggerAllLoads();
};

// SYNC BUTTON

document.getElementById('syncBtn').onclick = async () => {

    const btn = document.getElementById('syncBtn');

    btn.innerHTML = '<span class="loading-spinner"></span> Syncing';

    setTimeout(() => {

        btn.innerHTML = '<i class="bi bi-check-circle me-2"></i> Sync Complete';

        triggerAllLoads();

    }, 2500);
};

// INITIALIZE

document.addEventListener('DOMContentLoaded', () => {

    loadCompanies();

    renderCharts();
});

</script>
