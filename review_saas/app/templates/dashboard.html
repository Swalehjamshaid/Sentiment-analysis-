<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReviewSaaS | Executive Portfolio Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b1220; 
            color: #f8fafc;
        }

        /* Railway-Safe Glassmorphism (using 0.5 instead of .5) */
        .glass { 
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(148, 163, 184, 0.18); 
            border-radius: 1.25rem; 
        }

        .kpi-card { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .kpi-card:hover { transform: translateY(-5px); border-bottom-color: #3b82f6; }
        .stat-value { font-size: 2rem; font-weight: 800; }
        
        .sidebar-card { position: sticky; top: 90px; height: calc(100vh - 120px); overflow-y: auto; }
        .list-group-item-action { transition: 0.2s; border: none !important; margin-bottom: 0.5rem; border-radius: 0.75rem !important; }
        .list-group-item-action.active { background-color: rgba(59, 130, 246, 0.2) !important; color: #60a5fa !important; }
    </style>
</head>
<body>

    <header class="border-bottom sticky-top bg-dark bg-opacity-75" style="backdrop-filter: blur(8px); z-index: 1050;">
        <nav class="navbar navbar-expand-lg container py-3">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i data-lucide="shield-check" class="text-primary"></i>
                <span class="fw-bold fs-4">Review<span class="text-primary">SaaS</span></span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <div class="text-end d-none d-md-block">
                    <div class="small fw-bold">Huda</div>
                    <div class="text-secondary" style="font-size: 0.7rem;">Active Session: 24/02/2026</div>
                </div>
                <button class="btn btn-primary btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
                    <i data-lucide="plus" size="16" class="me-1"></i> Add Company
                </button>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        <div class="row g-4">
            <aside class="col-lg-3">
                <div class="glass p-4 sidebar-card">
                    <div class="d-flex align-items-center justify-content-between mb-3">
                        <h6 class="fw-bold m-0 text-secondary uppercase small">Portfolio</h6>
                        <span id="coCount" class="badge bg-primary">0</span>
                    </div>
                    <div id="coList" class="list-group">
                        </div>
                </div>
            </aside>

            <div class="col-lg-9">
                <div class="glass p-3 mb-4 d-flex align-items-center justify-content-between flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <input type="date" id="startDate" class="form-control form-control-sm bg-transparent text-white" value="2026-01-01"/>
                        <span class="text-secondary small">to</span>
                        <input type="date" id="endDate" class="form-control form-control-sm bg-transparent text-white" value="2026-02-24"/>
                    </div>
                    <div class="d-flex gap-2">
                        <button id="btnLoad" class="btn btn-sm btn-primary">Analyze Range</button>
                        <button id="btnSync" class="btn btn-sm btn-outline-warning">
                            <i data-lucide="refresh-cw" size="14" class="me-1"></i> Google Sync
                        </button>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="glass p-3 kpi-card">
                            <small class="text-secondary fw-bold">TOTAL REVIEWS</small>
                            <div id="statTotal" class="stat-value text-white">0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3 kpi-card">
                            <small class="text-secondary fw-bold">AVG RATING</small>
                            <div id="statAvg" class="stat-value text-warning">0.0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3 kpi-card">
                            <small class="text-secondary fw-bold">RISK SCORE</small>
                            <div id="statRisk" class="stat-value text-danger">0</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3 kpi-card">
                            <small class="text-secondary fw-bold">MARKET SIGNAL</small>
                            <div id="statSignal" class="stat-value text-info" style="font-size: 1.1rem; padding-top: 15px;">WAITING...</div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-lg-8"><div class="glass p-4 h-100"><canvas id="chartTrend"></canvas></div></div>
                    <div class="col-lg-4"><div class="glass p-4 h-100"><canvas id="chartSent"></canvas></div></div>
                </div>

                <div class="glass p-4">
                    <h6 class="fw-bold mb-3">Live Feedback Stream</h6>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle">
                            <tbody id="revBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addCompanyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass p-4 text-white">
                <h5 class="fw-bold mb-3">Expand Portfolio</h5>
                <input id="acInput" class="form-control mb-2" placeholder="Start typing business name..."/>
                <div id="acList" class="list-group mb-3 small"></div>
                <input id="placeId" type="hidden" />
                <input id="coName" class="form-control mb-2" placeholder="Confirmed Name"/>
                <button id="coCreate" class="btn btn-primary w-100">Add to Portfolio</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const state = { activeId: null, charts: { trend: null, sent: null } };

        // 1. Fetch Company Portfolio
        async function loadCompanies() {
            const res = await fetch('/api/companies/');
            const data = await res.json();
            document.getElementById('coCount').innerText = data.length;
            const list = document.getElementById('coList');
            list.innerHTML = data.map(c => `
                <button class="list-group-item list-group-item-action glass text-white ${state.activeId == c.id ? 'active' : ''}" onclick="selectCompany(${c.id})">
                    <div class="fw-bold">${c.name}</div>
                    <div class="small text-secondary">${c.city || 'Global'}</div>
                </button>
            `).join('');
        }

        async function selectCompany(id) {
            state.activeId = id;
            loadCompanies(); // Update visual active state
            updateDashboard(id);
        }

        // 2. Fetch Intelligence Summary
        async function updateDashboard(id) {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            
            try {
                const res = await fetch(`/api/reviews/summary/${id}?start=${start}&end=${end}`);
                const data = await res.json();
                
                document.getElementById('statTotal').innerText = data.metrics.total;
                document.getElementById('statAvg').innerText = data.metrics.avg_rating.toFixed(1);
                document.getElementById('statRisk').innerText = data.metrics.risk_score;
                document.getElementById('statSignal').innerText = (data.trend.signal || 'stable').toUpperCase();
                
                renderCharts(data);
                renderTable(id);
            } catch (e) { console.error("UI Update Failed", e); }
        }

        function renderCharts(data) {
            const trendCtx = document.getElementById('chartTrend');
            if(state.charts.trend) state.charts.trend.destroy();
            state.charts.trend = new Chart(trendCtx, {
                type: 'line',
                data: { labels: data.trend.labels, datasets: [{ label: 'Velocity', data: data.trend.data, borderColor: '#3b82f6', tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] }
            });

            const sentCtx = document.getElementById('chartSent');
            if(state.charts.sent) state.charts.sent.destroy();
            state.charts.sent = new Chart(sentCtx, {
                type: 'doughnut',
                data: { labels: ['Pos', 'Neu', 'Neg'], datasets: [{ data: [data.sentiment.Positive, data.sentiment.Neutral, data.sentiment.Negative], backgroundColor: ['#10b981', '#64748b', '#ef4444'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function renderTable(id) {
            const res = await fetch(`/api/reviews/list/${id}?limit=8`);
            const data = await res.json();
            document.getElementById('revBody').innerHTML = data.items.map(r => `
                <tr class="border-transparent">
                    <td class="small text-white py-3">${r.text || 'No comment provided.'}</td>
                    <td class="small text-secondary px-3">${r.review_date.split('T')[0]}</td>
                    <td class="text-warning fw-bold">★${r.rating}</td>
                </tr>
            `).join('');
        }

        // 3. Google API Autocomplete Logic
        const acInput = document.getElementById('acInput');
        acInput.oninput = async () => {
            const q = acInput.value;
            if (q.length < 3) return;
            const res = await fetch(`/api/companies/autocomplete?q=${q}`);
            const preds = await res.json();
            document.getElementById('acList').innerHTML = preds.map(p => `
                <button class="list-group-item list-group-item-action small py-1" onclick="pickPlace('${p.place_id}', '${p.description}')">
                    ${p.description}
                </button>
            `).join('');
        };

        function pickPlace(pid, name) {
            document.getElementById('placeId').value = pid;
            document.getElementById('coName').value = name;
            document.getElementById('acList').innerHTML = "";
        }

        document.getElementById('coCreate').onclick = async () => {
            const payload = { name: document.getElementById('coName').value, place_id: document.getElementById('placeId').value };
            await fetch('/api/companies/', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();
            loadCompanies();
        };

        window.onload = loadCompanies;
    </script>
</body>
</html>
