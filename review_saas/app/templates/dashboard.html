<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World-Class Reviews Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/utc.js" defer></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/timezone.js" defer></script>
<style>
body { background:#f0f4f8; font-family:"Inter",sans-serif; }
.sidebar .list-group-item { cursor:pointer; transition: all 0.3s; }
.sidebar .list-group-item:hover { background:#e8f0fe; }
.kpi-card { border-radius:1rem; background:#fff; box-shadow:0 5px 15px rgba(0,0,0,0.05); padding:1rem; text-align:center; }
.chart-container { height:280px; }
.card-glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border-radius:1rem; box-shadow:0 8px 32px rgba(0,0,0,0.1); }
.badge-negative { background:#dc3545; color:#fff; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="#"><i class="bi bi-graph-up-arrow me-2"></i>Reviews Dashboard</a>
    <div class="d-flex gap-2 ms-auto">
      <button class="btn btn-outline-danger" id="btnLogout"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
    </div>
  </div>
</nav>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<div class="col-lg-3 col-12">
<div class="card card-glass sticky-top-20 mb-3 sidebar">
  <div class="card-header d-flex justify-content-between align-items-center">
    <strong>Companies</strong>
    <button class="btn btn-sm btn-primary" data-bs-toggle="collapse" data-bs-target="#addCompanySection"><i class="bi bi-plus-lg"></i></button>
  </div>
  <div class="card-body p-0">
    <div class="list-group list-group-flush" id="companyList">
      <div class="p-3 text-center text-muted" id="companiesEmpty">Loading companies…</div>
    </div>
    <div class="collapse border-top" id="addCompanySection">
      <div class="p-3">
        <input class="form-control mb-2" id="placeSearchInput" placeholder="Search Google Places…">
        <button class="btn btn-outline-secondary w-100 mb-2" id="btnPlaceSearch">Search</button>
        <input class="form-control mb-2" id="placeIdInput" placeholder="Place ID…">
        <button class="btn btn-success w-100" id="btnAddPlaceId">Add</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Main -->
<div class="col-lg-9 col-12">

<!-- Filters & Export -->
<div class="card card-glass mb-3 p-3 d-flex flex-wrap align-items-end gap-2">
  <div><label>Date Start</label><input type="date" class="form-control" id="filterStart" /></div>
  <div><label>Date End</label><input type="date" class="form-control" id="filterEnd" /></div>
  <div><label>Search Text</label><input class="form-control" id="filterQuery" placeholder="Keyword…" /></div>
  <div class="d-grid"><button class="btn btn-primary" id="btnApplyFilters">Apply Filters</button></div>
  <div class="d-grid"><button class="btn btn-success" id="btnExportCSV"><i class="bi bi-file-earmark-spreadsheet me-1"></i> Export CSV</button></div>
</div>

<!-- AI Summary -->
<div class="card card-glass mb-3 p-3">
  <strong>AI Summary & Recommendations</strong>
  <div id="aiSummary" class="mt-2 text-muted">Select a company and date range.</div>
</div>

<!-- KPIs -->
<div class="row g-3 mb-3">
  <div class="col-md-3"><div class="kpi-card"><div>Total Reviews</div><div id="kpiTotal" class="fs-3 fw-bold">—</div></div></div>
  <div class="col-md-3"><div class="kpi-card"><div>Average Rating</div><div id="kpiAvg" class="fs-3 fw-bold">—</div></div></div>
  <div class="col-md-3"><div class="kpi-card"><div>Risk Score</div><div id="kpiRisk" class="fs-3 fw-bold">—</div></div></div>
</div>

<!-- Charts -->
<div class="row g-3 mb-3">
  <div class="col-md-6"><div class="card card-glass p-3 chart-container"><canvas id="chartTrend"></canvas></div></div>
  <div class="col-md-6"><div class="card card-glass p-3 chart-container"><canvas id="chartSentiment"></canvas></div></div>
</div>

<!-- Reviews Table -->
<div class="card card-glass p-3 mb-5">
  <strong>Reviews</strong>
  <div class="table-responsive mt-2">
    <table class="table table-borderless">
      <thead><tr><th>Rating</th><th>Comment</th><th>Reviewer</th><th>Date</th></tr></thead>
      <tbody id="reviewsTbody"><tr><td colspan="4" class="text-center text-muted">No data</td></tr></tbody>
    </table>
  </div>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const state={companies:[],currentCompanyId:null,reviewsPage:1,reviewsLimit:50,charts:{trend:null,sentiment:null},reviewsData:[]};

// Toast
function toast(msg){alert(msg);}

// API Fetch
async function apiFetch(path,opt={}){const res=await fetch(path,opt);if(!res.ok)throw new Error('HTTP '+res.status);return res.json();}

// Companies
async function loadCompanies(){state.companies=await apiFetch('/api/companies?status=active');renderCompanyList();}
function renderCompanyList(){const list=document.getElementById('companyList');list.innerHTML='';state.companies.forEach(c=>{const div=document.createElement('div');div.className='list-group-item';div.innerText=c.name;div.draggable=true;div.addEventListener('click',()=>selectCompany(c.id));div.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',c.id));div.addEventListener('dragover',e=>e.preventDefault());div.addEventListener('drop',e=>{e.preventDefault();const draggedId=e.dataTransfer.getData('text/plain');reorderCompanies(draggedId,c.id);});list.appendChild(div);});}
function reorderCompanies(fromId,toId){const fIdx=state.companies.findIndex(c=>c.id==fromId),tIdx=state.companies.findIndex(c=>c.id==toId);if(fIdx<0||tIdx<0)return;const [item]=state.companies.splice(fIdx,1);state.companies.splice(tIdx,0,item);renderCompanyList();}

// Select company
async function selectCompany(id){state.currentCompanyId=id;await refreshDashboard();}

// Refresh Dashboard
async function refreshDashboard(){if(!state.currentCompanyId)return;const start=document.getElementById('filterStart').value,end=document.getElementById('filterEnd').value,q=document.getElementById('filterQuery').value;try{const summary=await apiFetch(`/api/reviews/summary/${state.currentCompanyId}?start=${start}&end=${end}`);document.getElementById('kpiTotal').innerText=summary.metrics.total||0;document.getElementById('kpiAvg').innerText=(summary.metrics.avg_rating||0).toFixed(2);document.getElementById('kpiRisk').innerText=(summary.metrics.risk_score||0).toFixed(1);renderTrend(summary.daily_series.map(d=>d.date),summary.daily_series.map(d=>d.avg_rating));renderSentiment(summary.sentiment);state.reviewsData=await apiFetch(`/api/reviews/list/${state.currentCompanyId}?page=1&limit=500&start=${start}&end=${end}&q=${q}`);renderReviewsTable(state.reviewsData.items||[]);document.getElementById('aiSummary').innerText=`Total ${summary.metrics.total} reviews. Avg Rating: ${summary.metrics.avg_rating}. Negative reviews: ${summary.sentiment.Negative}. Act: Respond to negative feedback.`;}catch(err){toast(err.message);}}

// Charts
function destroyChart(ref){if(ref&&ref.destroy)ref.destroy();}
function renderTrend(labels,data){const ctx=document.getElementById('chartTrend');destroyChart(state.charts.trend);state.charts.trend=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'Avg Rating',data,borderColor:'#0d6efd',backgroundColor:'rgba(13,110,253,0.1)',tension:0.3,fill:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:5}}}});}
function renderSentiment({Positive,Neutral,Negative}){const ctx=document.getElementById('chartSentiment');destroyChart(state.charts.sentiment);state.charts.sentiment=new Chart(ctx,{type:'doughnut',data:{labels:['Positive','Neutral','Negative'],datasets:[{data:[Positive,Neutral,Negative],backgroundColor:['#198754','#6c757d','#dc3545']}]} ,options:{responsive:true,plugins:{legend:{position:'bottom'}}}});}

// Reviews Table
function renderReviewsTable(items){const tbody=document.getElementById('reviewsTbody');tbody.innerHTML='';if(!items.length){tbody.innerHTML='<tr><td colspan="4" class="text-center text-muted">No reviews</td></tr>';return;}items.forEach(r=>{const tr=document.createElement('tr');const cls=r.rating<=2?'badge-negative':'';tr.innerHTML=`<td><span class="${cls}">${r.rating}</span></td><td>${r.text}</td><td>${r.reviewer_name||'-'}</td><td>${r.review_date}</td>`;tbody.appendChild(tr);});}

// CSV Export
document.getElementById('btnExportCSV').addEventListener('click',()=>{if(!state.reviewsData?.items?.length){toast('No reviews to export');return;}const rows=[['Rating','Comment','Reviewer','Date']];state.reviewsData.items.forEach(r=>rows.push([r.rating,r.text,r.reviewer_name||'',r.review_date]));const csv='data:text/csv;charset=utf-8,'+rows.map(r=>r.map(c=>'"'+c.toString().replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href=csv;a.download='reviews.csv';a.click();});

// Filters
document.getElementById('btnApplyFilters').addEventListener('click',()=>refreshDashboard());

// Logout
document.getElementById('btnLogout').addEventListener('click',()=>{alert('Logged out');});

// Init
window.addEventListener('DOMContentLoaded',()=>{loadCompanies();document.getElementById('filterStart').value='2026-02-23';document.getElementById('filterEnd').value=new Date().toISOString().split('T')[0];});
</script>
</body>
</html>
