<!-- filename: templates/dashbord.html -->
<!doctype html>
<html lang="en" data-color-scheme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — ReviewSaaS</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Icons (for small UI touches) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --card-bg: #ffffff;
      --body-bg: #f5f6f8;
      --text-color: #111827;
      --muted-text: #6b7280;
      --border-color: #e5e7eb;
      --accent: #0d6efd;
    }
    html[data-color-scheme="dark"] {
      --card-bg: #111318;
      --body-bg: #0b0d12;
      --text-color: #e5e7eb;
      --muted-text: #9ca3af;
      --border-color: #1f2937;
      --accent: #60a5fa;
    }
    body {
      background: var(--body-bg);
      color: var(--text-color);
    }
    .navbar, .offcanvas, .dropdown-menu {
      background: var(--card-bg) !important;
      color: var(--text-color) !important;
      border-bottom: 1px solid var(--border-color);
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    .text-muted { color: var(--muted-text) !important; }
    .form-control, .form-select, .list-group-item {
      background: var(--card-bg);
      color: var(--text-color);
      border-color: var(--border-color);
    }
    .list-group-item { border-color: var(--border-color); }
    .btn-accent {
      background: var(--accent);
      color: #fff;
      border: none;
    }
    .btn-accent:hover { filter: brightness(1.05); }
    .kpi-value {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .kpi-label {
      font-size: 0.9rem;
      color: var(--muted-text);
    }
    .toggle {
      cursor: pointer;
    }

    /* Autocomplete dropdown */
    .autocomplete-menu {
      position: absolute;
      z-index: 1055;
      width: 100%;
      max-height: 260px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      background: var(--card-bg);
      display: none;
    }
    .autocomplete-item {
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover { background: rgba(13,110,253,0.08); }

    .chart-card {
      min-height: 380px;
      display: flex;
      flex-direction: column;
    }
    .chart-wrap { position: relative; flex: 1; }
  </style>
</head>
<body>
  <!-- Top Nav -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/dashboard">
        <i class="bi bi-graph-up-arrow me-2"></i>ReviewSaaS
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <button id="themeToggle" class="btn btn-outline-secondary btn-sm toggle" title="Toggle dark/light">
          <i class="bi bi-moon-stars"></i>
        </button>
        <a class="btn btn-outline-primary btn-sm" href="/logout">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <!-- KPI Row -->
    <div class="row g-3">
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="kpi-label">Total Reviews</div>
              <div id="kpi_total_reviews" class="kpi-value">—</div>
            </div>
            <div class="text-primary fs-3"><i class="bi bi-chat-dots"></i></div>
          </div>
          <div class="text-muted small mt-2" id="kpi_total_reviews_delta"></div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="kpi-label">New Reviews</div>
              <div id="kpi_new_reviews" class="kpi-value">—</div>
            </div>
            <div class="text-success fs-3"><i class="bi bi-stars"></i></div>
          </div>
          <div class="text-muted small mt-2" id="kpi_new_reviews_delta"></div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="kpi-label">Avg Rating</div>
              <div id="kpi_avg_rating" class="kpi-value">—</div>
            </div>
            <div class="text-warning fs-3"><i class="bi bi-star-half"></i></div>
          </div>
          <div class="text-muted small mt-2" id="kpi_avg_rating_delta"></div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <div class="kpi-label">Response Rate</div>
              <div id="kpi_response_rate" class="kpi-value">—</div>
            </div>
            <div class="text-info fs-3"><i class="bi bi-reply-all"></i></div>
          </div>
          <div class="text-muted small mt-2" id="kpi_response_rate_delta"></div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-3 mt-1">
      <div class="col-12 col-lg-8">
        <div class="card chart-card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Reviews Trend</h5>
            <div>
              <select id="trend_range" class="form-select form-select-sm" style="width:auto;display:inline-block;">
                <option value="7">Last 7 days</option>
                <option value="14" selected>Last 14 days</option>
                <option value="30">Last 30 days</option>
              </select>
            </div>
          </div>
          <div class="chart-wrap mt-3">
            <canvas id="chart_trend"></canvas>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="card chart-card p-3">
          <h5>Category Mix</h5>
          <div class="chart-wrap mt-3">
            <canvas id="chart_mix"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Company Add + Activity -->
    <div class="row g-3 mt-1">
      <div class="col-12 col-lg-6">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Add Company (via Google Places)</h5>
          </div>
          <div class="mt-3 position-relative">
            <label class="form-label">Search</label>
            <input id="company_search" type="text" class="form-control" placeholder="Type business name or address..." autocomplete="off" />
            <div id="autocomplete_menu" class="autocomplete-menu"></div>
            <div id="search_help" class="form-text">Country bias: <code>pk</code>. Adjust in code if needed.</div>
          </div>

          <form id="company_form" class="mt-3">
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input id="c_name" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Place ID</label>
                <input id="c_place_id" class="form-control" readonly />
              </div>
              <div class="col-md-12">
                <label class="form-label">Address</label>
                <input id="c_address" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input id="c_phone" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Website</label>
                <input id="c_website" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Rating</label>
                <input id="c_rating" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Reviews Count</label>
                <input id="c_reviews" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Latitude</label>
                <input id="c_lat" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Longitude</label>
                <input id="c_lng" class="form-control" />
              </div>
            </div>
            <div class="mt-3 d-flex gap-2">
              <button type="submit" class="btn btn-accent">
                <i class="bi bi-plus-circle me-1"></i> Create
              </button>
              <button type="button" id="reset_form" class="btn btn-outline-secondary">Reset</button>
            </div>
            <div id="company_status" class="form-text mt-2"></div>
          </form>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Recent Activity</h5>
            <a class="btn btn-sm btn-outline-secondary" href="/api/export/activity.xlsx" target="_blank">
              <i class="bi bi-download me-1"></i>Export Excel
            </a>
          </div>
          <ul id="activity_list" class="list-group list-group-flush mt-2"></ul>
          <div class="text-center">
            <a class="btn btn-link mt-2" href="/api/activity?limit=100" target="_blank">View raw</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // --------------------------
    // Theme (dark / light)
    // --------------------------
    const rootEl = document.documentElement;
    const THEME_KEY = "rs_theme";
    function applyTheme(theme) {
      rootEl.setAttribute("data-color-scheme", theme);
      // Chart.js theme sync
      if (window._charts) {
        window._charts.forEach(ch => {
          if (!ch) return;
          ch.options.scales.x.ticks.color = getComputedStyle(document.documentElement).getPropertyValue('--text-color');
          ch.options.scales.y.ticks.color = getComputedStyle(document.documentElement).getPropertyValue('--text-color');
          ch.options.plugins.legend.labels.color = getComputedStyle(document.documentElement).getPropertyValue('--text-color');
          ch.update();
        });
      }
    }
    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY) || "light";
      applyTheme(saved);
    }
    function toggleTheme() {
      const current = rootEl.getAttribute("data-color-scheme") || "light";
      const next = current === "light" ? "dark" : "light";
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    }
    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    initTheme();

    // --------------------------
    // Utilities
    // --------------------------
    async function httpGetJSON(url) {
      const res = await fetch(url, { credentials: "include" });
      if (!res.ok) {
        let msg = await res.text();
        try { const j = JSON.parse(msg); msg = j.detail ? JSON.stringify(j.detail) : JSON.stringify(j); } catch {}
        throw new Error(`GET ${url} failed: ${res.status} ${msg}`);
      }
      return await res.json();
    }
    async function httpPostJSON(url, payload) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        let msg = await res.text();
        try { const j = JSON.parse(msg); msg = j.detail ? JSON.stringify(j.detail) : JSON.stringify(j); } catch {}
        throw new Error(`POST ${url} failed: ${res.status} ${msg}`);
      }
      return await res.json();
    }
    function fmtPct(v, digits=1) { return (v*100).toFixed(digits) + "%"; }
    function $(id) { return document.getElementById(id); }

    // --------------------------
    // KPIs
    // --------------------------
    async function loadKPIs() {
      try {
        const data = await httpGetJSON("/api/kpis");
        // expected fields (adjust if your backend differs):
        // total_reviews, new_reviews, avg_rating, response_rate
        // deltas (optional): total_reviews_delta, new_reviews_delta, avg_rating_delta, response_rate_delta
        $("kpi_total_reviews").textContent = data.total_reviews ?? "—";
        $("kpi_new_reviews").textContent   = data.new_reviews ?? "—";
        $("kpi_avg_rating").textContent    = (data.avg_rating ?? "—");
        $("kpi_response_rate").textContent = data.response_rate != null ? fmtPct(data.response_rate) : "—";

        $("kpi_total_reviews_delta").textContent = data.total_reviews_delta != null ? `Δ ${data.total_reviews_delta}` : "";
        $("kpi_new_reviews_delta").textContent   = data.new_reviews_delta != null ? `Δ ${data.new_reviews_delta}` : "";
        $("kpi_avg_rating_delta").textContent    = data.avg_rating_delta != null ? `Δ ${data.avg_rating_delta}` : "";
        $("kpi_response_rate_delta").textContent = data.response_rate_delta != null ? `Δ ${fmtPct(data.response_rate_delta)}` : "";
      } catch (e) {
        console.error(e);
      }
    }

    // --------------------------
    // Charts
    // --------------------------
    window._charts = [];

    function chartColors() {
      const styles = getComputedStyle(document.documentElement);
      const text = styles.getPropertyValue('--text-color').trim() || '#111827';
      const grid = styles.getPropertyValue('--border-color').trim() || '#e5e7eb';
      return { text, grid };
    }

    let chartTrend = null;
    async function loadTrend(days=14) {
      try {
        const data = await httpGetJSON(`/api/orders/series?days=${days}`);
        const labels = data.labels || data.dates || [];
        const series = data.series || data.values || [];
        const { text, grid } = chartColors();

        if (chartTrend) chartTrend.destroy();
        chartTrend = new Chart(document.getElementById("chart_trend"), {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "Reviews",
              data: series,
              borderColor: "#0d6efd",
              backgroundColor: "rgba(13,110,253,0.15)",
              fill: true,
              tension: 0.35,
              pointRadius: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { grid: { color: grid }, ticks: { color: text }},
              y: { grid: { color: grid }, ticks: { color: text }}
            },
            plugins: {
              legend: { labels: { color: text }},
              tooltip: { mode: "index", intersect: false }
            }
          }
        });
        window._charts[0] = chartTrend;
      } catch (e) {
        console.error(e);
      }
    }

    let chartMix = null;
    async function loadCategoryMix() {
      try {
        const data = await httpGetJSON("/api/category-mix");
        // Expect something like: { labels: ["Positive","Neutral","Negative"], values: [60,25,15] }
        const labels = data.labels || [];
        const values = data.values || [];
        const { text } = chartColors();

        if (chartMix) chartMix.destroy();
        chartMix = new Chart(document.getElementById("chart_mix"), {
          type: "doughnut",
          data: {
            labels,
            datasets: [{
              data: values,
              backgroundColor: ["#22c55e","#94a3b8","#ef4444"],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: "bottom", labels: { color: text } }
            },
            cutout: "60%"
          }
        });
        window._charts[1] = chartMix;
      } catch (e) {
        console.error(e);
      }
    }

    // --------------------------
    // Activity Feed
    // --------------------------
    async function loadActivity(limit=20) {
      try {
        const data = await httpGetJSON(`/api/activity?limit=${limit}`);
        const list = $("activity_list");
        list.innerHTML = "";
        (data.items || data || []).forEach(item => {
          const li = document.createElement("li");
          li.className = "list-group-item d-flex justify-content-between align-items-start";
          const title = item.title || item.event || "Event";
          const detail = item.detail || item.description || "";
          const ts = item.timestamp || item.ts || "";
          li.innerHTML = `
            <div class="ms-2 me-auto">
              <div class="fw-semibold">${title}</div>
              <div class="small text-muted">${detail}</div>
            </div>
            <span class="badge text-bg-secondary rounded-pill">${ts}</span>
          `;
          list.appendChild(li);
        });
      } catch (e) {
        console.error(e);
      }
    }

    // --------------------------
    // Google Places (via backend)
    // --------------------------
    const acInput   = $("company_search");
    const acMenu    = $("autocomplete_menu");
    const statusEl  = $("company_status");

    let acTimer = null;
    let acSessionToken = null; // optional; can be generated client-side to link calls

    function showMenu(show) {
      acMenu.style.display = show ? "block" : "none";
    }

    function renderPredictions(predictions) {
      acMenu.innerHTML = "";
      if (!predictions || predictions.length === 0) {
        showMenu(false);
        return;
      }
      predictions.forEach(p => {
        const div = document.createElement("div");
        div.className = "autocomplete-item";
        div.innerHTML = `<strong>${p.structured_formatting?.main_text || p.description}</strong><br/>
                         <span class="text-muted small">${p.structured_formatting?.secondary_text || ""}</span>`;
        div.addEventListener("click", () => onPredictionSelect(p));
        acMenu.appendChild(div);
      });
      showMenu(true);
    }

    async function onPredictionSelect(pred) {
      showMenu(false);
      acInput.value = pred.description || pred.structured_formatting?.main_text || "";
      // Fetch place details
      try {
        statusEl.textContent = "Fetching place details…";
        const fields = "place_id,name,formatted_address,geometry,international_phone_number,website,rating,user_ratings_total";
        const url = `/google/place-details?place_id=${encodeURIComponent(pred.place_id)}&fields=${encodeURIComponent(fields)}${acSessionToken ? `&sessiontoken=${encodeURIComponent(acSessionToken)}` : ""}`;
        const data = await httpGetJSON(url);
        const r = data.result || {};
        // Fill form
        $("c_name").value     = r.name || "";
        $("c_place_id").value = r.place_id || pred.place_id || "";
        $("c_address").value  = r.formatted_address || "";
        $("c_phone").value    = r.international_phone_number || "";
        $("c_website").value  = r.website || "";
        $("c_rating").value   = (r.rating != null ? r.rating : "");
        $("c_reviews").value  = (r.user_ratings_total != null ? r.user_ratings_total : "");
        const loc = r.geometry?.location || {};
        $("c_lat").value = (loc.lat != null ? loc.lat : "");
        $("c_lng").value = (loc.lng != null ? loc.lng : "");
        statusEl.textContent = "Place details loaded.";
      } catch (e) {
        console.error(e);
        statusEl.textContent = `Error: ${e.message}`;
      }
    }

    async function fetchAutocomplete(q) {
      const params = new URLSearchParams({
        input: q,
        components: "country:pk"
      });
      if (acSessionToken) params.set("sessiontoken", acSessionToken);
      const url = `/google/autocomplete?${params.toString()}`;
      const data = await httpGetJSON(url);
      return data.predictions || [];
    }

    acInput.addEventListener("input", () => {
      const q = acInput.value.trim();
      if (acTimer) clearTimeout(acTimer);
      if (!q) { showMenu(false); return; }
      acTimer = setTimeout(async () => {
        try {
          const preds = await fetchAutocomplete(q);
          renderPredictions(preds);
        } catch (e) {
          console.error(e);
          statusEl.textContent = `Autocomplete error: ${e.message}`;
        }
      }, 200);
    });

    document.addEventListener("click", (e) => {
      if (!acMenu.contains(e.target) && e.target !== acInput) showMenu(false);
    });

    // --------------------------
    // Company Form Submit
    // --------------------------
    $("company_form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        name: $("c_name").value.trim(),
        place_id: $("c_place_id").value.trim(),
        address: $("c_address").value.trim(),
        phone: $("c_phone").value.trim(),
        website: $("c_website").value.trim(),
        rating: Number($("c_rating").value || 0),
        reviews: Number($("c_reviews").value || 0),
        lat: Number($("c_lat").value || 0),
        lng: Number($("c_lng").value || 0),
      };
      try {
        statusEl.textContent = "Creating company…";
        // Adjust the endpoint if your backend differs
        const res = await httpPostJSON("/companies/create", payload);
        statusEl.textContent = "Company created successfully.";
      } catch (e2) {
        console.error(e2);
        statusEl.textContent = `Create failed: ${e2.message}`;
      }
    });

    $("reset_form").addEventListener("click", () => {
      document.getElementById("company_form").reset();
      $("c_place_id").value = "";
      $("company_status").textContent = "";
      $("company_search").value = "";
      showMenu(false);
    });

    // --------------------------
    // Init
    // --------------------------
    async function initDashboard() {
      await Promise.all([
        loadKPIs(),
        loadTrend(14),
        loadCategoryMix(),
        loadActivity(20)
      ]);
      $("trend_range").addEventListener("change", (e) => loadTrend(Number(e.target.value)));
      // Optional: ping Google health
      try {
        await httpGetJSON("/google/health");
      } catch (e) {
        console.warn("Google health failed:", e.message);
      }
    }

    document.addEventListener("DOMContentLoaded", initDashboard);
  </script>
</body>
</html>
