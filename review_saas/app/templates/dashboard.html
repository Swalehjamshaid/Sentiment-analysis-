<!-- FIX 1 — DASHBOARD KPI SYNCHRONIZATION -->
<!-- REPLACE INSIDE loadDashboardMetrics() -->

<script>

async function loadDashboardMetrics() {

    try {

        showLoading();

        const companyId =
            document.getElementById('companySelect').value;

        if (!companyId) {

            hideLoading();
            return;
        }

        const selectedDays =
            document.getElementById('dateRange').value;

        console.log(
            '📊 Timeline Selected:',
            selectedDays
        );

        const response = await fetch(
            `/api/dashboard/${companyId}?days=${selectedDays}`
        );

        const data = await response.json();

        console.log("📊 DASHBOARD DATA:", data);

        const kpis =
            data.kpis || {};

        // =====================================================
        // KPI MAPPING
        // =====================================================

        document.getElementById(
            'totalReviews'
        ).innerText =
            kpis.total_reviews || 0;

        document.getElementById(
            'avgRating'
        ).innerText =
            kpis.average_rating || 0;

        document.getElementById(
            'negativeReviews'
        ).innerText =
            kpis.negative_reviews || 0;

        document.getElementById(
            'reputation'
        ).innerText =
            `${kpis.reputation_score || 0}%`;

        document.getElementById(
            'revenueRisk'
        ).innerText =
            `${kpis.revenue_risk || 0}%`;

        document.getElementById(
            'sentimentScore'
        ).innerText =
            `${kpis.reputation_score || 0}%`;

        document.getElementById(
            'businessHealthScore'
        ).innerText =
            `${kpis.business_health || 0}%`;

        document.getElementById(
            'executiveRisk'
        ).innerText =
            kpis.executive_risk || "Moderate";

        document.getElementById(
            'predictedRating'
        ).innerText =
            kpis.predicted_rating || 0;

        document.getElementById(
            'forecastReviews'
        ).innerText =
            kpis.total_reviews || 0;

        // =====================================================
        // EXECUTIVE SUMMARY
        // =====================================================

        document.getElementById(
            'executiveSummary'
        ).innerHTML =
            data.ai_summary || `
            <div class="alert alert-info rounded-4">
                <h5>AI Executive Insights</h5>
                <hr>
                <p>No AI summary available.</p>
            </div>
        `;

        // =====================================================
        // CHARTS
        // =====================================================

        renderCharts(data);

        // =====================================================
        // REVIEWS
        // =====================================================

        await loadRecentReviews(companyId);

        hideLoading();

    } catch (err) {

        hideLoading();

        console.error(err);

        alert(
            "Dashboard loading failed"
        );
    }
}

</script>

<!-- ========================================================= -->
<!-- FIX 2 — CHART SYNCHRONIZATION -->
<!-- REPLACE ENTIRE renderCharts() -->
<!-- ========================================================= -->

<script>

function renderCharts(data) {

    const monthlyTrends =
        data.monthly_trends || [];

    const ratingDistribution =
        data.rating_distribution || {};

    const reviewCtx =
        document.getElementById('reviewChart');

    const ratingCtx =
        document.getElementById('ratingChart');

    if (reviewChart)
        reviewChart.destroy();

    if (ratingChart)
        ratingChart.destroy();

    // =====================================================
    // REVIEW TREND CHART
    // =====================================================

    reviewChart = new Chart(reviewCtx, {

        type: 'line',

        data: {

            labels:

                monthlyTrends.map(
                    item => item.month
                ),

            datasets: [{

                label:
                    'Monthly Reviews',

                data:

                    monthlyTrends.map(
                        item => item.reviews
                    ),

                borderWidth: 3,

                tension: 0.4,

                fill: true
            }]
        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    display: true
                }
            }
        }
    });

    // =====================================================
    // RATING DISTRIBUTION
    // =====================================================

    ratingChart = new Chart(ratingCtx, {

        type: 'doughnut',

        data: {

            labels:

                Object.keys(
                    ratingDistribution
                ),

            datasets: [{

                data:

                    Object.values(
                        ratingDistribution
                    ),

                borderWidth: 2
            }]
        },

        options: {

            responsive: true
        }
    });
}

</script>

<!-- FIX 3 — REVIEW TABLE -->
<!-- REPLACE ENTIRE loadRecentReviews() -->
<!-- ========================================================= -->

<script>

async function loadRecentReviews(companyId) {

    try {

        const response = await fetch(
            `/api/reviews/company/${companyId}`
        );

        const responseData =
            await response.json();

        console.log(
            "📝 REVIEWS:",
            responseData
        );

        const reviews =
            responseData.reviews || [];

        const tbody =
            document.getElementById(
                'reviewsTableBody'
            );

        tbody.innerHTML = '';

        if (!reviews.length) {

            tbody.innerHTML = `
                <tr>
                    <td colspan="5"
                        class="text-center py-4">
                        No reviews found
                    </td>
                </tr>
            `;

            return;
        }

        reviews.forEach(review => {

            const sentimentClass =

                review.rating >= 4
                ? 'badge-positive'
                : 'badge-negative';

            const sentimentText =

                review.rating >= 4
                ? 'Positive'
                : 'Negative';

            tbody.innerHTML += `

                <tr>

                    <td>
                        ${review.author_name || 'Anonymous'}
                    </td>

                    <td>
                        <i class="bi bi-star-fill text-warning"></i>
                        ${review.rating || 0}
                    </td>

                    <td>
                        ${review.text || '-'}
                    </td>

                    <td>
                        ${review.review_date || '-'}
                    </td>

                    <td>
                        <span class="badge ${sentimentClass}">
                            ${sentimentText}
                        </span>
                    </td>

                </tr>
            `;
        });

    } catch (err) {

        console.error(err);
    }
}

</script>

<!-- FIX 4 — REVIEW SYNC -->
<!-- REPLACE ENTIRE syncBtn.onclick -->
<!-- ========================================================= -->

<script>

document.getElementById('syncBtn').onclick = async () => {

    try {

        const companyId =
            document.getElementById(
                'companySelect'
            ).value;

        if (!companyId) {

            alert(
                'Please select company'
            );

            return;
        }

        showLoading();

        const response = await fetch(

            `/api/reviews/sync/${companyId}`,

            {
                method: 'POST'
            }
        );

        const data =
            await response.json();

        hideLoading();

        if (!response.ok) {

            throw new Error(
                data.detail || 'Sync failed'
            );
        }

        alert(
            `✅ Reviews Added: ${data.inserted_reviews || 0}`
        );

        await loadDashboardMetrics();

    } catch (err) {

        hideLoading();

        console.error(err);

        alert(
            '❌ ' + err.message
        );
    }
};

</script>

<!-- FIX 6 — CHATBOT -->
<!-- REPLACE ENTIRE sendChatMessage() -->
<!-- ========================================================= -->

<script>

async function sendChatMessage(){

    const message =
        chatInput.value.trim();

    if(!message) return;

    messagesContainer.innerHTML += `
        <div class="chatMessage userMessage">
            ${message}
        </div>
    `;

    chatInput.value = "";

    messagesContainer.scrollTop =
        messagesContainer.scrollHeight;

    const companySelect =
        document.getElementById(
            "companySelect"
        );

    const companyId =
        companySelect
        ? companySelect.value
        : null;

    messagesContainer.innerHTML += `
        <div class="chatMessage botMessage"
             id="typingMessage">
             AI is analyzing reviews...
        </div>
    `;

    messagesContainer.scrollTop =
        messagesContainer.scrollHeight;

    try{

        const response = await fetch(

            "/chatbot/chat",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({

                    company_id:companyId,

                    message:message
                })
            }
        );

        const data =
            await response.json();

        const typing =
            document.getElementById(
                "typingMessage"
            );

        if(typing)
            typing.remove();

        messagesContainer.innerHTML += `
            <div class="chatMessage botMessage">
                ${data.answer || 'No AI response'}
            </div>
        `;

        messagesContainer.scrollTop =
            messagesContainer.scrollHeight;

    }catch(error){

        console.error(error);

        const typing =
            document.getElementById(
                "typingMessage"
            );

        if(typing)
            typing.remove();

        messagesContainer.innerHTML += `
            <div class="chatMessage botMessage">
                AI Server Error occurred.
            </div>
        `;
    }
}

</script>
