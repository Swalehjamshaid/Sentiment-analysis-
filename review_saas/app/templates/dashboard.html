<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review SaaS Dashboard</title>

  <!-- Bootstrap / Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Google Places Autocomplete -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places&callback=initAutocomplete">
  </script>

  <style>
    body { padding: 24px; }
    [data-theme="dark"] { background: #121212 !important; color: #eaeaea !important; }
    [data-theme="dark"] .card { background: #1d1f21; color: #fff; }
    .kpi-card { min-height: 120px; }
    .sent-pos { color: #198754; font-weight: 600; }
    .sent-neu { color: #6c757d; font-weight: 600; }
    .sent-neg { color: #dc3545; font-weight: 600; }
    #loadingSpinner { display: none; }
    .cursor { cursor: pointer; }
  </style>
</head>

<body>
<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 rounded">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold fs-4">📊 Review SaaS Dashboard</span>
    <button id="toggleTheme" class="btn btn-light">
      <i class="bi bi-moon-stars"></i> Theme
    </button>
  </div>
</nav>

<div class="container-fluid">

  <!-- FILTERS -->
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <label class="form-label fw-semibold">Company</label>
      <select id="companySelect" class="form-select"></select>
    </div>
    <div class="col-md-2">
      <label class="form-label fw-semibold">Start</label>
      <input id="startDate" class="form-control" type="date"/>
    </div>
    <div class="col-md-2">
      <label class="form-label fw-semibold">End</label>
      <input id="endDate" class="form-control" type="date"/>
    </div>
    <div class="col-md-2">
      <label class="form-label fw-semibold">Limit</label>
      <select id="limitSelect" class="form-select">
        <option value="10">10</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <div class="col-md-2 align-self-end">
      <button id="loadBtn" class="btn btn-primary w-100">Load</button>
    </div>
    <div class="col-md-1 align-self-end">
      <div id="loadingSpinner" class="spinner-border text-primary"></div>
    </div>
  </div>

  <!-- Add Company -->
  <button class="btn btn-success mb-4" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
    <i class="bi bi-plus-circle"></i> Add Company
  </button>

  <!-- KPIs -->
  <div class="row g-3 mb-4">
    <div class="col-md-2">
      <div class="card kpi-card shadow-sm">
        <div class="card-body"><h6>Total Reviews</h6><div id="kpiTotal" class="fs-3 fw-bold">–</div></div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card kpi-card shadow-sm">
        <div class="card-body"><h6>Avg Rating</h6><div id="kpiRating" class="fs-3 fw-bold">–</div></div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card kpi-card shadow-sm">
        <div class="card-body"><h6>Positive</h6><div id="kpiPos" class="fs-3 sent-pos">–</div></div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card kpi-card shadow-sm">
        <div class="card-body"><h6>Neutral</h6><div id="kpiNeu" class="fs-3 sent-neu">–</div></div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card kpi-card shadow-sm">
        <div class="card-body"><h6>Negative</h6><div id="kpiNeg" class="fs-3 sent-neg">–</div></div>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row g-4 mb-5">
    <div class="col-md-6">
      <div class="card"><div class="card-body">
        <h5>Rating Distribution</h5>
        <canvas id="chartDistribution" height="120"></canvas>
      </div></div>
    </div>
    <div class="col-md-6">
      <div class="card"><div class="card-body">
        <h5>Review Trend</h5>
        <canvas id="chartTrend" height="120"></canvas>
      </div></div>
    </div>
    <div class="col-md-6">
      <div class="card"><div class="card-body">
        <h5>Sentiment Distribution</h5>
        <canvas id="chartSentiment" height="120"></canvas>
      </div></div>
    </div>
  </div>

  <!-- Reviews Table -->
  <div class="card mb-5">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h4 class="mb-0">Recent Reviews</h4>
        <div class="small text-muted">Click column headers to sort</div>
      </div>
      <table class="table table-striped table-bordered">
        <thead class="table-light">
          <tr>
            <th>Author</th>
            <th class="cursor" onclick="sortReviews('rating')">Rating ⬍</th>
            <th>Sentiment</th>
            <th class="cursor" onclick="sortReviews('date')">Date ⬍</th>
            <th>Review</th>
          </tr>
        </thead>
        <tbody id="reviewsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Exports -->
  <div class="row mb-5">
    <div class="col-auto"><a class="btn btn-outline-secondary" href="/api/export/reviews.csv" target="_blank"><i class="bi bi-filetype-csv"></i> CSV</a></div>
    <div class="col-auto"><a class="btn btn-outline-secondary" href="/api/export/reviews.xlsx" target="_blank"><i class="bi bi-filetype-xlsx"></i> Excel</a></div>
    <div class="col-auto"><a class="btn btn-outline-secondary" href="/api/export/summary.pdf" target="_blank"><i class="bi bi-filetype-pdf"></i> PDF</a></div>
  </div>
</div>

<!-- Modal: Add Company -->
<div class="modal fade" id="addCompanyModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="addCompanyForm" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Company</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="fw-semibold">Google Search</label>
        <input id="placeSearch" class="form-control mb-3" placeholder="Start typing business name..."/>

        <label>Company Name</label>
        <input id="companyName" name="name" class="form-control mb-2"/>

        <label>Place ID</label>
        <input id="placeId" name="place_id" class="form-control mb-2"/>

        <label>Address</label>
        <input id="companyAddress" name="address" class="form-control mb-2"/>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-success" type="submit">Add Company</button>
      </div>
    </form>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ================= THEME ================= */
document.getElementById('toggleTheme').addEventListener('click', () => {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
});

/* ================= STATE ================= */
let trendChart, distChart, sentChart;
let reviewsCache = [];

/* ================= COMPANIES ================= */
/* Try /api/companies, fall back to /companies/list for compatibility */
async function fetchCompanies() {
  try {
    let res = await fetch('/api/companies');            // preferred
    if (!res.ok) throw new Error('api/companies not ok');
    return await res.json();
  } catch (_) {
    const res2 = await fetch('/companies/list');        // fallback implemented in your backend
    if (!res2.ok) throw new Error('companies/list failed');
    return await res2.json();
  }
}

async function loadCompanies() {
  try {
    const payload = await fetchCompanies();
    const items = payload.items || payload; // handle {items: [...]} or bare array
    const sel = document.getElementById('companySelect');
    sel.innerHTML = '';
    (items || []).forEach(c => {
      const name = c.name ?? '';
      const place = c.place_id ?? '';
      sel.insertAdjacentHTML('beforeend',
        `<option value="${c.id}">${name} ${place ? '('+place+')' : ''}</option>`);
    });
  } catch (e) {
    console.error('Load companies failed:', e);
    alert('Unable to load companies. Are you logged in? Check console for details.');
  }
}

/* ================= DASHBOARD LOAD ================= */
function showSpinner(show) {
  document.getElementById('loadingSpinner').style.display = show ? 'inline-block' : 'none';
}

async function loadDashboard() {
  const companyId = document.getElementById('companySelect').value;
  if (!companyId) { console.warn('No company selected'); return; }

  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;
  const limit = document.getElementById('limitSelect').value;
  const params = new URLSearchParams({ company_id: companyId, limit_reviews: limit, group_by: 'day' });
  if (start) params.set('start', start);
  if (end)   params.set('end', end);

  showSpinner(true);
  try {
    const res = await fetch(`/api/dashboard?${params.toString()}`);
    if (!res.ok) {
      if (res.status === 401) alert('Please login to view dashboard data.');
      throw new Error(`dashboard http ${res.status}`);
    }
    const data = await res.json();

    // ---- KPIs ----
    document.getElementById('kpiTotal').textContent   = data?.kpis?.total_reviews ?? '0';
    document.getElementById('kpiRating').textContent  = (data?.kpis?.avg_rating ?? 0).toFixed(2);

    // Sentiment counts can be either top-level export_summary or charts.pie
    const share = data?.charts?.pie?.sentiment_share || data?.export_summary && {
      positive: data.export_summary.positive,
      neutral:  data.export_summary.neutral,
      negative: data.export_summary.negative
    } || { positive: 0, neutral: 0, negative: 0 };

    document.getElementById('kpiPos').textContent = share.positive ?? 0;
    document.getElementById('kpiNeu').textContent = share.neutral  ?? 0;
    document.getElementById('kpiNeg').textContent = share.negative ?? 0;

    // ---- Charts ----
    const dist = data?.charts?.bar?.ratings_distribution || {};
    const volume = data?.charts?.line?.volume || [];

    if (distChart) distChart.destroy();
    if (trendChart) trendChart.destroy();
    if (sentChart) sentChart.destroy();

    distChart = new Chart(document.getElementById('chartDistribution'), {
      type: 'bar',
      data: {
        labels: ['1★', '2★', '3★', '4★', '5★'],
        datasets: [{
          data: [dist[1]||0, dist[2]||0, dist[3]||0, dist[4]||0, dist[5]||0],
          backgroundColor: ['#dc3545','#fd7e14','#ffc107','#0d6efd','#198754']
        }]
      },
      options: { plugins: { legend: { display: false }, tooltip: { enabled: true } } }
    });

    trendChart = new Chart(document.getElementById('chartTrend'), {
      type: 'line',
      data: {
        labels: volume.map(v => v.label ?? v.date),
        datasets: [{
          label: 'Reviews',
          data: volume.map(v => v.value),
          borderColor: '#0d6efd',
          backgroundColor: '#0d6efd33',
          fill: true,
          tension: 0.25
        }]
      },
      options: { plugins: { legend: { display: false }, tooltip: { enabled: true } } }
    });

    const pie = data?.charts?.pie?.sentiment_share || { positive:0,neutral:0,negative:0 };
    sentChart = new Chart(document.getElementById('chartSentiment'), {
      type: 'pie',
      data: {
        labels: ['Positive','Neutral','Negative'],
        datasets: [{ data: [pie.positive||0, pie.neutral||0, pie.negative||0],
          backgroundColor: ['#198754','#6c757d','#dc3545']
        }]
      }
    });

    // ---- Reviews table ----
    reviewsCache = data?.recent_reviews || [];
    renderReviews(reviewsCache);

  } catch (e) {
    console.error('loadDashboard error:', e);
  } finally {
    showSpinner(false);
  }
}

/* ================= REVIEWS TABLE ================= */
function renderReviews(rows) {
  const tbody = document.getElementById('reviewsTable');
  tbody.innerHTML = '';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No reviews found for this window.</td></tr>';
    return;
  }
  rows.forEach(r => {
    const cls = r.label === 'positive' ? 'sent-pos' : r.label === 'negative' ? 'sent-neg' : 'sent-neu';
    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td>${(r.author||'Anonymous')}</td>
        <td>${(r.rating ?? 0).toFixed ? r.rating.toFixed(1) : r.rating}</td>
        <td class="${cls}">${r.label ?? '-'}</td>
        <td>${r.time ?? ''}</td>
        <td>${(r.text||'').replace(/</g,'&lt;')}</td>
      </tr>`);
  });
}

function sortReviews(by) {
  const rows = [...reviewsCache];
  if (by === 'rating') rows.sort((a,b) => (b.rating||0) - (a.rating||0));
  else rows.sort((a,b) => new Date(b.time||0) - new Date(a.time||0));
  renderReviews(rows);
}

/* ================= GOOGLE AUTOCOMPLETE ================= */
let autocomplete;
function initAutocomplete() {
  const input = document.getElementById('placeSearch');
  if (!input) return;
  try {
    autocomplete = new google.maps.places.Autocomplete(input, { types: ['establishment'] });
    autocomplete.addListener('place_changed', () => {
      const place = autocomplete.getPlace();
      document.getElementById('companyName').value = place?.name || '';
      document.getElementById('placeId').value = place?.place_id || '';
      document.getElementById('companyAddress').value = place?.formatted_address || '';
    });
  } catch (e) {
    console.error('Google Autocomplete init failed:', e);
    alert('Google API failed to load. Check API key, billing, and referrer restrictions.');
  }
}

/* ================= ADD COMPANY ================= */
document.getElementById('addCompanyForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = await fetch('/companies', { method: 'POST', body: fd });
  if (!res.ok) {
    console.error('Add company failed', res.status);
    alert('Unable to add company (are you logged in? is server reachable?).');
    return;
  }
  alert('Company added.');
  await loadCompanies();
});

/* ================= INIT ================= */
document.getElementById('loadBtn').addEventListener('click', loadDashboard);
['companySelect','startDate','endDate','limitSelect'].forEach(id => {
  document.getElementById(id).addEventListener('change', loadDashboard);
});

loadCompanies().then(loadDashboard);
</script>
</body>
</html>
