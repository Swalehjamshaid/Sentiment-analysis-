<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review SaaS Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Google Places Autocomplete -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places"></script>

    <style>
        body { padding: 25px; }
        [data-theme="dark"] {
            background-color: #121212 !important;
            color: #e6e6e6 !important;
        }
        [data-theme="dark"] .card { background-color: #1f1f1f; color: #fff; }
        .kpi-card { min-height: 130px; }
        .sent-pos { color: #198754; font-weight: bold; }
        .sent-neu { color: #6c757d; font-weight: bold; }
        .sent-neg { color: #dc3545; font-weight: bold; }
        #loadingSpinner { display:none; }
    </style>
</head>

<body>

<!-- NAVIGATION BAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 rounded">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold fs-4">📊 Review SaaS Dashboard</span>

        <button id="toggleTheme" class="btn btn-light">
            <i class="bi bi-moon-stars"></i> Toggle Theme
        </button>
    </div>
</nav>

<div class="container-fluid">

    <!-- FILTERS -->
    <div class="row g-3 mb-4">

        <!-- Company Dropdown -->
        <div class="col-md-3">
            <label class="form-label fw-bold">Company</label>
            <select id="companySelect" class="form-select"></select>
        </div>

        <div class="col-md-2">
            <label class="form-label fw-bold">Start Date</label>
            <input id="startDate" type="date" class="form-control">
        </div>

        <div class="col-md-2">
            <label class="form-label fw-bold">End Date</label>
            <input id="endDate" type="date" class="form-control">
        </div>

        <div class="col-md-2">
            <label class="form-label fw-bold">Review Limit</label>
            <select id="limitSelect" class="form-select">
                <option value="10">10</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
            </select>
        </div>

        <div class="col-md-2 align-self-end">
            <button id="loadBtn" class="btn btn-primary w-100">Load Dashboard</button>
        </div>

        <div class="col-md-1 align-self-end">
            <div id="loadingSpinner" class="spinner-border text-primary"></div>
        </div>

    </div>

    <!-- Add Company Button -->
    <button class="btn btn-success mb-4" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
        <i class="bi bi-plus-circle"></i> Add Company
    </button>

    <!-- KPI SECTION -->
    <div class="row g-3 mb-4">

        <div class="col-md-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <h6>Total Reviews</h6>
                    <div id="kpiTotal" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <h6>Avg Rating</h6>
                    <div id="kpiRating" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <h6>Positive</h6>
                    <div id="kpiPos" class="fs-3 sent-pos">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <h6>Neutral</h6>
                    <div id="kpiNeu" class="fs-3 sent-neu">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow-sm">
                <div class="card-body">
                    <h6>Negative</h6>
                    <div id="kpiNeg" class="fs-3 sent-neg">–</div>
                </div>
            </div>
        </div>

    </div>

    <!-- CHARTS -->
    <div class="row g-4 mb-5">

        <div class="col-md-6">
            <div class="card"><div class="card-body">
                <h5>Rating Distribution</h5>
                <canvas id="chartDistribution" height="120"></canvas>
            </div></div>
        </div>

        <div class="col-md-6">
            <div class="card"><div class="card-body">
                <h5>Review Trend</h5>
                <canvas id="chartTrend" height="120"></canvas>
            </div></div>
        </div>

        <div class="col-md-6 mt-3">
            <div class="card"><div class="card-body">
                <h5>Sentiment Distribution</h5>
                <canvas id="chartSentiment" height="120"></canvas>
            </div></div>
        </div>

    </div>

    <!-- REVIEWS TABLE -->
    <div class="card mb-5">
        <div class="card-body">
            <h4 class="mb-3">Recent Reviews</h4>

            <table class="table table-striped table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Author</th>
                        <th onclick="sortReviews('rating')" style="cursor:pointer">Rating ⬍</th>
                        <th>Sentiment</th>
                        <th onclick="sortReviews('date')" style="cursor:pointer">Date ⬍</th>
                        <th>Review</th>
                    </tr>
                </thead>
                <tbody id="reviewsTable"></tbody>
            </table>

        </div>
    </div>

</div>

<!-- ADD COMPANY MODAL -->
<div class="modal fade" id="addCompanyModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="addCompanyForm" class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Company</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <label class="fw-bold">Search (Google Places)</label>
                <input id="placeSearch" class="form-control mb-3">

                <label>Company Name</label>
                <input id="companyName" name="name" class="form-control mb-2">

                <label>Place ID</label>
                <input id="placeId" name="place_id" class="form-control mb-2">

                <label>Address</label>
                <input id="companyAddress" name="address" class="form-control mb-2">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button class="btn btn-success" type="submit">Add Company</button>
            </div>

        </form>
    </div>
</div>

<!-- JS LOGIC -->
<script>

let chartTrend, chartDistribution, chartSentiment;
let cachedReviews = [];

/* ===========================================================
   THEME TOGGLE
=========================================================== */
document.getElementById("toggleTheme").onclick = () => {
    const html = document.documentElement;
    const theme = html.getAttribute("data-theme");
    html.setAttribute("data-theme", theme === "light" ? "dark" : "light");
};

/* ===========================================================
   LOAD COMPANIES
=========================================================== */
async function loadCompanies() {
    const res = await fetch("/companies/list");
    const data = await res.json();
    const select = document.getElementById("companySelect");

    select.innerHTML = "";
    data.items.forEach(c => {
        select.innerHTML += `<option value="${c.id}">${c.name} (${c.place_id})</option>`;
    });
}

/* ===========================================================
   LOAD DASHBOARD
=========================================================== */
async function loadDashboard() {
    const spinner = document.getElementById("loadingSpinner");
    spinner.style.display = "inline-block";

    const companyId = document.getElementById("companySelect").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    const limit = document.getElementById("limitSelect").value;

    let params = new URLSearchParams({
        company_id: companyId,
        limit_reviews: limit,
        group_by: "day"
    });

    if (start) params.set("start", start);
    if (end) params.set("end", end);

    const res = await fetch(`/api/dashboard?${params}`);
    const data = await res.json();

    spinner.style.display = "none";

    /* ---------- KPI UPDATE ---------- */
    document.getElementById("kpiTotal").textContent = data.kpis.total_reviews;
    document.getElementById("kpiRating").textContent = data.kpis.avg_rating;
    document.getElementById("kpiPos").textContent = data.sentiment_share.positive;
    document.getElementById("kpiNeu").textContent = data.sentiment_share.neutral;
    document.getElementById("kpiNeg").textContent = data.sentiment_share.negative;

    /* ---------- CHARTS ---------- */
    if (chartTrend) chartTrend.destroy();
    if (chartDistribution) chartDistribution.destroy();
    if (chartSentiment) chartSentiment.destroy();

    chartDistribution = new Chart(document.getElementById("chartDistribution"), {
        type: "bar",
        data: {
            labels: ["1★", "2★", "3★", "4★", "5★"],
            datasets: [{
                data: Object.values(data.ratings_distribution),
                backgroundColor: ["#dc3545", "#fd7e14", "#ffc107", "#0d6efd", "#198754"]
            }]
        }
    });

    chartTrend = new Chart(document.getElementById("chartTrend"), {
        type: "line",
        data: {
            labels: data.charts.line.volume.map(i => i.label),
            datasets: [{
                label: "Reviews",
                data: data.charts.line.volume.map(i => i.value),
                borderColor: "#0d6efd",
                fill: true
            }]
        }
    });

    chartSentiment = new Chart(document.getElementById("chartSentiment"), {
        type: "pie",
        data: {
            labels: ["Positive", "Neutral", "Negative"],
            datasets: [{
                data: [
                    data.sentiment_share.positive,
                    data.sentiment_share.neutral,
                    data.sentiment_share.negative
                ],
                backgroundColor: ["#198754", "#6c757d", "#dc3545"]
            }]
        }
    });

    /* ---------- REVIEWS TABLE ---------- */
    cachedReviews = data.recent_reviews;
    renderReviewsTable(cachedReviews);
}

function renderReviewsTable(rows) {
    const tbody = document.getElementById("reviewsTable");
    tbody.innerHTML = "";

    rows.forEach(r => {
        tbody.innerHTML += `
            <tr>
                <td>${r.author}</td>
                <td>${r.rating}</td>
                <td class="${
                    r.label === "positive" ? "sent-pos" :
                    r.label === "negative" ? "sent-neg" : "sent-neu"
                }">${r.label}</td>
                <td>${r.time}</td>
                <td>${r.text}</td>
            </tr>
        `;
    });
}

/* ===========================================================
   SORTING
=========================================================== */
function sortReviews(type) {
    if (type === "rating") {
        cachedReviews.sort((a, b) => b.rating - a.rating);
    } else {
        cachedReviews.sort((a, b) => new Date(b.time) - new Date(a.time));
    }
    renderReviewsTable(cachedReviews);
}

/* ===========================================================
   GOOGLE PLACES AUTOCOMPLETE
=========================================================== */
let autocomplete;
function initAutocomplete() {
    autocomplete = new google.maps.places.Autocomplete(
        document.getElementById("placeSearch"),
        { types: ["establishment"] }
    );

    autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();
        if (!place) return;

        document.getElementById("companyName").value = place.name || "";
        document.getElementById("placeId").value = place.place_id || "";
        document.getElementById("companyAddress").value =
            place.formatted_address || "";
    });
}
google.maps.event.addDomListener(window, "load", initAutocomplete);

/* ===========================================================
   ADD COMPANY SUBMIT
=========================================================== */
document.getElementById("addCompanyForm").onsubmit = async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);

    const res = await fetch("/companies", { method: "POST", body: form });

    if (res.ok) {
        alert("Company added!");
        loadCompanies();
    } else {
        alert("Error adding company");
    }
};

/* ===========================================================
   INIT
=========================================================== */
loadCompanies().then(loadDashboard);
document.getElementById("loadBtn").onclick = loadDashboard;
document.getElementById("companySelect").onchange = loadDashboard;
document.getElementById("startDate").onchange = loadDashboard;
document.getElementById("endDate").onchange = loadDashboard;

</script>

</body>
</html>
