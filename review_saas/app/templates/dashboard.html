<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review Intel AI • Enterprise Intelligence</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --ai-grad: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            --danger-grad: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            --glass: rgba(255,255,255,0.92);
        }
        [data-theme="dark"] {
            --glass: rgba(15,23,42,0.95);
        }
        body {
            background: linear-gradient(145deg, #f8fafc 0%, #e0e7ff 100%);
            font-family: 'Inter', system_ui, sans-serif;
            color: #1e2937;
            min-height: 100vh;
            padding: 20px;
        }
        [data-theme="dark"] body {
            background: linear-gradient(145deg, #0f172a 0%, #1e2937 100%);
            color: #f1f5f9;
        }
        .navbar {
            background: var(--primary-grad) !important;
            border-radius: 20px;
            box-shadow: 0 15px 30px -10px rgba(99, 102, 241, 0.35);
        }
        .card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 30px -8px rgba(0,0,0,0.1);
            background: var(--glass);
            backdrop-filter: blur(16px);
            transition: all 0.4s ease;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
        }
        .total-review-card {
            background: var(--primary-grad);
            color: white;
            border-radius: 24px;
        }
        .risk-card {
            background: var(--danger-grad);
            color: white;
            border-radius: 24px;
        }
        .section-header {
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            color: white;
            padding: 12px 20px;
            border-radius: 12px 12px 0 0;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        .ai-badge {
            background: var(--ai-grad);
            color: white;
            padding: 6px 18px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.8rem;
            box-shadow: 0 4px 12px rgba(168,85,247,0.3);
        }
        #chatWindow {
            height: 440px;
            overflow-y: auto;
            background: rgba(241,245,249,0.95);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        [data-theme="dark"] #chatWindow {
            background: rgba(15,23,42,0.95);
            border-color: #334155;
        }
        .chat-msg {
            padding: 14px 20px;
            border-radius: 18px;
            max-width: 88%;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
        }
        .chat-ai { background: white; align-self: flex-start; border-bottom-left-radius: 6px; }
        .chat-user { background: var(--primary-grad); color: white; align-self: flex-end; border-bottom-right-radius: 6px; }
        [data-theme="dark"] .chat-ai { background: #1e293b; color: #f1f5f9; }
        .chart-wrapper { height: 300px; padding: 10px; }
        .kpi-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
        }
        .keyword-badge {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 10px 18px;
            border-radius: 9999px;
            font-size: 0.95rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .review-table-container { 
            max-height: 520px; 
            overflow-y: auto; 
            border-radius: 12px;
        }
        .star-rating { color: #fbbf24; font-size: 1.2rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark p-4">
        <div class="container-fluid">
            <span class="navbar-brand fw-bold fs-3 d-flex align-items-center">
                <i class="bi bi-robot me-3 fs-1"></i>Review Intel AI
            </span>
            <div class="d-flex gap-3">
                <button onclick="downloadReport()" class="btn btn-light btn-pill d-flex align-items-center gap-2">
                    <i class="bi bi-file-earmark-pdf"></i> Executive Report
                </button>
                <button class="btn btn-success btn-pill d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
                    <i class="bi bi-plus-circle"></i> Add Business
                </button>
                <button id="toggleTheme" class="btn btn-light btn-pill px-4"><i class="bi bi-moon-stars"></i></button>
                <form action="/logout" method="get" class="m-0">
                    <button class="btn btn-outline-light btn-pill px-4">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Controls -->
        <div class="row g-4 mb-5 p-5 bg-white rounded-5 shadow-sm">
            <div class="col-lg-3">
                <label class="form-label fw-semibold text-muted small">ACTIVE BUSINESS</label>
                <select id="companySelect" class="form-select py-3 shadow-none"></select>
            </div>
            <div class="col-lg-2">
                <label class="form-label fw-semibold text-muted small">START DATE</label>
                <input id="startDate" type="date" class="form-control py-3 shadow-none">
            </div>
            <div class="col-lg-2">
                <label class="form-label fw-semibold text-muted small">END DATE</label>
                <input id="endDate" type="date" class="form-control py-3 shadow-none">
            </div>
            <div class="col-lg-5">
                <div class="d-flex gap-3">
                    <button id="loadBtn" onclick="triggerAllLoads()" class="btn btn-primary flex-fill btn-pill">
                        <i class="bi bi-graph-up me-2"></i> ANALYZE BUSINESS
                    </button>
                    <button id="syncBtn" class="btn btn-success flex-fill btn-pill">
                        <i class="bi bi-arrow-repeat me-2"></i> SYNC LIVE DATA
                    </button>
                </div>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card total-review-card p-5 h-100 text-white">
                    <div class="text-uppercase small fw-bold opacity-75">TOTAL REVIEWS</div>
                    <div id="kpiTotal" class="kpi-value mt-2">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-5 h-100">
                    <div class="text-muted fw-semibold small">AVERAGE RATING</div>
                    <div id="kpiRating" class="kpi-value mt-2 text-primary">—</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card risk-card p-5 h-100 text-white">
                    <div class="small fw-bold opacity-75 text-uppercase mb-3">REVENUE RISK MONITOR</div>
                    <div class="row text-center g-3">
                        <div class="col-4">
                            <small class="opacity-75 d-block">Loss %</small>
                            <div id="riskPct" class="h3 fw-bold">—</div>
                        </div>
                        <div class="col-4">
                            <small class="opacity-75 d-block">Impact</small>
                            <div id="riskImpact" class="h3 fw-bold">—</div>
                        </div>
                        <div class="col-4">
                            <small class="opacity-75 d-block">Reputation</small>
                            <div id="riskSentiment" class="h3 fw-bold">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Charts & Keywords -->
            <div class="col-lg-8">
                <div class="row g-4">
                    <!-- Emotion Radar -->
                    <div class="col-md-6">
                        <div class="section-header mb-0">CUSTOMER EMOTION RADAR</div>
                        <div class="card border-top-0 rounded-top-0">
                            <div class="chart-wrapper p-4"><canvas id="chartEmotions"></canvas></div>
                        </div>
                    </div>
                    <!-- Monthly Trend -->
                    <div class="col-md-6">
                        <div class="section-header mb-0">MONTHLY TREND</div>
                        <div class="card border-top-0 rounded-top-0">
                            <div class="chart-wrapper p-4"><canvas id="chartMonthly"></canvas></div>
                        </div>
                    </div>
                    <!-- Rating Distribution -->
                    <div class="col-12">
                        <div class="section-header mb-0">RATING DISTRIBUTION</div>
                        <div class="card border-top-0 rounded-top-0">
                            <div class="chart-wrapper p-4"><canvas id="chartRatings"></canvas></div>
                        </div>
                    </div>
                    <!-- Keywords -->
                    <div class="col-12">
                        <div class="section-header mb-0">TOP KEYWORDS</div>
                        <div id="keywordContainer" class="card border-top-0 rounded-top-0 p-5 d-flex flex-wrap gap-3"></div>
                    </div>
                </div>
            </div>

            <!-- AI Strategy Consultant -->
            <div class="col-lg-4">
                <div class="section-header mb-0">AI STRATEGY CONSULTANT</div>
                <div class="card border-top-0 rounded-top-0 h-100">
                    <div class="card-body d-flex flex-column p-4">
                        <div id="chatWindow" class="flex-grow-1 mb-4"></div>
                        <div class="input-group">
                            <input id="chatInput" type="text" class="form-control py-4" placeholder="Ask about performance, risks, or recommendations...">
                            <button onclick="askAI()" class="btn btn-primary px-5"><i class="bi bi-send"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Reviews -->
        <div class="row mt-5">
            <div class="col-12">
                <div class="section-header mb-0">LATEST 100 REVIEWS</div>
                <div class="card border-top-0 rounded-top-0 p-4">
                    <div class="review-table-container">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="sticky-top bg-white">
                                <tr class="text-muted small text-uppercase">
                                    <th>AUTHOR</th>
                                    <th>RATING</th>
                                    <th>REVIEW</th>
                                    <th>DATE</th>
                                </tr>
                            </thead>
                            <tbody id="recentReviewsList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Company Modal -->
    <div class="modal fade" id="addCompanyModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <form id="addCompanyForm" class="modal-content shadow-xl border-0 rounded-4">
                <div class="modal-header bg-success text-white rounded-top-4 p-4">
                    <h5 class="modal-title fw-bold">Link New Business</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-5">
                    <input id="googleSearchInput" class="form-control form-control-lg mb-4" placeholder="Search business on Google Maps...">
                    <div class="p-4 bg-light rounded-4">
                        <div class="mb-3">
                            <label class="form-label fw-semibold text-muted small">BUSINESS NAME</label>
                            <input id="companyName" class="form-control" readonly required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-muted small">PLACE ID</label>
                                <input id="placeId" class="form-control" readonly required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold text-muted small">ADDRESS</label>
                                <input id="companyAddress" class="form-control" readonly required>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4">
                    <button type="submit" id="saveCompanyBtn" class="btn btn-success w-100 btn-pill py-4 fw-bold">SAVE BUSINESS</button>
                </div>
            </form>
        </div>
    </div>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places&callback=initGoogleAutocomplete"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let chartInstances = {};

        const DASHBOARD_CONFIG = {
            endpoints: {
                overview: "/api/overview",
                insights: "/api/insights",
                chat: "/api/chatbot/explain",
                revenue: "/api/revenue",
                report: "/api/executive-report/pdf",
                companies: "/api/companies",
                sync: "/api/reviews/ingest",
                recent: "/api/recent-reviews"
            }
        };

        function initChat() {
            const chatWin = document.getElementById("chatWindow");
            chatWin.innerHTML = `<div class="chat-msg chat-ai">Hello! Select a business and click "Analyze Business" to get powerful insights.</div>`;
        }

        async function triggerAllLoads() {
            const cid = document.getElementById("companySelect").value;
            if (!cid) return alert("Please select a business first.");

            const btn = document.getElementById("loadBtn");
            const orig = btn.innerHTML;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> ANALYZING...`;
            btn.disabled = true;

            try {
                const [overRes, insRes, revRes] = await Promise.all([
                    fetch(`${DASHBOARD_CONFIG.endpoints.overview}/${cid}`).then(r => r.json()),
                    fetch(`${DASHBOARD_CONFIG.endpoints.insights}?company_id=${cid}&start=${document.getElementById("startDate").value || ""}&end=${document.getElementById("endDate").value || ""}`).then(r => r.json()),
                    fetch(`${DASHBOARD_CONFIG.endpoints.revenue}?company_id=${cid}`).then(r => r.json())
                ]);

                document.getElementById("kpiTotal").innerText = insRes.total_reviews || 0;
                document.getElementById("kpiRating").innerText = insRes.average_rating || "—";

                const risk = insRes.risk || revRes || {};
                document.getElementById("riskPct").innerText = risk.loss_probability || "—";
                document.getElementById("riskImpact").innerText = risk.impact_level || "—";
                document.getElementById("riskSentiment").innerText = risk.reputation_score || "—";

                if (insRes.sentiment_counts) renderCharts(insRes);
                if (insRes.top_keywords) renderKeywords(insRes.top_keywords);
                loadRecentReviews(cid);

            } catch (e) {
                console.error(e);
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }

        function renderCharts(data) {
            // Radar Chart
            if (chartInstances.emotions) chartInstances.emotions.destroy();
            chartInstances.emotions = new Chart(document.getElementById("chartEmotions"), {
                type: 'radar',
                data: {
                    labels: Object.keys(data.sentiment_counts || {}),
                    datasets: [{
                        label: 'Intensity',
                        data: Object.values(data.sentiment_counts || {}),
                        backgroundColor: 'rgba(168,85,247,0.25)',
                        borderColor: '#a855f7',
                        borderWidth: 3
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Monthly Trend
            if (chartInstances.monthly) chartInstances.monthly.destroy();
            const trend = data.monthly_trend || [];
            chartInstances.monthly = new Chart(document.getElementById("chartMonthly"), {
                type: 'line',
                data: {
                    labels: trend.map(t => t.month),
                    datasets: [{
                        label: 'Avg Rating',
                        data: trend.map(t => t.avg),
                        borderColor: '#10b981',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(16,185,129,0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 1, max: 5 } } }
            });

            // Rating Distribution
            if (chartInstances.ratings) chartInstances.ratings.destroy();
            const dist = [1,2,3,4,5].map(n => (data.rating_distribution || {})[n] || 0);
            chartInstances.ratings = new Chart(document.getElementById("chartRatings"), {
                type: 'bar',
                data: {
                    labels: ['1★','2★','3★','4★','5★'],
                    datasets: [{
                        label: 'Count',
                        data: dist,
                        backgroundColor: '#6366f1',
                        borderRadius: 10
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderKeywords(keywords) {
            const container = document.getElementById("keywordContainer");
            if (!keywords || keywords.length === 0) {
                container.innerHTML = `<span class="text-muted">No keywords extracted yet.</span>`;
                return;
            }
            container.innerHTML = keywords.map(kw => 
                `<span class="keyword-badge">${kw}</span>`
            ).join('');
        }

        async function loadRecentReviews(cid) {
            const tbody = document.getElementById("recentReviewsList");
            try {
                const res = await fetch(`${DASHBOARD_CONFIG.endpoints.recent}/${cid}`);
                const data = await res.json();
                tbody.innerHTML = data.map(r => `
                    <tr>
                        <td class="fw-medium">${r.author || 'Anonymous'}</td>
                        <td><span class="star-rating">${'★'.repeat(r.rating || 0)}</span></td>
                        <td class="small">${r.text ? r.text.substring(0, 160) + '...' : '—'}</td>
                        <td class="small">${r.date}</td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-5 text-muted">No reviews found</td></tr>`;
            }
        }

        async function askAI() {
            const input = document.getElementById("chatInput");
            const cid = document.getElementById("companySelect").value;
            const win = document.getElementById("chatWindow");
            const msg = input.value.trim();
            if (!msg || !cid) return;

            win.innerHTML += `<div class="chat-msg chat-user">${msg}</div>`;
            input.value = "";
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch(`${DASHBOARD_CONFIG.endpoints.chat}?question=${encodeURIComponent(msg)}&company_id=${cid}`, { method: 'POST' });
                const data = await res.json();
                win.innerHTML += `<div class="chat-msg chat-ai"><strong>AI Consultant:</strong> ${data.answer || "No response."}</div>`;
            } catch (e) {
                win.innerHTML += `<div class="chat-msg chat-ai text-danger">AI service temporarily unavailable.</div>`;
            }
            win.scrollTop = win.scrollHeight;
        }

        async function loadCompanies() {
            try {
                const res = await fetch(DASHBOARD_CONFIG.endpoints.companies);
                const data = await res.json();
                const companies = data.companies || data || [];
                const sel = document.getElementById("companySelect");
                sel.innerHTML = companies.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
                if (sel.options.length) triggerAllLoads();
            } catch (e) {}
        }

        function downloadReport() {
            const cid = document.getElementById("companySelect").value;
            if (cid) window.open(`${DASHBOARD_CONFIG.endpoints.report}/${cid}`, "_blank");
            else alert("Please select a business first.");
        }

        document.getElementById("toggleTheme").onclick = () => {
            const root = document.documentElement;
            root.setAttribute("data-theme", root.getAttribute("data-theme") === "light" ? "dark" : "light");
        };

        window.initGoogleAutocomplete = function() {
            const input = document.getElementById('googleSearchInput');
            const autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.addListener('place_changed', () => {
                const p = autocomplete.getPlace();
                document.getElementById('companyName').value = p.name || "";
                document.getElementById('placeId').value = p.place_id || "";
                document.getElementById('companyAddress').value = p.formatted_address || "";
            });
        };

        document.getElementById("addCompanyForm").onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById("companyName").value,
                place_id: document.getElementById("placeId").value,
                address: document.getElementById("companyAddress").value
            };
            try {
                const res = await fetch(DASHBOARD_CONFIG.endpoints.companies, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();
                    loadCompanies();
                }
            } catch (e) {}
        };

        document.getElementById("syncBtn").onclick = async () => {
            const cid = document.getElementById("companySelect").value;
            if (!cid) return alert("Select a business first");
            const btn = document.getElementById("syncBtn");
            const orig = btn.innerHTML;
            btn.innerHTML = "Syncing...";
            btn.disabled = true;
            try {
                await fetch(`${DASHBOARD_CONFIG.endpoints.sync}/${cid}`, { method: 'POST' });
                triggerAllLoads();
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        };

        window.addEventListener("DOMContentLoaded", () => {
            initChat();
            loadCompanies();
            document.getElementById("chatInput").addEventListener("keypress", (e) => {
                if (e.key === "Enter") askAI();
            });
        });
    </script>
</body>
</html>
