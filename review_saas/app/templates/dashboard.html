<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review AI Intelligence Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        :root{ 
            --primary-grad: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
            --transition-speed: .3s;
        }
        body{ background-color: #f9fafb; padding:24px; font-family: 'Inter', system-ui, sans-serif; transition: background var(--transition-speed); }
        
        .kpi-card { 
            border: none; 
            border-radius: 20px; 
            background: #fff; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            transition: transform 0.2s; 
            min-height: 130px;
        }
        .kpi-card:hover { transform: translateY(-5px); }
        
        .navbar { 
            background: var(--primary-grad) !important; 
            border-radius: 20px !important; 
            border: none; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        
        .chart-wrapper { height: 320px; width: 100%; position: relative; overflow: hidden; }
        
        .sent-pos { color: #059669; font-weight: 800; } 
        .sent-neu { color: #6b7280; font-weight: 800; } 
        .sent-neg { color: #dc2626; font-weight: 800; }
        
        .btn-pill { border-radius: 50px; padding: 10px 24px; font-weight: 600; transition: all 0.2s; }
        #ingestProgressContainer { display: none; border-radius: 20px; border: none; }
        
        [data-theme="dark"] { background: #111827; color: #f9fafb; }
        [data-theme="dark"] .card { background: #1f2937; color: #f9fafb; border: 1px solid #374151; }
        [data-theme="dark"] .bg-white { background-color: #1f2937 !important; }
        [data-theme="dark"] .form-label { color: #f9fafb !important; }

        .table-responsive { border-radius: 15px; }
        .spin { animation: spin 2s linear infinite; display: inline-block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark p-3 shadow-lg">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold fs-4"><i class="bi bi-cpu-fill me-2"></i>Review Intel AI</span>
        <div class="d-flex gap-2">
            <button id="toggleTheme" class="btn btn-light btn-sm rounded-pill px-3">Theme</button>
            <form action="/logout" method="post"><button class="btn btn-danger btn-sm rounded-pill px-3">Logout</button></form>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div id="alertHost"></div>

    <div id="ingestProgressContainer" class="card shadow-lg mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="fw-bold text-primary mb-0"><i class="bi bi-arrow-repeat spin me-2"></i>Syncing Reviews...</h6>
                <span id="progressStats" class="badge bg-primary rounded-pill">0 items</span>
            </div>
            <div class="progress" style="height: 10px; border-radius: 10px;">
                <div id="ingestProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div class="row g-3 align-items-end mb-4 p-4 bg-white rounded-4 shadow-sm border-0">
        <div class="col-md-3">
            <label class="form-label fw-bold text-muted small">SELECT BUSINESS</label>
            <select id="companySelect" class="form-select border-0 bg-light py-2 shadow-none"></select>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold text-muted small">START DATE</label>
            <input id="startDate" type="date" class="form-control border-0 bg-light shadow-none">
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold text-muted small">END DATE</label>
            <input id="endDate" type="date" class="form-control border-0 bg-light shadow-none">
        </div>
        <div class="col-md-5">
            <div class="d-flex gap-2">
                <button id="loadBtn" class="btn btn-primary w-50 btn-pill shadow-sm">Load Analytics</button>
                <button id="ingestBtn" class="btn btn-warning w-50 btn-pill shadow-sm text-dark">Ingest Live Feed</button>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4 text-center">
        <div class="col"><div class="card kpi-card shadow-sm"><div class="card-body d-flex flex-column justify-content-center"><div class="text-muted small fw-bold">TOTAL</div><div id="kpiTotal" class="display-6 fw-bold mb-0">–</div></div></div></div>
        <div class="col"><div class="card kpi-card shadow-sm"><div class="card-body d-flex flex-column justify-content-center"><div class="text-muted small fw-bold">AVG RATING</div><div id="kpiRating" class="display-6 fw-bold text-primary">–</div></div></div></div>
        <div class="col"><div class="card kpi-card shadow-sm"><div class="card-body d-flex flex-column justify-content-center"><div class="text-muted small fw-bold">POSITIVE</div><div id="kpiPos" class="display-6 fw-bold sent-pos">–</div></div></div></div>
        <div class="col"><div class="card kpi-card shadow-sm"><div class="card-body d-flex flex-column justify-content-center"><div class="text-muted small fw-bold">NEUTRAL</div><div id="kpiNeu" class="display-6 fw-bold sent-neu">–</div></div></div></div>
        <div class="col"><div class="card kpi-card shadow-sm"><div class="card-body d-flex flex-column justify-content-center"><div class="text-muted small fw-bold">NEGATIVE</div><div id="kpiNeg" class="display-6 fw-bold sent-neg">–</div></div></div></div>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-lg-4"><div class="card border-0 rounded-4 shadow-sm"><div class="card-body"><h6 class="fw-bold text-muted mb-3">Rating Distribution</h6><div class="chart-wrapper"><canvas id="chartDistribution"></canvas></div></div></div></div>
        <div class="col-lg-4"><div class="card border-0 rounded-4 shadow-sm"><div class="card-body"><h6 class="fw-bold text-muted mb-3">Rating Trend</h6><div class="chart-wrapper"><canvas id="chartTrend"></canvas></div></div></div></div>
        <div class="col-lg-4"><div class="card border-0 rounded-4 shadow-sm"><div class="card-body"><h6 class="fw-bold text-muted mb-3">Sentiment Share</h6><div class="chart-wrapper"><canvas id="chartSentiment"></canvas></div></div></div></div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-5">
        <div class="card-body p-4">
            <h5 class="fw-bold mb-4">Detailed Interaction Feed</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle border-0">
                    <thead class="bg-light sticky-top">
                        <tr class="text-muted small"><th>AUTHOR</th><th>RATING</th><th>SENTIMENT</th><th>DATE</th><th>FEEDBACK</th></tr>
                    </thead>
                    <tbody id="reviewsTable">
                        <tr><td colspan="5" class="text-center py-5 text-muted">Awaiting company selection...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let chartInstances = {};
let cachedReviews = [];

function notify(msg, type = "success") {
    document.getElementById("alertHost").innerHTML = `<div class="alert alert-${type} alert-dismissible shadow-sm fade show rounded-4 border-0 mb-4">${msg}<button class="btn-close" data-bs-dismiss="alert"></button></div>`;
}

async function loadCompanies() {
    try {
        const res = await fetch("/api/companies");
        const data = await res.json();
        const sel = document.getElementById("companySelect");
        if (data.length > 0) {
            sel.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
            loadReviews(); 
        }
    } catch { notify("API Connection failed", "danger"); }
}

function streamReviews() {
    const cid = document.getElementById("companySelect").value;
    if (!cid) return;
    
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    document.getElementById("ingestProgressContainer").style.display = "block";
    cachedReviews = [];
    updateUI();

    // CLEAN URL BUILDER
    const params = new URLSearchParams({ company_id: cid, limit: 1000 });
    if (start) params.append("start", start);
    if (end) params.append("end", end);

    const es = new EventSource(`/api/reviews/stream?${params.toString()}`);

    es.addEventListener('review', (e) => {
        cachedReviews.push(JSON.parse(e.data));
        document.getElementById("progressStats").innerText = `${cachedReviews.length} records`;
        document.getElementById("ingestProgressBar").style.width = `${Math.min((cachedReviews.length/500)*100, 100)}%`;
        updateUI();
    });

    es.addEventListener('done', () => { 
        es.close(); 
        notify("Database sync complete", "success");
        setTimeout(() => document.getElementById("ingestProgressContainer").style.display = "none", 3000); 
    });

    es.onerror = () => es.close();
}

async function loadReviews() {
    const cid = document.getElementById("companySelect").value;
    if (!cid) return;

    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    
    // CLEAN URL BUILDER - This prevents the 422 error
    const params = new URLSearchParams({ company_id: cid, limit: 1000 });
    if (start) params.append("start", start);
    if (end) params.append("end", end);

    try {
        const res = await fetch(`/api/reviews?${params.toString()}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        cachedReviews = Array.isArray(data) ? data : [];
        updateUI();
    } catch { notify("Data fetch failed. Ensure dates are valid.", "danger"); }
}

function updateUI() {
    const total = cachedReviews.length;
    const avg = total ? (cachedReviews.reduce((a, b) => a + b.rating, 0) / total).toFixed(1) : "0.0";
    const pos = cachedReviews.filter(r => r.sentiment_score > 0).length;
    const neu = cachedReviews.filter(r => r.sentiment_score === 0).length;
    const neg = cachedReviews.filter(r => r.sentiment_score < 0).length;

    document.getElementById("kpiTotal").innerText = total;
    document.getElementById("kpiRating").innerText = avg;
    document.getElementById("kpiPos").innerText = pos;
    document.getElementById("kpiNeu").innerText = neu;
    document.getElementById("kpiNeg").innerText = neg;

    renderCharts(pos, neu, neg);
    renderTable();
}

function renderCharts(pos, neu, neg) {
    Object.values(chartInstances).forEach(c => c.destroy());

    chartInstances.dist = new Chart(document.getElementById("chartDistribution"), {
        type: "bar",
        data: {
            labels: ["1★", "2★", "3★", "4★", "5★"],
            datasets: [{ 
                data: [1,2,3,4,5].map(x => cachedReviews.filter(r => Math.round(r.rating) === x).length), 
                backgroundColor: ['#ef4444', '#f97316', '#eab308', '#3b82f6', '#818cf8'],
                borderRadius: 8
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            animation: false, 
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true, suggestedMax: 5 } }
        }
    });

    const sorted = [...cachedReviews].sort((a,b) => new Date(a.google_review_time) - new Date(b.google_review_time));
    chartInstances.trend = new Chart(document.getElementById("chartTrend"), {
        type: "line",
        data: { 
            labels: sorted.map(r => new Date(r.google_review_time).toLocaleDateString()).slice(-20), 
            datasets: [{ 
                data: sorted.map(r => r.rating).slice(-20), 
                borderColor: '#4f46e5', 
                backgroundColor: 'rgba(79, 70, 229, 0.1)',
                tension: 0.4, 
                fill: true,
                pointRadius: 4
            }] 
        },
        options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { min: 1, max: 5 } }, plugins: { legend: { display: false } } }
    });

    chartInstances.sent = new Chart(document.getElementById("chartSentiment"), {
        type: "doughnut",
        data: { 
            labels: ["Pos", "Neu", "Neg"], 
            datasets: [{ 
                data: [pos, neu, neg], 
                backgroundColor: ['#10b981', '#94a3b8', '#f43f5e'], 
                borderWidth: 0, 
                cutout: '70%' 
            }] 
        },
        options: { responsive: true, maintainAspectRatio: false, animation: false }
    });
}

function renderTable() {
    const body = document.getElementById("reviewsTable");
    if (cachedReviews.length === 0) {
        body.innerHTML = '<tr><td colspan="5" class="text-center py-5">No reviews found.</td></tr>';
        return;
    }
    body.innerHTML = [...cachedReviews].reverse().slice(0, 50).map(r => `
        <tr class="border-bottom">
            <td class="fw-bold text-dark">${r.author_name || 'Guest'}</td>
            <td><span class="badge bg-primary rounded-pill px-3">${r.rating} ★</span></td>
            <td class="${r.sentiment_score > 0 ? 'sent-pos' : r.sentiment_score < 0 ? 'sent-neg' : 'sent-neu'}">${r.sentiment_score > 0 ? 'Positive' : r.sentiment_score < 0 ? 'Negative' : 'Neutral'}</td>
            <td class="small text-muted">${new Date(r.google_review_time).toLocaleDateString()}</td>
            <td class="small text-secondary" style="max-width: 400px;">${r.text || '<i class="text-muted">No comment</i>'}</td>
        </tr>
    `).join("");
}

document.addEventListener("DOMContentLoaded", loadCompanies);
document.getElementById("loadBtn").onclick = loadReviews;
document.getElementById("ingestBtn").onclick = streamReviews;
document.getElementById("toggleTheme").onclick = () => {
    const theme = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);
};
</script>
</body>
</html>
