<!-- filename: app/templates/dashboard.html -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ user.email }} | Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        body {
            padding: 24px;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            background-color: #121212 !important;
            color: #e6e6e6 !important;
        }
        [data-theme="dark"] .card {
            background-color: #1e1e1e;
            color: #fff;
        }

        /* KPI Cards */
        .kpi-card {
            min-height: 110px;
        }

        /* Sentiment Colors */
        .sentiment-positive { color: #198754; font-weight: bold; }
        .sentiment-neutral { color: #6c757d; font-weight: bold; }
        .sentiment-negative { color: #dc3545; font-weight: bold; }

        #loadingSpinner {
            display: none;
        }

        /* Search bar */
        #reviewSearch {
            max-width: 320px;
        }
    </style>
</head>

<body>
<div class="container-fluid">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">📊 Reviews Dashboard</h2>
        <div>
            <button id="themeToggle" class="btn btn-outline-dark">
                <i class="bi bi-moon-stars"></i> Dark Mode
            </button>
            <form style="display:inline;" action="/logout" method="post">
                <button class="btn btn-danger ms-2">Logout</button>
            </form>
        </div>
    </div>

    <!-- Filters -->
    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <label class="form-label">Company</label>
            <select id="companySelect" class="form-select">
                {% for c in companies %}
                    <option value="{{ c.id }}" {% if c.id == active_company_id %}selected{% endif %}>
                        {{ c.name }} (#{{ c.id }})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-2">
            <label class="form-label">Start</label>
            <input id="startDate" type="date" class="form-control">
        </div>

        <div class="col-md-2">
            <label class="form-label">End</label>
            <input id="endDate" type="date" class="form-control">
        </div>

        <div class="col-md-2">
            <label class="form-label">Group By</label>
            <select id="groupBy" class="form-select">
                <option value="day">Daily</option>
                <option value="week">Weekly</option>
                <option value="month">Monthly</option>
            </select>
        </div>

        <div class="col-md-2 align-self-end">
            <button id="loadBtn" class="btn btn-primary w-100">Load Dashboard</button>
        </div>

        <div class="col-md-1 align-self-end">
            <div id="loadingSpinner" class="spinner-border text-primary" role="status"></div>
        </div>

    </div>

    <!-- KPI Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card kpi-card">
                <div class="card-body">
                    <h6>Total Reviews</h6>
                    <div id="kpiTotal" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card kpi-card">
                <div class="card-body">
                    <h6>Avg Rating</h6>
                    <div id="kpiAvgRating" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card kpi-card">
                <div class="card-body">
                    <h6>Avg Sentiment</h6>
                    <div id="kpiAvgSentiment" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card kpi-card">
                <div class="card-body">
                    <h6>New (7 days)</h6>
                    <div id="kpiNewReviews" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Section -->
    <div class="row g-3">

        <div class="col-md-6">
            <div class="card"><div class="card-body">
                <h6>Review Volume</h6>
                <canvas id="chartVolume" height="140"></canvas>
            </div></div>
        </div>

        <div class="col-md-6">
            <div class="card"><div class="card-body">
                <h6>Average Rating</h6>
                <canvas id="chartRating" height="140"></canvas>
            </div></div>
        </div>

        <div class="col-md-6 mt-3">
            <div class="card"><div class="card-body">
                <h6>Sentiment Trend</h6>
                <canvas id="chartSentiment" height="140"></canvas>
            </div></div>
        </div>

        <div class="col-md-6 mt-3">
            <div class="card"><div class="card-body">
                <h6>Ratings Distribution</h6>
                <canvas id="chartDistribution" height="140"></canvas>
            </div></div>
        </div>

    </div>

    <!-- AI Summary -->
    <div class="card mt-5">
        <div class="card-body">
            <h5>🤖 AI Summary</h5>
            <div id="aiSummary" class="text-muted fst-italic">AI summary not loaded.</div>
        </div>
    </div>

    <!-- Competitors -->
    <div class="card mt-5">
        <div class="card-body">
            <h4>🏆 Competitor Comparison</h4>
            <div id="competitorContainer" class="mt-3"></div>
        </div>
    </div>

    <!-- Reviews Table -->
    <div class="card mt-5 mb-5">
        <div class="card-body">
            <h4 class="mb-3">📝 Latest Reviews</h4>

            <input id="reviewSearch" class="form-control mb-3" placeholder="Search reviews...">

            <ul id="reviewsList" class="list-group"></ul>

        </div>
    </div>

    <!-- Exports -->
    <div class="row mb-5">
        <div class="col-auto">
            <a href="/api/export/reviews.csv" target="_blank" class="btn btn-outline-secondary">
                <i class="bi bi-filetype-csv"></i> CSV
            </a>
        </div>
        <div class="col-auto">
            <a href="/api/export/reviews.xlsx" target="_blank" class="btn btn-outline-secondary">
                <i class="bi bi-filetype-xlsx"></i> Excel
            </a>
        </div>
        <div class="col-auto">
            <a href="/api/export/summary.pdf" target="_blank" class="btn btn-outline-secondary">
                <i class="bi bi-filetype-pdf"></i> PDF
            </a>
        </div>
    </div>

</div>

<!-- JavaScript -->
<script>
/* ============== DARK MODE ============== */
document.getElementById("themeToggle").addEventListener("click", () => {
    const html = document.documentElement;
    const current = html.getAttribute("data-theme");
    html.setAttribute("data-theme", current === "light" ? "dark" : "light");
});

/* ============== GLOBAL CHART HANDLES ============== */
let volumeChart, ratingChart, sentimentChart, distChart;

/* ============== FETCH DASHBOARD ============== */
async function loadDashboard() {

    const companyId = document.getElementById("companySelect").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    const groupBy = document.getElementById("groupBy").value;

    const spinner = document.getElementById("loadingSpinner");
    spinner.style.display = "inline-block";

    try {

        const params = new URLSearchParams({
            company_id: companyId,
            group_by: groupBy,
            ai: true
        });

        if (start) params.append("start", start);
        if (end) params.append("end", end);

        const response = await fetch(`/api/dashboard?${params.toString()}`);
        const data = await response.json();

        /* ==== KPIs ==== */
        document.getElementById("kpiTotal").textContent = data.kpis.total_reviews;
        document.getElementById("kpiAvgRating").textContent = data.kpis.avg_rating;
        document.getElementById("kpiAvgSentiment").textContent = data.kpis.avg_sentiment;
        document.getElementById("kpiNewReviews").textContent = data.kpis.new_reviews;

        /* ==== Charts ==== */
        const volLabels = data.charts.line.volume.map(i => i.label ?? i.date);
        const volValues = data.charts.line.volume.map(i => i.value);

        const ratingLabels = data.charts.line.rating.map(i => i.label ?? i.date);
        const ratingValues = data.charts.line.rating.map(i => i.value);

        const sentLabels = data.charts.line.sentiment.map(i => i.label ?? i.date);
        const sentValues = data.charts.line.sentiment.map(i => i.value);

        const dist = data.charts.bar.ratings_distribution;
        const distLabels = Object.keys(dist);
        const distValues = Object.values(dist);

        /* CLEAN OLD CHARTS */
        if (volumeChart) volumeChart.destroy();
        if (ratingChart) ratingChart.destroy();
        if (sentimentChart) sentimentChart.destroy();
        if (distChart) distChart.destroy();

        /* RENDER NEW CHARTS */
        volumeChart = new Chart(document.getElementById("chartVolume"), {
            type: "line",
            data: { labels: volLabels, datasets: [{ label: "Volume", data: volValues, borderColor: "#0d6efd", backgroundColor: "#0d6efd33", fill: true }] }
        });

        ratingChart = new Chart(document.getElementById("chartRating"), {
            type: "line",
            data: { labels: ratingLabels, datasets: [{ label: "Rating", data: ratingValues, borderColor: "#198754", backgroundColor: "#19875433", fill: true }] }
        });

        sentimentChart = new Chart(document.getElementById("chartSentiment"), {
            type: "line",
            data: { labels: sentLabels, datasets: [{ label: "Sentiment", data: sentValues, borderColor: "#fd7e14", backgroundColor: "#fd7e1433", fill: true }] }
        });

        distChart = new Chart(document.getElementById("chartDistribution"), {
            type: "bar",
            data: { labels: distLabels, datasets: [{ data: distValues, backgroundColor: ["#dc3545","#fd7e14","#ffc107","#0d6efd","#198754"] }] }
        });

        /* ==== AI SUMMARY ==== */
        document.getElementById("aiSummary").textContent = data.ai_summary?.text || "AI summary unavailable.";

        /* ==== COMPETITORS ==== */
        const compBox = document.getElementById("competitorContainer");
        compBox.innerHTML = "";

        data.competitors.forEach(c => {
            compBox.innerHTML += `
                <div class="card p-3 mb-3">
                    <h6>${c.company.name}</h6>
                    <p class="mb-1">Avg Rating: <b>${c.kpis.avg_rating}</b></p>
                    <p class="mb-1">Reviews: <b>${c.kpis.total_reviews}</b></p>
                </div>
            `;
        });

        /* ==== REVIEWS ==== */
        const list = document.getElementById("reviewsList");
        list.innerHTML = "";

        data.recent_reviews.forEach(r => {
            const cls = r.label === "positive" ? "sentiment-positive"
                     : r.label === "negative" ? "sentiment-negative"
                     : "sentiment-neutral";

            list.innerHTML += `
                <li class="list-group-item">
                    <div class="d-flex justify-content-between">
                        <div><strong>${r.author}</strong> — ${r.time}</div>
                        <div class="${cls}">★ ${r.rating}</div>
                    </div>
                    <div class="small mt-2">${r.text}</div>
                </li>
            `;
        });

    } catch (err) {
        console.error("Dashboard load error", err);

    } finally {
        spinner.style.display = "none";
    }
}

/* ============== SEARCH FILTER ============== */
document.getElementById("reviewSearch").addEventListener("input", function() {
    const term = this.value.toLowerCase();
    document.querySelectorAll("#reviewsList li").forEach(li => {
        li.style.display = li.textContent.toLowerCase().includes(term) ? "" : "none";
    });
});

/* ============== INIT ============== */
document.getElementById("loadBtn").addEventListener("click", loadDashboard);
loadDashboard();

</script>

</body>
</html>
