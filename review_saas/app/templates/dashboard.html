<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ReviewSaaS | Executive Intelligence</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --primary-blue: #1a73e8; }
        body { background:#f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border:none; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .kpi { font-size:28px; font-weight:700; color: #2c3e50; }
        .status-badge { font-size: 0.75rem; padding: 6px 14px; border-radius: 20px; font-weight: bold; }
        .review { border-bottom:1px solid #eee; padding:15px 0; }
        .urgent-item { border-left: 4px solid #dc3545; padding-left: 10px; background: #fff5f5; }
        .sync-spinning { animation: fa-spin 2s infinite linear; }
        .pac-container { z-index: 1060 !important; } /* Fix for Google Search in Modal */
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            <i class="fa fa-chart-line text-primary me-2"></i>Review<span class="text-primary">SaaS</span> 
            <small class="text-muted" style="font-size: 0.65rem;">v2.0</small>
        </span>
        <div class="d-flex align-items-center">
            <button class="btn btn-primary btn-sm rounded-pill px-3" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
                <i class="fa fa-plus me-1"></i> Add Business
            </button>
            <a href="/logout" class="btn btn-warning btn-sm ms-3 rounded-pill px-3">Logout</a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="card p-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label fw-bold small">ACTIVE BUSINESS</label>
                <div class="input-group shadow-sm">
                    <select id="companySelect" class="form-select"></select>
                    <button id="syncNowBtn" class="btn btn-outline-primary" title="Fetch Fresh Google Reviews">
                        <i id="syncIcon" class="fa fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small">START DATE</label>
                <input id="startDate" type="date" class="form-control shadow-sm">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small">END DATE</label>
                <input id="endDate" type="date" class="form-control shadow-sm">
            </div>
            <div class="col-md-2 d-grid">
                <button id="fetchBtn" class="btn btn-primary fw-bold shadow-sm">Update Dashboard</button>
            </div>
        </div>
        <div id="syncStatus" class="small mt-2 text-center d-none"></div>
    </div>

    <div class="row g-3 mb-2">
        <div class="col-md-3"><div class="card p-3 text-center"><div class="text-muted small fw-bold">TOTAL REVIEWS</div><div id="kpi_reviews" class="kpi">0</div></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><div class="text-muted small fw-bold">AVG RATING</div><div id="kpi_rating" class="kpi">0.0</div></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><div class="text-muted small fw-bold">AVG SENTIMENT</div><div id="kpi_sentiment" class="kpi">0.00</div></div></div>
        <div class="col-md-3"><div class="card p-3 text-center"><div class="text-muted small fw-bold">NEW (7D)</div><div id="kpi_new" class="kpi">0</div></div></div>
    </div>

    <div class="row g-3">
        <div class="col-md-6"><div class="card p-3"><h6>Review Volume</h6><canvas id="chartVolume" height="200"></canvas></div></div>
        <div class="col-md-6"><div class="card p-3"><h6>Sentiment Velocity (v2)</h6><canvas id="chartSentiment" height="200"></canvas></div></div>
    </div>

    <div class="row mt-3">
        <div class="col-lg-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="fw-bold"><i class="fa fa-robot text-primary me-2"></i>AI Executive Summary</h5>
                    <div id="conclusion_box"></div>
                </div>
                <p id="ai_summary" class="text-secondary" style="line-height:1.6"></p>
                <hr>
                <h6 class="fw-bold mt-3">Priority Action Items:</h6>
                <ul id="ai_actions"></ul>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card p-4 h-100 bg-dark text-white">
                <h5 class="fw-bold text-danger"><i class="fa fa-bell me-2"></i>System Alerts</h5>
                <ul id="alerts" class="list-unstyled mt-3 small"></ul>
                <div class="mt-auto pt-3 border-top border-secondary">
                    <h6 class="fw-bold small text-muted">CUSTOMER THEMES</h6>
                    <div id="themes_box"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-12">
            <div class="card p-4">
                <h5 class="fw-bold mb-3"><i class="fa fa-rss text-info me-2"></i>Intelligence Feed</h5>
                <div id="reviews"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addCompanyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Connect New Google Listing</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <label class="form-label fw-bold">Search Business</label>
                <input id="pac-input" type="text" class="form-control shadow-sm mb-3" placeholder="Enter name or address...">
                <div id="place-preview" class="p-3 border rounded bg-light d-none">
                    <h6 id="p-name" class="fw-bold mb-1"></h6>
                    <p id="p-address" class="small text-muted mb-2"></p>
                    <span class="badge bg-secondary">Place ID: <span id="p-id"></span></span>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button id="confirmAddBtn" class="btn btn-primary w-100 fw-bold py-2" disabled>Link & Initialize Sync</button>
            </div>
        </div>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_ACTUAL_GOOGLE_API_KEY&libraries=places"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let activeCharts = {};
let selectedPlace = null;
const $ = (id) => document.getElementById(id);

/* --- 1. GOOGLE AUTOCOMPLETE --- */
function initGoogleSearch() {
    const autocomplete = new google.maps.places.Autocomplete($('pac-input'));
    autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.place_id) return;
        selectedPlace = place;
        $('p-name').innerText = place.name;
        $('p-address').innerText = place.formatted_address;
        $('p-id').innerText = place.place_id;
        $('place-preview').classList.remove('d-none');
        $('confirmAddBtn').disabled = false;
    });
}

/* --- 2. ADD & FIRST SCRAPE --- */
$('confirmAddBtn').onclick = async () => {
    const btn = $('confirmAddBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa fa-spinner fa-spin me-2"></i>Syncing Initial Data...';

    const payload = { 
        name: selectedPlace.name, 
        google_place_id: selectedPlace.place_id, 
        address: selectedPlace.formatted_address 
    };

    try {
        const res = await fetch('/api/companies/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        const company = await res.json();
        
        // Trigger initial scrape from sync.py
        await fetch(`/api/sync/trigger?company_id=${company.id}&place_id=${selectedPlace.place_id}`);
        location.reload();
    } catch (e) { alert("Sync Error. Check Outscraper Key."); btn.disabled = false; }
};

/* --- 3. FETCH DATA BUTTON (MANUAL REFRESH) --- */
$('syncNowBtn').onclick = async () => {
    const cid = $("companySelect").value;
    const icon = $("syncIcon");
    const status = $("syncStatus");
    if(!cid) return;

    icon.classList.add('sync-spinning');
    status.classList.remove('d-none');
    status.innerHTML = `<span class="text-primary fw-bold">Fetching fresh reviews from Google Maps...</span>`;

    try {
        await fetch(`/api/sync/refresh?company_id=${cid}`);
        status.innerHTML = `<span class="text-success fw-bold">Success! Dashboard updated.</span>`;
        setTimeout(() => fetchDashboard(), 1000);
    } catch (e) {
        status.innerHTML = `<span class="text-danger fw-bold">Fetch failed. Check Backend.</span>`;
    } finally {
        setTimeout(() => { icon.classList.remove('sync-spinning'); status.classList.add('d-none'); }, 5000);
    }
};

/* --- 4. DASHBOARD CORE LOGIC --- */
async function loadCompanies() {
    try {
        const res = await fetch(`/api/companies/list`);
        if (res.status === 401) { window.location.href = "/login"; return; } // LOGIN CHECK
        const data = await res.json();
        $("companySelect").innerHTML = data.companies.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
    } catch (e) { console.error("Session Error"); }
}

async function fetchDashboard() {
    const cid = $("companySelect").value;
    const s = $("startDate").value;
    const e = $("endDate").value;
    if (!cid) return;

    const params = `company_id=${cid}&start=${s}&end=${e}`;

    // Parallel analysis calls
    const [kpi, summary, recs, feed, chartsData, themes] = await Promise.all([
        fetch(`/api/kpis?${params}`).then(r => r.json()),
        fetch(`/api/v2/ai/executive-summary?${params}`).then(r => r.json()),
        fetch(`/api/v2/ai/recommendations?${params}`).then(r => r.json()),
        fetch(`/api/reviews/feed?${params}`).then(r => r.json()),
        fetch(`/api/series/overview?${params}`).then(r => r.json()),
        fetch(`/api/keywords/themes?${params}`).then(r => r.json())
    ]);

    // Update UI
    $("kpi_reviews").innerText = kpi.total_reviews;
    $("kpi_rating").innerText = kpi.avg_rating.toFixed(1);
    $("kpi_sentiment").innerText = kpi.avg_sentiment.toFixed(2);
    $("kpi_new").innerText = kpi.new_reviews;
    $("ai_summary").innerText = summary.summary;
    $("ai_actions").innerHTML = recs.top_action_items.map(a => `<li class="mb-2 fw-bold">${a}</li>`).join("");
    
    const bColor = summary.conclusion.includes("Attention") ? "#dc3545" : "#198754";
    $("conclusion_box").innerHTML = `<span class="status-badge" style="background:${bColor}22;color:${bColor}">${summary.conclusion}</span>`;

    $("themes_box").innerHTML = `<div class="text-success small">Pos: ${themes.positive_keywords.slice(0,3).join(", ")}</div><div class="text-danger small">Neg: ${themes.negative_keywords.slice(0,3).join(", ")}</div>`;

    $("reviews").innerHTML = feed.items.map(r => `
        <div class="review ${r.is_urgent ? 'urgent-item' : ''}">
            <div class="d-flex justify-content-between">
                <strong>${r.author_name}</strong>
                <span class="text-warning">${"★".repeat(r.rating)}</span>
            </div>
            <p class="small text-muted mb-0">${r.text}</p>
        </div>
    `).join("");

    renderCharts(chartsData);
}

function renderCharts(data) {
    Object.values(activeCharts).forEach(c => c.destroy());
    const opt = { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false } } };

    activeCharts.vol = new Chart($('chartVolume'), { type: 'line', data: { labels: data.volume.map(x=>x.date), datasets: [{data: data.volume.map(x=>x.value), borderColor:'#0d6efd', fill:true, backgroundColor:'rgba(13,110,253,0.05)'}]}, options: opt });
    activeCharts.sent = new Chart($('chartSentiment'), { type: 'line', data: { labels: data.sentiment.map(x=>x.date), datasets: [{data: data.sentiment.map(x=>x.value), borderColor:'#6610f2'}]}, options: { ...opt, scales: { y: { min:-1, max:1 } } } });
}

window.onload = () => {
    initGoogleSearch();
    loadCompanies().then(() => {
        const d = new Date();
        $("endDate").value = d.toISOString().split('T')[0];
        d.setDate(d.getDate()-30);
        $("startDate").value = d.toISOString().split('T')[0];
        fetchDashboard();
    });
};
$("fetchBtn").onclick = fetchDashboard;
</script>

</body>
</html>
