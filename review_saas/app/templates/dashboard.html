{% extends 'base.html' %}
{% block content %}
<h2>Dashboard</h2>
<div class="row g-3">
  <div class="col-md-3">
    <div class="card p-3"><div id="kpi-total" class="display-6">{{ totals.total_reviews }}</div><div>Total Reviews</div></div>
  </div>
  <div class="col-md-3">
    <div class="card p-3"><div id="kpi-avg" class="display-6">{{ totals.avg_rating }}</div><div>Avg Rating</div></div>
  </div>
  <div class="col-md-6">
    <canvas id="ordersChart" height="120"></canvas>
  </div>
</div>
<script>
const ctx = document.getElementById('ordersChart');
new Chart(ctx, {type:'line', data:{labels: {{ chart.labels|tojson }}, datasets:[{label:'Rating', data: {{ chart.values|tojson }}, borderColor:'#0d6efd'}]}});
</script>
{% endblock %}
