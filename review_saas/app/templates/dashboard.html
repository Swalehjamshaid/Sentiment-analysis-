<!-- filename: app/templates/dashboard.html -->
{% extends 'base.html' %}
{% block content %}
<h2>Dashboard</h2>
<div class="row g-3">
  <div class="col-md-3">
    <div class="card p-3"><div id="kpi-total" class="display-6">-</div><div>Total Reviews</div></div>
  </div>
  <div class="col-md-3">
    <div class="card p-3"><div id="kpi-avg" class="display-6">-</div><div>Avg Rating</div></div>
  </div>
  <div class="col-md-6">
    <canvas id="ordersChart" height="120"></canvas>
  </div>
</div>
<div class="row g-3 mt-2">
  <div class="col-md-6">
    <canvas id="mixChart" height="120"></canvas>
  </div>
  <div class="col-md-6">
    <div class="card p-3">
      <h5>Add Company (Google Places)</h5>
      <input id="place-input" class="form-control" placeholder="Start typing a company name..." />
      <button id="save-company" class="btn btn-primary mt-2">Save</button>
    </div>
  </div>
</div>
<script>
async function loadKPIs(){
  const r = await fetch('/api/kpis');
  const d = await r.json();
  document.getElementById('kpi-total').textContent = d.total_reviews;
  document.getElementById('kpi-avg').textContent = d.avg_rating;
}

async function loadSeries(){
  const r = await fetch('/api/orders/series?days=14');
  const d = await r.json();
  const ctx = document.getElementById('ordersChart');
  new Chart(ctx, {type:'line', data:{labels:d.map(x=>x.date), datasets:[{label:'Orders', data:d.map(x=>x.value), borderColor:'#0d6efd'}]}});
}

async function loadMix(){
  const r = await fetch('/api/category-mix');
  const d = await r.json();
  const ctx = document.getElementById('mixChart');
  new Chart(ctx, {type:'doughnut', data:{labels:Object.keys(d), datasets:[{data:Object.values(d), backgroundColor:['#198754','#6c757d','#dc3545']} ]}});
}

async function saveCompany(){
  const name = document.getElementById('place-input').value;
  const resp = await fetch('/companies/create', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name})});
  const d = await resp.json();
  alert('Company saved with id '+d.id);
}

document.getElementById('save-company').addEventListener('click', saveCompany);

loadKPIs(); loadSeries(); loadMix();
</script>
{% endblock %}
