<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Review SaaS Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
:root{
--transition-speed:.3s;
}

body{
padding:24px;
transition:background-color var(--transition-speed),color var(--transition-speed);
}

[data-theme="dark"]{
background:#121212;
color:#e6e6e6;
}

[data-theme="dark"] .card{
background:#1f1f1f;
color:#e6e6e6;
border-color:#333;
}

[data-theme="dark"] .table{
color:#e6e6e6;
}

.kpi-card{
min-height:120px;
border:none;
transition:transform .2s;
}

.kpi-card:hover{
transform:translateY(-5px);
}

.sent-pos{color:#198754;font-weight:600}
.sent-neu{color:#6c757d;font-weight:600}
.sent-neg{color:#dc3545;font-weight:600}

#loadingSpinner{display:none}

.cursor-pointer{cursor:pointer}

.alert-placeholder{
min-height:0;
position:sticky;
top:10px;
z-index:1050;
}

.chart-wrapper{
min-height:280px;
position:relative;
}

.autocomplete-dropdown{
position:absolute;
z-index:2000;
background:white;
width:100%;
border:1px solid #ddd;
max-height:200px;
overflow-y:auto;
display:none;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.autocomplete-item{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
color: #333;
}

.autocomplete-item:hover{
background:#f8f9fa;
}

/* Ensure Google dropdown appears above modal */
.pac-container {
    z-index: 2000 !important;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded mb-4 shadow">
<div class="container-fluid">

<span class="navbar-brand fw-semibold">
<i class="bi bi-graph-up-arrow me-2"></i>
Review SaaS Dashboard
</span>

<div class="d-flex gap-2">

<button id="toggleTheme" class="btn btn-light btn-sm">
<i class="bi bi-moon-stars"></i>
Theme
</button>

<a href="/dashboard" class="btn btn-outline-light btn-sm">Home</a>

<form action="/logout" method="post">
<button class="btn btn-danger btn-sm">Logout</button>
</form>

</div>
</div>
</nav>


<div class="container-fluid">

<div id="alertHost" class="alert-placeholder mb-3"></div>

<div class="row g-3 align-items-end mb-3 p-3 bg-light rounded border shadow-sm">

<div class="col-md-3">
<label class="form-label fw-semibold">Company</label>
<select id="companySelect" class="form-select"></select>
</div>

<div class="col-md-2">
<label class="form-label fw-semibold">Start</label>
<input id="startDate" type="date" class="form-control">
</div>

<div class="col-md-2">
<label class="form-label fw-semibold">End</label>
<input id="endDate" type="date" class="form-control">
</div>

<div class="col-md-2">
<label class="form-label fw-semibold">Review Limit</label>
<select id="limitSelect" class="form-select">
<option value="10">10</option>
<option value="50" selected>50</option>
<option value="100">100</option>
</select>
</div>

<div class="col-md-2">
<label class="form-label fw-semibold">Group</label>
<select id="groupBy" class="form-select">
<option value="day">Daily</option>
<option value="week">Weekly</option>
<option value="month">Monthly</option>
</select>
</div>

<div class="col-md-1">
<button id="loadBtn" class="btn btn-primary w-100">Load</button>
</div>

</div>

<div class="d-flex gap-2 mb-3">

<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
<i class="bi bi-plus-circle"></i>
Add Company
</button>

<div id="loadingSpinner" class="spinner-border text-primary"></div>

</div>

<div class="row g-3 mb-4">

<div class="col-md-2 col-6">
<div class="card kpi-card shadow-sm">
<div class="card-body">
<div class="text-muted small text-uppercase fw-bold">Total Reviews</div>
<div id="kpiTotal" class="display-6">–</div>
</div>
</div>
</div>

<div class="col-md-2 col-6">
<div class="card kpi-card shadow-sm">
<div class="card-body">
<div class="text-muted small text-uppercase fw-bold">Avg Rating</div>
<div id="kpiRating" class="display-6">–</div>
</div>
</div>
</div>

<div class="col-md-2 col-4">
<div class="card kpi-card shadow-sm">
<div class="card-body">
<div class="text-muted small text-uppercase fw-bold">Positive</div>
<div id="kpiPos" class="display-6 sent-pos">–</div>
</div>
</div>
</div>

<div class="col-md-2 col-4">
<div class="card kpi-card shadow-sm">
<div class="card-body">
<div class="text-muted small text-uppercase fw-bold">Neutral</div>
<div id="kpiNeu" class="display-6 sent-neu">–</div>
</div>
</div>
</div>

<div class="col-md-2 col-4">
<div class="card kpi-card shadow-sm">
<div class="card-body">
<div class="text-muted small text-uppercase fw-bold">Negative</div>
<div id="kpiNeg" class="display-6 sent-neg">–</div>
</div>
</div>
</div>

</div>

<div class="row g-4">

<div class="col-lg-6">
<div class="card shadow-sm">
<div class="card-body chart-wrapper">
<h6 class="fw-bold">Rating Distribution</h6>
<canvas id="chartDistribution"></canvas>
</div>
</div>
</div>

<div class="col-lg-6">
<div class="card shadow-sm">
<div class="card-body chart-wrapper">
<h6 class="fw-bold">Review Trend</h6>
<canvas id="chartTrend"></canvas>
</div>
</div>
</div>

<div class="col-lg-6">
<div class="card shadow-sm">
<div class="card-body chart-wrapper">
<h6 class="fw-bold">Sentiment Analysis</h6>
<canvas id="chartSentiment"></canvas>
</div>
</div>
</div>

</div>

<div class="card mt-4 mb-5 shadow-sm">
<div class="card-body">
<h5 class="fw-bold">Recent Reviews</h5>
<div class="table-responsive">
<table class="table table-hover table-striped table-bordered align-middle">
<thead class="table-light">
<tr>
<th>Author</th>
<th class="cursor-pointer" data-sort="rating">Rating</th>
<th>Sentiment</th>
<th class="cursor-pointer" data-sort="date">Date</th>
<th>Review</th>
</tr>
</thead>
<tbody id="reviewsTable">
<tr><td colspan="5" class="text-center text-muted">No data loaded.</td></tr>
</tbody>
</table>
</div>
</div>
</div>

</div>

<div class="modal fade" id="addCompanyModal">
<div class="modal-dialog modal-lg">
<form id="addCompanyForm" class="modal-content">
<div class="modal-header bg-success text-white">
<h5 class="modal-title">Register New Business</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div class="mb-3 position-relative">
<label class="form-label">Smart Search (Google Powered)</label>
<input id="proxySearchInput" class="form-control" placeholder="Type business name">
<div id="proxyResults" class="autocomplete-dropdown"></div>
</div>

<div class="row g-3">
<div class="col-12">
<label class="form-label">Company Name</label>
<input id="companyName" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Google Place ID</label>
<input id="placeId" class="form-control" required readonly>
</div>

<div class="col-md-6">
<label class="form-label">Address</label>
<input id="companyAddress" class="form-control">
</div>
</div>

</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button class="btn btn-success" type="submit">Add Business</button>
</div>

</form>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places"></script>

<script>
// API Keys Configuration
const GOOGLE_MAPS_API_KEY = "AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc";
const GOOGLE_PLACES_API_KEY = "AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc";

let chartInstances = {};
let cachedReviews = [];
let isLoadingReviews = false;

/* ------------------------------------------------------------------
   GOOGLE PLACES AUTO-FILL LOGIC
   ------------------------------------------------------------------ */
function initGoogleAutocomplete() {
    const input = document.getElementById('proxySearchInput');
    const options = {
        fields: ["name", "place_id", "formatted_address", "geometry"],
        types: ["establishment"]
    };

    const autocomplete = new google.maps.places.Autocomplete(input, options);

    // Main Fill Function
    function fillDetails(place) {
        if (!place.place_id) return;
        
        document.getElementById('companyName').value = place.name || '';
        document.getElementById('placeId').value = place.place_id || '';
        document.getElementById('companyAddress').value = place.formatted_address || '';
        
        // Hide proxy dropdown if it's open
        document.getElementById('proxyResults').style.display = 'none';
    }

    // Trigger on Selection from Dropdown
    autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        fillDetails(place);
    });

    // ROBUST FALLBACK: Auto-resolve if user types and moves away or hits enter
    input.addEventListener('blur', () => {
        setTimeout(() => {
            if (!document.getElementById('placeId').value && input.value.length > 2) {
                resolveFirstMatchingPlace(input.value);
            }
        }, 200);
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            resolveFirstMatchingPlace(input.value);
        }
    });
}

// Logic to find the best match if a user doesn't click the dropdown
function resolveFirstMatchingPlace(query) {
    const service = new google.maps.places.AutocompleteService();
    const placesService = new google.maps.places.PlacesService(document.createElement('div'));

    service.getPlacePredictions({ input: query, types: ['establishment'] }, (predictions, status) => {
        if (status === google.maps.places.PlacesServiceStatus.OK && predictions.length > 0) {
            const firstResult = predictions[0];
            placesService.getDetails({ placeId: firstResult.place_id, fields: ['name', 'place_id', 'formatted_address'] }, (place, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK) {
                    document.getElementById('companyName').value = place.name;
                    document.getElementById('placeId').value = place.place_id;
                    document.getElementById('companyAddress').value = place.formatted_address;
                }
            });
        }
    });
}

// Run Google Init on load
window.addEventListener('load', initGoogleAutocomplete);

/* ------------------------------------------------------------------
   DASHBOARD CORE LOGIC
   ------------------------------------------------------------------ */

function notify(msg, type = "danger") {
    const host = document.getElementById("alertHost");
    host.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${msg}<button class="btn-close" data-bs-dismiss="alert"></button></div>`;
}

async function apiRequest(url, options = {}) {
    try {
        const res = await fetch(url, { ...options, credentials: "include" });
        if (!res.ok) throw new Error(res.status);
        return await res.json();
    } catch (e) {
        notify("API request failed: " + e.message);
        throw e;
    }
}

async function loadCompanies() {
    try {
        const data = await apiRequest("/api/companies");
        const sel = document.getElementById("companySelect");
        sel.innerHTML = data.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
        if (data.length > 0) loadReviews();
    } catch {
        notify("Failed to load companies");
    }
}

async function loadReviews() {
    if (isLoadingReviews) return;
    const companyId = document.getElementById("companySelect").value;
    if (!companyId) return;

    isLoadingReviews = true;
    document.getElementById("loadingSpinner").style.display = "inline-block";

    const params = new URLSearchParams({
        company_id: companyId,
        start: document.getElementById("startDate").value,
        end: document.getElementById("endDate").value,
        limit: document.getElementById("limitSelect").value
    });

    try {
        const res = await apiRequest("/api/reviews?" + params);
        cachedReviews = res.feed || [];
        updateDashboardUI();
    } catch {
        notify("Review load failed");
    } finally {
        document.getElementById("loadingSpinner").style.display = "none";
        isLoadingReviews = false;
    }
}

function updateDashboardUI() {
    const total = cachedReviews.length;
    const avg = total ? cachedReviews.reduce((a, b) => a + b.rating, 0) / total : 0;
    const pos = cachedReviews.filter(r => r.sentiment_score > 0).length;
    const neu = cachedReviews.filter(r => r.sentiment_score == 0).length;
    const neg = cachedReviews.filter(r => r.sentiment_score < 0).length;

    document.getElementById("kpiTotal").textContent = total;
    document.getElementById("kpiRating").textContent = avg.toFixed(1);
    document.getElementById("kpiPos").textContent = pos;
    document.getElementById("kpiNeu").textContent = neu;
    document.getElementById("kpiNeg").textContent = neg;

    renderCharts();
    renderTable();
}

function renderCharts() {
    Object.values(chartInstances).forEach(c => c.destroy());
    chartInstances = {};

    const dist = [1, 2, 3, 4, 5].map(x => cachedReviews.filter(r => Math.round(r.rating) == x).length);
    chartInstances.dist = new Chart(document.getElementById("chartDistribution"), {
        type: "bar",
        data: { labels: ["1★", "2★", "3★", "4★", "5★"], datasets: [{ label: 'Reviews', data: dist, backgroundColor: '#0d6efd' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const dates = [...new Set(cachedReviews.map(r => r.review_time))].sort();
    chartInstances.trend = new Chart(document.getElementById("chartTrend"), {
        type: "line",
        data: { labels: dates, datasets: [{ label: 'Review Count', data: dates.map(d => cachedReviews.filter(r => r.review_time == d).length), borderColor: '#0dcaf0', tension: .1 }] },
        options: { responsive: true, maintainAspectRatio: false }
    });

    const sent = [
        cachedReviews.filter(r => r.sentiment_score > 0).length,
        cachedReviews.filter(r => r.sentiment_score == 0).length,
        cachedReviews.filter(r => r.sentiment_score < 0).length
    ];
    chartInstances.sent = new Chart(document.getElementById("chartSentiment"), {
        type: "doughnut",
        data: { labels: ["Positive", "Neutral", "Negative"], datasets: [{ data: sent, backgroundColor: ['#198754', '#6c757d', '#dc3545'] }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function renderTable() {
    const reviewsTable = document.getElementById("reviewsTable");
    if (cachedReviews.length === 0) {
        reviewsTable.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No data loaded.</td></tr>';
        return;
    }
    reviewsTable.innerHTML = cachedReviews.map(r => `
        <tr>
            <td>${r.author_name}</td>
            <td>${r.rating} ★</td>
            <td class="${r.sentiment_score > 0 ? 'sent-pos' : r.sentiment_score < 0 ? 'sent-neg' : 'sent-neu'}">
                ${r.sentiment_score > 0 ? "Positive" : r.sentiment_score < 0 ? "Negative" : "Neutral"}
            </td>
            <td>${r.review_time}</td>
            <td class="small">${r.text || ""}</td>
        </tr>`).join("");
}

// Bind Buttons
document.getElementById("loadBtn").onclick = loadReviews;
document.getElementById("companySelect").onchange = loadReviews;

document.getElementById("toggleTheme").onclick = () => {
    const theme = document.documentElement.getAttribute("data-theme");
    const next = theme === "light" ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", next);
    localStorage.setItem("theme", next);
};

document.getElementById("addCompanyForm").onsubmit = async e => {
    e.preventDefault();
    const payload = {
        name: document.getElementById("companyName").value,
        place_id: document.getElementById("placeId").value,
        address: document.getElementById("companyAddress").value
    };
    try {
        await apiRequest("/api/companies", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        notify("Company added successfully", "success");
        loadCompanies();
        bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();
        e.target.reset();
    } catch {
        notify("Failed adding company");
    }
};

window.onload = loadCompanies;
</script>
</body>
</html>
