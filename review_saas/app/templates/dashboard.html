
<!-- filename: app/templates/dashboard.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — ReviewSaaS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">ReviewSaaS</a>
    <div class="d-flex">
      <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
  </div>
</nav>
<div class="container py-4">
  <h3>Dashboard</h3>
  <div class="row g-3">
    <div class="col-md-4">
      <div class="p-3 bg-light border rounded">Total Reviews: <span id="kpi-reviews">0</span></div>
    </div>
    <div class="col-md-4">
      <div class="p-3 bg-light border rounded">Average Sentiment: <span id="kpi-sent">0</span></div>
    </div>
    <div class="col-md-4">
      <div class="p-3 bg-light border rounded">New Reviews: <span id="kpi-new">0</span></div>
    </div>
  </div>
  <div class="my-4">
    <canvas id="ordersChart" height="120"></canvas>
  </div>
</div>
<script>
async function loadKPIs(){
  const k = await (await fetch('/api/kpis')).json();
  document.getElementById('kpi-reviews').textContent = k.total_reviews;
  document.getElementById('kpi-sent').textContent = k.avg_sentiment;
  document.getElementById('kpi-new').textContent = k.new_reviews;
}
async function loadSeries(){
  const d = await (await fetch('/api/orders/series?days=14')).json();
  const ctx = document.getElementById('ordersChart');
  new Chart(ctx, {type:'line', data:{labels:d.series.map(x=>x.date), datasets:[{label:'Orders', data:d.series.map(x=>x.value)}]}});
}
loadKPIs();
loadSeries();
</script>
</body>
</html>
