<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Intelligence Dashboard</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body { background-color: #f8f9fa; padding-top: 70px; }
    .navbar-brand { font-weight: 600; }
    .card-header { background-color: #0d6efd; color: white; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1055; }
    #loadingOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; justify-content: center; align-items: center; z-index: 9999;
    }
    .metric-card { transition: transform 0.2s; }
    .metric-card:hover { transform: translateY(-5px); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Review Intelligence</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#addCompanyModal">Add Company</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
  <div class="row mb-4">
    <div class="col-lg-6">
      <label for="companySelect" class="form-label fw-bold">Select Company</label>
      <select id="companySelect" class="form-select form-select-lg">
        <option disabled selected>Loading companies...</option>
      </select>
    </div>
    <div class="col-lg-6 text-end pt-4 pt-lg-0">
      <button class="btn btn-outline-primary btn-lg" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
        <i class="bi bi-plus-lg"></i> Add New Company
      </button>
    </div>
  </div>

  <!-- Metrics Cards -->
  <div class="row g-4" id="metricsContainer">
    <div class="col-md-3">
      <div class="card metric-card shadow-sm border-0">
        <div class="card-body text-center">
          <h6 class="text-muted">Total Reviews</h6>
          <h2 id="totalReviews">—</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card metric-card shadow-sm border-0">
        <div class="card-body text-center">
          <h6 class="text-muted">Average Rating</h6>
          <h2 id="avgRating">—</h2>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card metric-card shadow-sm border-0">
        <div class="card-body text-center">
          <h6 class="text-muted">Positive</h6>
          <h3 id="positiveCount" class="text-success">—</h3>
        </div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card metric-card shadow-sm border-0">
        <div class="card-body text-center">
          <h6 class="text-muted">Negative</h6>
          <h3 id="negativeCount" class="text-danger">—</h3>
        </div>
      </div>
    </div>
  </div>

  <!-- Placeholder for charts / details -->
  <div class="card mt-4 shadow-sm border-0">
    <div class="card-header">
      <h5 class="mb-0">Review Insights & Trends</h5>
    </div>
    <div class="card-body">
      <div class="text-center py-5 text-muted">
        <i class="bi bi-bar-chart-line-fill fs-1"></i>
        <p class="mt-3">Select a company to view trends, sentiments and recommendations</p>
      </div>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay">
  <div class="spinner-border text-primary" style="width: 4rem; height: 4rem;" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container"></div>

<!-- Add Company Modal -->
<div class="modal fade" id="addCompanyModal" tabindex="-1" aria-labelledby="addCompanyModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addCompanyModalLabel">Add New Company</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="addCompanyForm">
        <div class="modal-body">
          <div class="mb-3">
            <label for="placeSearchInput" class="form-label">Search Business (Google Places)</label>
            <input type="text" class="form-control form-control-lg" id="placeSearchInput" placeholder="Type business name or address..." autocomplete="off" required>
          </div>
          <div class="row g-3">
            <div class="col-md-12">
              <input type="text" class="form-control" id="companyName" placeholder="Company Name" required>
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" id="companyCity" placeholder="City">
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" id="companyPhone" placeholder="Phone Number">
            </div>
            <div class="col-12">
              <input type="text" class="form-control" id="companyAddress" placeholder="Full Address">
            </div>
            <div class="col-md-12">
              <input type="url" class="form-control" id="companyWebsite" placeholder="Website[](https://...)">
            </div>
          </div>
          <!-- Hidden fields populated by autocomplete -->
          <input type="hidden" id="placeIdHidden">
          <input type="hidden" id="latHidden">
          <input type="hidden" id="lngHidden">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveCompanyBtn">Save Company</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap JS + Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<!-- Google Maps Places API (replace YOUR_API_KEY) -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places" async defer></script>

<script>
// ----------------------------------------------------------
// Global variables
// ----------------------------------------------------------
let currentCompanyId = null;
let googleAutocomplete = null;

// ----------------------------------------------------------
// DOM ready
// ----------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => {
  loadCompanies();
  initAutocomplete();
  document.getElementById('addCompanyForm').addEventListener('submit', handleAddCompany);
});

// ----------------------------------------------------------
// 1. Load companies list
// ----------------------------------------------------------
async function loadCompanies() {
  const select = document.getElementById('companySelect');
  select.innerHTML = '<option disabled selected>Loading companies...</option>';

  try {
    const res = await fetch('/api/companies?page=1&limit=100&status=active&sort=name&order=asc');
    if (!res.ok) throw new Error(await res.text());

    const companies = await res.json();

    select.innerHTML = '<option value="" disabled selected>Select company...</option>';

    if (companies.length === 0) {
      select.innerHTML += '<option disabled>No companies found</option>';
      showToast("No companies found", "warning");
      return;
    }

    companies.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name + (c.city ? ` (${c.city})` : '');
      select.appendChild(opt);
    });

    // Auto-load first company
    if (!currentCompanyId && companies.length > 0) {
      currentCompanyId = companies[0].id;
      select.value = currentCompanyId;
      loadSummary(currentCompanyId);
    }

    select.onchange = () => {
      currentCompanyId = select.value ? Number(select.value) : null;
      if (currentCompanyId) loadSummary(currentCompanyId);
      else clearMetrics();
    };

  } catch (err) {
    console.error(err);
    select.innerHTML = '<option disabled selected>Error loading companies</option>';
    showToast("Failed to load companies", "danger");
  }
}

// ----------------------------------------------------------
// 2. Google Places Autocomplete
// ----------------------------------------------------------
function initAutocomplete() {
  const input = document.getElementById('placeSearchInput');
  if (!input || !window.google?.maps?.places) {
    console.warn("Google Places library not loaded");
    return;
  }

  googleAutocomplete = new google.maps.places.Autocomplete(input, {
    types: ['establishment'],
    fields: ['place_id', 'name', 'formatted_address', 'geometry.location', 'formatted_phone_number', 'website']
  });

  googleAutocomplete.addListener('place_changed', () => {
    const place = googleAutocomplete.getPlace();
    if (!place.place_id) return;

    document.getElementById('companyName').value = place.name || '';
    document.getElementById('companyAddress').value = place.formatted_address || '';
    document.getElementById('placeIdHidden').value = place.place_id;

    if (place.geometry?.location) {
      document.getElementById('latHidden').value = place.geometry.location.lat();
      document.getElementById('lngHidden').value = place.geometry.location.lng();
    }

    // Optional: fetch more details
    fetch(`/api/companies/details/${place.place_id}`)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        document.getElementById('companyPhone').value = data.phone || '';
        document.getElementById('companyWebsite').value = data.website || '';
        document.getElementById('companyCity').value = data.city || '';
      })
      .catch(() => showToast("Could not load full details", "warning"));
  });
}

// ----------------------------------------------------------
// 3. Add company form submit
// ----------------------------------------------------------
async function handleAddCompany(e) {
  e.preventDefault();
  showLoading(true);

  const payload = {
    name: document.getElementById('companyName').value.trim(),
    place_id: document.getElementById('placeIdHidden').value.trim(),
    city: document.getElementById('companyCity').value.trim(),
    address: document.getElementById('companyAddress').value.trim(),
    phone: document.getElementById('companyPhone').value.trim(),
    website: document.getElementById('companyWebsite').value.trim(),
    lat: parseFloat(document.getElementById('latHidden').value) || null,
    lng: parseFloat(document.getElementById('lngHidden').value) || null,
  };

  if (!payload.name) {
    showToast("Company name is required", "danger");
    showLoading(false);
    return;
  }

  try {
    const res = await fetch('/api/companies', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Failed to add company");
    }

    const newCompany = await res.json();
    showToast(`"${newCompany.name}" added successfully!`, "success");

    // Refresh list & close modal
    loadCompanies();
    bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();

    // Optional: auto-select the new company
    setTimeout(() => {
      const select = document.getElementById('companySelect');
      const opt = Array.from(select.options).find(o => o.textContent.includes(newCompany.name));
      if (opt) {
        select.value = opt.value;
        currentCompanyId = Number(opt.value);
        loadSummary(currentCompanyId);
      }
    }, 800);

  } catch (err) {
    showToast(err.message, "danger");
  } finally {
    showLoading(false);
  }
}

// ----------------------------------------------------------
// 4. Placeholder: Load summary/metrics (connect to your real endpoint)
// ----------------------------------------------------------
async function loadSummary(companyId) {
  showLoading(true);
  try {
    // Replace with your real endpoint when ready
    // const res = await fetch(`/api/reviews/summary/${companyId}`);
    // const data = await res.json();

    // For demo: fake data
    const fakeData = {
      total_reviews: 248,
      average_rating: 4.2,
      sentiment: { positive: 172, neutral: 41, negative: 35 }
    };

    document.getElementById('totalReviews').textContent = fakeData.total_reviews;
    document.getElementById('avgRating').textContent = fakeData.average_rating.toFixed(1);
    document.getElementById('positiveCount').textContent = fakeData.sentiment.positive;
    document.getElementById('negativeCount').textContent = fakeData.sentiment.negative;

  } catch (err) {
    console.error(err);
    showToast("Failed to load metrics", "danger");
  } finally {
    showLoading(false);
  }
}

function clearMetrics() {
  document.getElementById('totalReviews').textContent = '—';
  document.getElementById('avgRating').textContent = '—';
  document.getElementById('positiveCount').textContent = '—';
  document.getElementById('negativeCount').textContent = '—';
}

// ----------------------------------------------------------
// Helpers
// ----------------------------------------------------------
function showLoading(show) {
  document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
}

function showToast(message, type = 'info') {
  const toastContainer = document.querySelector('.toast-container');
  const toast = document.createElement('div');
  toast.className = `toast align-items-center text-white bg-${type} border-0`;
  toast.innerHTML = `
    <div class="d-flex">
      <div class="toast-body">${message}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  `;
  toastContainer.appendChild(toast);
  new bootstrap.Toast(toast).show();

  // Auto-remove after 5 seconds
  setTimeout(() => toast.remove(), 5000);
}
</script>
</body>
</html>
