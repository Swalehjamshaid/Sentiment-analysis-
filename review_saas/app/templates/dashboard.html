<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review SaaS Dashboard</title>

    <!-- Bootstrap CSS FIXED -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Chart.js FIXED -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Google Places Autocomplete FIXED -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places"></script>

    <style>
        body { padding: 25px; }

        [data-theme="dark"] {
            background-color: #121212 !important;
            color: #e6e6e6 !important;
        }
        [data-theme="dark"] .card {
            background-color: #1f1f1f;
            color: #ffffff;
        }

        .kpi-card { min-height: 120px; }
        .sent-pos { color:#198754; font-weight:bold; }
        .sent-neu { color:#6c757d; font-weight:bold; }
        .sent-neg { color:#dc3545; font-weight:bold; }

        #loadingSpinner { display:none; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary rounded mb-4 px-3">
    <span class="navbar-brand fw-bold fs-4">📊 Review SaaS Dashboard</span>

    <button id="toggleTheme" class="btn btn-light">
        <i class="bi bi-moon-stars"></i> Theme
    </button>
</nav>


<div class="container-fluid">

    <!-- FILTERS -->
    <div class="row g-3 mb-4">

        <!-- COMPANY -->
        <div class="col-md-3">
            <label class="form-label fw-bold">Company</label>
            <select id="companySelect" class="form-select"></select>
        </div>

        <!-- START DATE -->
        <div class="col-md-2">
            <label class="form-label fw-bold">Start</label>
            <input type="date" id="startDate" class="form-control">
        </div>

        <!-- END DATE -->
        <div class="col-md-2">
            <label class="form-label fw-bold">End</label>
            <input type="date" id="endDate" class="form-control">
        </div>

        <!-- LIMIT -->
        <div class="col-md-2">
            <label class="form-label fw-bold">Limit</label>
            <select id="limitSelect" class="form-select">
                <option value="10">10</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
            </select>
        </div>

        <!-- LOAD -->
        <div class="col-md-2 align-self-end">
            <button id="loadBtn" class="btn btn-primary w-100">Load</button>
        </div>

        <div class="col-md-1 align-self-end">
            <div id="loadingSpinner" class="spinner-border text-primary"></div>
        </div>

    </div>

    <!-- ADD COMPANY -->
    <button class="btn btn-success mb-4" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
        <i class="bi bi-plus-circle"></i> Add Company
    </button>


    <!-- KPI CARDS -->
    <div class="row g-3 mb-4">

        <div class="col-md-2">
            <div class="card kpi-card shadow">
                <div class="card-body">
                    <h6>Total Reviews</h6>
                    <div id="kpiTotal" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow">
                <div class="card-body">
                    <h6>Avg Rating</h6>
                    <div id="kpiRating" class="fs-3 fw-bold">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow">
                <div class="card-body">
                    <h6>Positive</h6>
                    <div id="kpiPos" class="fs-3 sent-pos">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow">
                <div class="card-body">
                    <h6>Neutral</h6>
                    <div id="kpiNeu" class="fs-3 sent-neu">–</div>
                </div>
            </div>
        </div>

        <div class="col-md-2">
            <div class="card kpi-card shadow">
                <div class="card-body">
                    <h6>Negative</h6>
                    <div id="kpiNeg" class="fs-3 sent-neg">–</div>
                </div>
            </div>
        </div>

    </div>

    <!-- CHARTS -->
    <div class="row g-4 mb-5">

        <div class="col-md-6">
            <div class="card shadow"><div class="card-body">
                <h5>Rating Distribution</h5>
                <canvas id="chartDistribution" height="140"></canvas>
            </div></div>
        </div>

        <div class="col-md-6">
            <div class="card shadow"><div class="card-body">
                <h5>Review Trend</h5>
                <canvas id="chartTrend" height="140"></canvas>
            </div></div>
        </div>

        <div class="col-md-6">
            <div class="card shadow mt-4"><div class="card-body">
                <h5>Sentiment Distribution</h5>
                <canvas id="chartSentiment" height="140"></canvas>
            </div></div>
        </div>

    </div>

    <!-- REVIEWS TABLE -->
    <div class="card shadow mb-5">
        <div class="card-body">
            <h4 class="mb-3">Recent Reviews</h4>

            <table class="table table-bordered table-striped">
                <thead class="table-light">
                    <tr>
                        <th>Author</th>
                        <th>Rating</th>
                        <th>Sentiment</th>
                        <th>Date</th>
                        <th>Review</th>
                    </tr>
                </thead>
                <tbody id="reviewsTable"></tbody>
            </table>

        </div>
    </div>

</div>


<!-- ADD COMPANY MODAL -->
<div class="modal fade" id="addCompanyModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="addCompanyForm" class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Company</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <label class="fw-bold">Google Search</label>
                <input id="placeSearch" class="form-control mb-3">

                <label>Company Name</label>
                <input id="companyName" name="name" class="form-control mb-2">

                <label>Place ID</label>
                <input id="placeId" name="place_id" class="form-control mb-2">

                <label>Address</label>
                <input id="companyAddress" name="address" class="form-control mb-2">

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button class="btn btn-success" type="submit">Add Company</button>
            </div>

        </form>
    </div>
</div>


<!-- Bootstrap JS (REQUIRED for modals) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- DASHBOARD LOGIC -->
<script>

/* ==============================
      THEME TOGGLE
============================== */
document.getElementById("toggleTheme").onclick = () => {
    const html = document.documentElement;
    const t = html.getAttribute("data-theme");
    html.setAttribute("data-theme", t === "light" ? "dark" : "light");
};

/* ==============================
   LOAD COMPANIES
============================== */
async function loadCompanies() {
    const res = await fetch("/companies/list");
    const data = await res.json();

    const sel = document.getElementById("companySelect");
    sel.innerHTML = "";

    data.items.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.name} (${c.place_id})</option>`;
    });
}

/* ==============================
   LOAD DASHBOARD
============================== */
async function loadDashboard() {
    const spinner = document.getElementById("loadingSpinner");
    spinner.style.display = "inline-block";

    const companyId = document.getElementById("companySelect").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;
    const limit = document.getElementById("limitSelect").value;

    let params = new URLSearchParams({
        company_id: companyId,
        limit_reviews: limit,
        group_by: "day"
    });

    if (start) params.set("start", start);
    if (end) params.set("end", end);

    const res = await fetch(`/api/dashboard?${params}`);
    const d = await res.json();

    spinner.style.display = "none";

    /* KPIs */
    document.getElementById("kpiTotal").textContent = d.kpis.total_reviews;
    document.getElementById("kpiRating").textContent = d.kpis.avg_rating;
    document.getElementById("kpiPos").textContent = d.sentiment_share.positive;
    document.getElementById("kpiNeu").textContent = d.sentiment_share.neutral;
    document.getElementById("kpiNeg").textContent = d.sentiment_share.negative;

    /* ========== CHARTS ========== */
    if (window.chartTrend) chartTrend.destroy();
    if (window.chartDistribution) chartDistribution.destroy();
    if (window.chartSentiment) chartSentiment.destroy();

    chartDistribution = new Chart(document.getElementById("chartDistribution"), {
        type: "bar",
        data: {
            labels: ["1★", "2★", "3★", "4★", "5★"],
            datasets: [{
                data: Object.values(d.ratings_distribution),
                backgroundColor: ["#dc3545","#fd7e14","#ffc107","#0d6efd","#198754"]
            }]
        }
    });

    chartTrend = new Chart(document.getElementById("chartTrend"), {
        type: "line",
        data: {
            labels: d.charts.line.volume.map(i => i.label),
            datasets: [{
                label: "Reviews",
                data: d.charts.line.volume.map(i => i.value),
                borderColor: "#0d6efd",
                backgroundColor: "#0d6efd33",
                fill: true
            }]
        }
    });

    chartSentiment = new Chart(document.getElementById("chartSentiment"), {
        type: "pie",
        data: {
            labels: ["Positive","Neutral","Negative"],
            datasets:[{
                data:[
                    d.sentiment_share.positive,
                    d.sentiment_share.neutral,
                    d.sentiment_share.negative
                ],
                backgroundColor:["#198754","#6c757d","#dc3545"]
            }]
        }
    });

    /* REVIEWS TABLE */
    const tbody = document.getElementById("reviewsTable");
    tbody.innerHTML = "";

    d.recent_reviews.forEach(r => {
        tbody.innerHTML += `
            <tr>
                <td>${r.author}</td>
                <td>${r.rating}</td>
                <td class="${
                    r.label === 'positive' ? 'sent-pos' :
                    r.label === 'negative' ? 'sent-neg' : 'sent-neu'
                }">${r.label}</td>
                <td>${r.time}</td>
                <td>${r.text}</td>
            </tr>`;
    });
}

/* ==============================
   GOOGLE AUTOCOMPLETE
============================== */
let autocomplete;
function initAutocomplete() {
    autocomplete = new google.maps.places.Autocomplete(
        document.getElementById("placeSearch"),
        { types: ["establishment"] }
    );

    autocomplete.addListener("place_changed", () => {
        const p = autocomplete.getPlace();
        if (!p) return;

        document.getElementById("companyName").value = p.name || "";
        document.getElementById("placeId").value = p.place_id || "";
        document.getElementById("companyAddress").value =
            p.formatted_address || "";
    });
}

window.onload = () => {
    initAutocomplete();
    loadCompanies().then(loadDashboard);
};

document.getElementById("loadBtn").onclick = loadDashboard;
document.getElementById("companySelect").onchange = loadDashboard;

</script>

</body>
</html>
