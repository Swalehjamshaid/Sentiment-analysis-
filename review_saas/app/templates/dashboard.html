<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review SaaS Dashboard</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Google Maps JavaScript API + Places library with YOUR KEY -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjQFzX3Wak4maUWhSXstPmnbBOOKGVGfc&libraries=places&loading=async&callback=initAutocomplete">
  </script>

  <style>
    body { padding: 1.5rem; }
    [data-theme="dark"] {
      background: #121212 !important;
      color: #e0e0e0 !important;
    }
    [data-theme="dark"] .card {
      background: #1e1e1e;
      color: #ffffff;
    }
    [data-theme="dark"] .table-light {
      --bs-table-bg: #2c2c2c;
      --bs-table-color: #e0e0e0;
    }
    .kpi-card { min-height: 118px; }
    .sent-pos { color: #198754; font-weight: 700; }
    .sent-neu { color: #6c757d; font-weight: 700; }
    .sent-neg { color: #dc3545; font-weight: 700; }
    #loadingSpinner { display: none; vertical-align: middle; }
    .cursor-pointer { cursor: pointer; user-select: none; }
    .form-label { margin-bottom: 0.35rem; }
    #placeSearch { background: #fff; }
    #placeId { background: #f8f9fa; }
  </style>
</head>
<body>

  <!-- Top Nav -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary rounded-3 mb-4 shadow-sm">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">📊 Review SaaS Dashboard</span>
      <button id="toggleTheme" class="btn btn-light btn-sm">
        <i class="bi bi-moon-stars-fill"></i> Toggle Theme
      </button>
    </div>
  </nav>

  <div class="container-fluid">

    <!-- Filters (unchanged) -->
    <div class="row g-3 align-items-end mb-4">
      <div class="col-md-3">
        <label class="form-label fw-semibold">Company</label>
        <select id="companySelect" class="form-select"></select>
        <div class="form-text text-muted" id="companySourceNote"></div>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold">Start Date</label>
        <input id="startDate" type="date" class="form-control"/>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold">End Date</label>
        <input id="endDate" type="date" class="form-control"/>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold">Group By</label>
        <select id="groupBy" class="form-select">
          <option value="day" selected>Daily</option>
          <option value="week">Weekly</option>
          <option value="month">Monthly</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label fw-semibold">Review Limit</label>
        <select id="limitSelect" class="form-select">
          <option value="10">10</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <div class="col-auto d-flex gap-2 align-items-end">
        <button id="loadBtn" class="btn btn-primary px-4">Load</button>
        <div id="loadingSpinner" class="spinner-border spinner-border-sm text-primary" role="status"></div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="d-flex flex-wrap gap-2 mb-4">
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
        <i class="bi bi-plus-circle"></i> Add Company
      </button>
      <a class="btn btn-outline-secondary" href="/api/export/reviews.csv" target="_blank">
        <i class="bi bi-filetype-csv"></i> CSV
      </a>
      <a class="btn btn-outline-secondary" href="/api/export/reviews.xlsx" target="_blank">
        <i class="bi bi-filetype-xlsx"></i> Excel
      </a>
      <a class="btn btn-outline-secondary" href="/api/export/summary.pdf" target="_blank">
        <i class="bi bi-filetype-pdf"></i> PDF
      </a>
    </div>

    <!-- KPI Cards (unchanged) -->
    <div class="row g-3 mb-5">
      <div class="col-md-2 col-6"><div class="card kpi-card shadow-sm h-100"><div class="card-body text-center">
        <h6 class="card-title mb-2">Total Reviews</h6>
        <div id="kpiTotal" class="fs-3 fw-bold">–</div>
      </div></div></div>
      <div class="col-md-2 col-6"><div class="card kpi-card shadow-sm h-100"><div class="card-body text-center">
        <h6 class="card-title mb-2">Avg Rating</h6>
        <div id="kpiRating" class="fs-3 fw-bold">–</div>
      </div></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card shadow-sm h-100"><div class="card-body text-center">
        <h6 class="card-title mb-2">Positive</h6>
        <div id="kpiPos" class="fs-3 sent-pos">–</div>
      </div></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card shadow-sm h-100"><div class="card-body text-center">
        <h6 class="card-title mb-2">Neutral</h6>
        <div id="kpiNeu" class="fs-3 sent-neu">–</div>
      </div></div></div>
      <div class="col-md-2 col-4"><div class="card kpi-card shadow-sm h-100"><div class="card-body text-center">
        <h6 class="card-title mb-2">Negative</h6>
        <div id="kpiNeg" class="fs-3 sent-neg">–</div>
      </div></div></div>
    </div>

    <!-- Charts (unchanged) -->
    <div class="row g-4 mb-5">
      <div class="col-lg-6"><div class="card shadow-sm h-100"><div class="card-body">
        <h5 class="card-title">Rating Distribution</h5>
        <canvas id="chartDistribution" height="140"></canvas>
      </div></div></div>
      <div class="col-lg-6"><div class="card shadow-sm h-100"><div class="card-body">
        <h5 class="card-title">Review Trend</h5>
        <canvas id="chartTrend" height="140"></canvas>
      </div></div></div>
      <div class="col-lg-6"><div class="card shadow-sm h-100"><div class="card-body">
        <h5 class="card-title">Sentiment Breakdown</h5>
        <canvas id="chartSentiment" height="140"></canvas>
      </div></div></div>
    </div>

    <!-- Recent Reviews (unchanged) -->
    <div class="card shadow-sm mb-5">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 class="mb-0">Recent Reviews</h4>
          <small class="text-muted">Click column headers to sort</small>
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-hover table-bordered">
            <thead class="table-light">
              <tr>
                <th>Author</th>
                <th class="cursor-pointer" onclick="sortReviews('rating')">Rating ⬍</th>
                <th>Sentiment</th>
                <th class="cursor-pointer" onclick="sortReviews('date')">Date ⬍</th>
                <th>Review Text</th>
              </tr>
            </thead>
            <tbody id="reviewsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <!-- Add Company Modal - with Google Places Autocomplete -->
  <div class="modal fade" id="addCompanyModal" tabindex="-1" aria-labelledby="addCompanyModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <form id="addCompanyForm" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addCompanyModalLabel">Add New Company (Google Places)</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Search Business / Place</label>
            <input id="placeSearch" class="form-control" autocomplete="off" placeholder="Type restaurant, hotel, store name...">
            <div class="form-text text-muted mt-1">Powered by Google Places</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Company Name</label>
            <input id="companyName" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Google Place ID</label>
            <input id="placeId" name="google_place_id" class="form-control" readonly required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Address</label>
            <input id="companyAddress" name="address" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-success">Add Company</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script>
    // Theme toggle
    document.getElementById("toggleTheme").onclick = () => {
      const html = document.documentElement;
      html.dataset.theme = html.dataset.theme === "dark" ? "light" : "dark";
    };

    let chartTrend, chartDistribution, chartSentiment;
    let cachedReviews = [];

    // ── Companies & Dashboard logic (unchanged from previous version) ──
    async function loadCompanies() { /* ... same as before ... */ }
    async function loadDashboard() { /* ... same as before ... */ }
    function renderReviewsTable(rows) { /* ... same ... */ }
    function sortReviews(by) { /* ... same ... */ }

    // Google Places Autocomplete Initialization
    function initAutocomplete() {
      const input = document.getElementById("placeSearch");
      if (!input || !window.google?.maps?.places) {
        input.placeholder = "Google Places failed to load – check API key & console";
        console.error("Google Places library not loaded. Check API key, enabled APIs, and restrictions.");
        return;
      }

      const autocomplete = new google.maps.places.Autocomplete(input, {
        // Optional: restrict to establishments (businesses)
        types: ['establishment'],
        // Optional: restrict country, e.g. Pakistan → ['pk']
        // componentRestrictions: { country: ['pk'] },
        fields: ['name', 'place_id', 'formatted_address'] // only what we need
      });

      autocomplete.addListener("place_changed", () => {
        const place = autocomplete.getPlace();

        if (!place.place_id) {
          // User clicked outside suggestion or invalid
          alert("Please select a valid place from the dropdown suggestions.");
          return;
        }

        // Fill the form fields automatically
        document.getElementById("companyName").value    = place.name || "";
        document.getElementById("placeId").value        = place.place_id || "";
        document.getElementById("companyAddress").value = place.formatted_address || "";
      });
    }

    // Expose to global scope for Google callback
    window.initAutocomplete = initAutocomplete;

    // Add Company Form Submit (unchanged logic)
    document.getElementById("addCompanyForm").addEventListener("submit", async e => {
      e.preventDefault();
      const form = new FormData(e.target);

      if (!form.get("google_place_id")) {
        alert("Please select a place from the suggestions first.");
        return;
      }

      try {
        const res = await fetch("/api/companies", { method: "POST", body: form });
        if (!res.ok) throw new Error(await res.text() || `HTTP ${res.status}`);

        await loadCompanies();

        const newName = form.get("name");
        const sel = document.getElementById("companySelect");
        for (const opt of sel.options) {
          if (opt.textContent.startsWith(newName + " ")) {
            sel.value = opt.value;
            break;
          }
        }

        bootstrap.Modal.getInstance(document.getElementById("addCompanyModal"))?.hide();
        await loadDashboard();
      } catch (err) {
        console.error(err);
        alert("Failed to add company:\n" + err.message);
      }
    });

    // Event listeners (unchanged)
    document.getElementById("loadBtn").onclick = loadDashboard;
    document.getElementById("companySelect").onchange = loadDashboard;
    ["startDate","endDate","groupBy","limitSelect"].forEach(id => {
      document.getElementById(id).onchange = loadDashboard;
    });

    // Initial load
    loadCompanies().then(() => {
      if (document.getElementById("companySelect").options.length > 1) {
        document.getElementById("companySelect").selectedIndex = 1;
        loadDashboard();
      }
    });
  </script>
</body>
</html>
