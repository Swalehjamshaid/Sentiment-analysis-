<!DOCTYPE html><html lang="en" data-bs-theme="light"><head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Operations Dashboard</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" /><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" /><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script></head><body><nav class="navbar app-navbar sticky-top bg-body-tertiary border-bottom"><div class="container-fluid px-3 px-md-4"><div class="d-flex align-items-center gap-2"><span class="badge rounded-pill text-bg-primary">Ops</span><span class="fw-bold">Operations Dashboard</span><span class="badge text-bg-secondary d-none d-md-inline">v1.5</span></div><div class="d-flex align-items-center gap-2"><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addCompanyModal"><i class="bi bi-buildings me-1"></i> Add Company</button><a class="btn btn-outline-secondary btn-sm" href="/dashboard"><i class="bi bi-speedometer2 me-1"></i> SSR Dashboard</a><button id="themeToggle" class="btn theme-toggle px-3"><i class="bi bi-moon-stars me-1"></i><span>Dark</span></button></div></div></nav><main class="container-fluid px-3 px-md-4 py-3 py-md-4"><div class="row g-3"><div class="col-12 col-xl-8"><div class="panel h-100"><div class="panel-title"><i class="bi bi-activity text-primary"></i> Reviews / Day</div><div style="height: 320px;"><canvas id="ordersChart"></canvas></div></div></div><div class="col-12 col-xl-4"><div class="panel h-100"><div class="panel-title"><i class="bi bi-pie-chart text-primary"></i> Sentiment Mix</div><div style="height: 320px;"><canvas id="mixChart"></canvas></div></div></div></div></main><div class="modal fade" id="addCompanyModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-lg modal-dialog-scrollable"><div class="modal-content"><form action="/companies/create" method="post"><div class="modal-header"><h5 class="modal-title"><i class="bi bi-buildings me-1"></i> Add Company</h5><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button></div><div class="modal-body"><input type="hidden" name="csrf_token" value=""/><div class="row g-3"><div class="col-md-8"><label class="form-label">Name</label><input name="name" id="name" class="form-control" required /></div><div class="col-md-4"><label class="form-label">Place ID</label><input name="place_id" id="place_id" class="form-control" /></div><div class="col-12"><label class="form-label">Address</label><input name="address" id="address" class="form-control" /></div><div class="col-md-4"><label class="form-label">City</label><input name="city" id="city" class="form-control" /></div><div class="col-md-4"><label class="form-label">State</label><input name="state" id="state" class="form-control" /></div><div class="col-md-4"><label class="form-label">Postal Code</label><input name="postal_code" id="postal_code" class="form-control" /></div><div class="col-md-6"><label class="form-label">Country</label><input name="country" id="country" class="form-control" /></div><div class="col-md-3"><label class="form-label">Latitude</label><input name="latitude" id="latitude" class="form-control" type="number" step="any" /></div><div class="col-md-3"><label class="form-label">Longitude</label><input name="longitude" id="longitude" class="form-control" type="number" step="any" /></div><div class="col-md-6"><label class="form-label">Phone</label><input name="phone" id="phone" class="form-control" /></div><div class="col-md-6"><label class="form-label">Website</label><input name="website" id="website" class="form-control" /></div><div class="col-md-6"><label class="form-label">Google URL</label><input name="google_url" id="google_url" class="form-control" /></div><div class="col-md-3"><label class="form-label">Rating</label><input name="rating" id="rating" class="form-control" type="number" step="0.1" /></div><div class="col-md-3"><label class="form-label">User Ratings Total</label><input name="user_ratings_total" id="user_ratings_total" class="form-control" type="number" /></div><div class="col-12"><label class="form-label">Types (CSV)</label><input name="types" id="types" class="form-control" placeholder="restaurant,food,point_of_interest" /></div></div></div><div class="modal-footer"><button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i> Save Company</button></div></form></div></div></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script><script>async function getJSON(u){const r=await fetch(u,{headers:{'Accept':'application/json'}});if(r.status===401){window.location.href='/?show=login';throw new Error('Unauthorized')}if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}let ordersChart,mixChart;function paintCharts(theme){const ctx1=document.getElementById('ordersChart');const ctx2=document.getElementById('mixChart');ordersChart&&ordersChart.destroy();mixChart&&mixChart.destroy();getJSON('/api/orders/series?days=14').then(o=>{ordersChart=new Chart(ctx1,{type:'line',data:{labels:o.labels,datasets:[{label:'Reviews',data:o.series,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.15)',tension:.36,fill:true,pointRadius:2.5,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false}})});getJSON('/api/category-mix').then(m=>{mixChart=new Chart(ctx2,{type:'doughnut',data:{labels:m.labels,datasets:[{label:'Share %',data:m.data,backgroundColor:['#60a5fa','#34d399','#fbbf24'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%'}})})}document.addEventListener('DOMContentLoaded',()=>{paintCharts('light')});</script></body></html>
