<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #4338ca, transparent),
                        radial-gradient(circle at bottom left, #6d28d9, transparent),
                        #0f172a;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body class="p-6">
<div class="w-full max-w-md">
    <div class="glass-panel rounded-3xl p-8 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-white">Get Started</h1>
            <p class="text-indigo-200/50 text-sm mt-1">Join {{ title }} today</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl flex items-center text-rose-400">
            <i class="fas fa-exclamation-circle mr-3"></i>
            <span class="text-sm font-medium">{{ error }}</span>
        </div>
        {% endif %}

        <form action="/register" method="POST" class="space-y-5">
            <input type="hidden" name="next" value="{{ next }}">
            
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Full Name</label>
                <input type="text" name="full_name" required class="input-field block w-full px-4 py-3.5 rounded-2xl focus:outline-none" placeholder="Swaleh Ahmed">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Email Address</label>
                <input type="email" name="email" required class="input-field block w-full px-4 py-3.5 rounded-2xl focus:outline-none" placeholder="swaleh@example.com">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Password</label>
                <input type="password" name="password" required class="input-field block w-full px-4 py-3.5 rounded-2xl focus:outline-none" placeholder="••••••••">
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Confirm Password</label>
                <input type="password" name="confirm_password" required class="input-field block w-full px-4 py-3.5 rounded-2xl focus:outline-none" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl transition-all mt-4">
                Create Account
            </button>
        </form>
    </div>
</div>
</body>
</html>
