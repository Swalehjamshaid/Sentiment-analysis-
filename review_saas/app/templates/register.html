{% extends "base.html" %}
{% block title %}Sign Up | Review Intel AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white shadow-lg rounded-lg p-6">
    <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">Create Account</h1>

    {% if error %}
    <div class="bg-red-100 text-red-700 p-3 rounded mb-4 text-sm">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="bg-green-100 text-green-700 p-3 rounded mb-4 text-sm">
        {{ success }}
    </div>
    {% endif %}

    <form action="/api/auth/register" method="post" class="space-y-4">
        <div>
            <label for="name" class="block text-gray-700 font-medium mb-1">Full Name</label>
            <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="John Doe"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <div>
            <label for="email" class="block text-gray-700 font-medium mb-1">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="you@example.com"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <div>
            <label for="password" class="block text-gray-700 font-medium mb-1">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="********"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <div>
            <label for="confirm_password" class="block text-gray-700 font-medium mb-1">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
                placeholder="********"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <div>
            <button
                type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
            >
                Create Account
            </button>
        </div>
    </form>

    <p class="mt-6 text-center text-gray-500 text-sm">
        Already have an account?
        <a href="/login" class="text-indigo-500 hover:underline">Log in</a>
    </p>
</div>
{% endblock %}
