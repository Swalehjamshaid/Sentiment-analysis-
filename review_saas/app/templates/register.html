{% extends "base.html" %}

{% block title %}Create Account | Review Intel AI{% endblock %}

{% block content %}
<div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-10 shadow-xl rounded-2xl border border-slate-100">
        <h2 class="text-center text-3xl font-extrabold text-slate-900 mb-8">Create your account</h2>

        {% if success %}
        <div class="mb-6 p-4 bg-emerald-50 border-l-4 border-emerald-400 text-emerald-700 text-sm rounded-r-lg">
            <div class="flex items-center">
                <i class="fas fa-check-circle mr-3"></i>
                <span>{{ success }}</span>
            </div>
        </div>
        {% endif %}

        {% if error %}
        <div class="mb-6 p-4 bg-rose-50 border-l-4 border-rose-400 text-rose-700 text-sm rounded-r-lg">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle mr-3"></i>
                <span>{{ error }}</span>
            </div>
        </div>
        {% endif %}

        <form action="/api/auth/register" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700">Full Name</label>
                <input type="text" name="name" required placeholder="Swaleh Jamshaid" 
                       class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700">Email Address</label>
                <input type="email" name="email" required placeholder="roy.jamshaid@gmail.com" 
                       class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700">Password</label>
                <input type="password" name="password" required minlength="8" placeholder="••••••••" 
                       class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700">Confirm Password</label>
                <input type="password" name="confirm_password" required placeholder="••••••••" 
                       class="mt-1 block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
            </div>

            <button type="submit" 
                    class="w-full py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition transform hover:-translate-y-0.5 active:scale-95">
                Register Account
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-500">
            Already have an account? 
            <a href="/login" class="font-bold text-indigo-600 hover:text-indigo-500">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
