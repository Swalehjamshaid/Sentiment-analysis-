{% extends 'base.html' %}
{% block content %}
<h2>Register</h2>
<form method="post" action="/auth/register" enctype="multipart/form-data" class="mt-3" style="max-width:520px">
  <div class="mb-3">
    <label>Full Name</label>
    <input name="full_name" maxlength="100" class="form-control" required />
  </div>
  <div class="mb-3">
    <label>Email</label>
    <input name="email" type="email" class="form-control" required />
  </div>
  <div class="mb-3">
    <label>Password</label>
    <input name="password" type="password" class="form-control" placeholder="At least 8 chars incl. upper, lower, digit, special" required />
  </div>
  <div class="mb-3">
    <label>Profile Picture (optional, PNG/JPEG)</label>
    <input type="file" name="profile_pic" accept="image/png, image/jpeg" class="form-control" />
  </div>
  <button class="btn btn-primary">Create account</button>
</form>
{% endblock %}
