
{% extends 'base.html' %}
{% block content %}
<h2>Register</h2>
<form method="post" action="/auth/register" class="mt-3" style="max-width:520px" enctype="multipart/form-data">
  <div class="mb-3"><label>Full name</label><input name="full_name" maxlength="100" class="form-control" required /></div>
  <div class="mb-3"><label>Email</label><input name="email" type="email" class="form-control" required /></div>
  <div class="mb-3"><label>Password</label><input name="password" type="password" class="form-control" required /></div>
  <button class="btn btn-primary">Create account</button>
</form>
{% endblock %}
