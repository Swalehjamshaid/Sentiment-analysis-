<!-- filename: app/templates/register.html -->
{% extends 'base.html' %}
{% block content %}
<h2>Register</h2>
<form method="post" action="/auth/register" class="mt-3" style="max-width:480px">
  <div class="mb-3">
    <label>Full name</label>
    <input name="full_name" type="text" maxlength="100" class="form-control" required />
  </div>
  <div class="mb-3">
    <label>Email</label>
    <input name="email" type="email" class="form-control" required />
  </div>
  <div class="mb-3">
    <label>Password</label>
    <input name="password" type="password" class="form-control" required />
    <div class="form-text">Min 8 chars with upper, lower, number, special char.</div>
  </div>
  <button class="btn btn-primary">Create account</button>
</form>
{% endblock %}
