<!-- filename: app/templates/register.html -->
{% extends "base.html" %}
{% block title %}Sign Up | Review Intel AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white shadow-lg rounded-lg p-6">
    <h1 class="text-2xl font-bold text-center text-indigo-600 mb-6">Create Account</h1>

    <!-- Success Message -->
    {% if success %}
    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
        {{ success }}
    </div>
    {% endif %}

    <!-- Error Message -->
    {% if error %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <form action="/api/auth/register" method="post" class="space-y-4">
        <!-- Full Name -->
        <div>
            <label for="name" class="block text-gray-700 font-medium mb-1">Full Name</label>
            <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="John Doe"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <!-- Email Address -->
        <div>
            <label for="email" class="block text-gray-700 font-medium mb-1">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="you@example.com"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-gray-700 font-medium mb-1">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="********"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <!-- Confirm Password -->
        <div>
            <label for="confirm_password" class="block text-gray-700 font-medium mb-1">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
                placeholder="********"
                class="w-full border-gray-300 rounded-lg shadow-sm focus:ring-indigo-500 focus:border-indigo-500 px-3 py-2"
            >
        </div>

        <!-- Submit Button -->
        <div>
            <button
                type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-medium"
            >
                Create Account
            </button>
        </div>
    </form>

    <p class="mt-6 text-center text-gray-500 text-sm">
        Already have an account? 
        <a href="/login" class="text-indigo-500 hover:underline">Log in</a>
    </p>
</div>
{% endblock %}
