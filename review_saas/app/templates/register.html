<!-- filename: review_saas/app/templates/register.html -->
{% extends "base.html" %}
{% block title %}Register • ReviewSaaS{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card card-glass p-4">
      <h1 class="h4 mb-3">Create your account</h1>
      <form method="post" action="/register" novalidate>
        {{ csrf_token() }}
        <div class="mb-3">
          <label for="name" class="form-label">Name (optional)</label>
          <input id="name" name="name" type="text" class="form-control">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" name="email" type="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" class="form-control" minlength="6" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Register</button>
      </form>
      <p class="mt-3 mb-0 small">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
