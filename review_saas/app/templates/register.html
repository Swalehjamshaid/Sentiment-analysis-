
<!-- filename: app/templates/register.html -->
<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — ReviewSaaS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="bg-light"><div class="container py-5">
<div class="row justify-content-center"><div class="col-md-6">
  <div class="card shadow-sm"><div class="card-body">
    <h4>Create your account</h4>
    <form method="post" action="/register" enctype="multipart/form-data">
      <div class="mb-3"><label class="form-label">Full Name</label><input class="form-control" name="name" required></div>
      <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
      <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required><div class="form-text">Min 8 chars, include upper/lower/number/special</div></div>
      <div class="mb-3"><label class="form-label">Profile picture (optional)</label><input class="form-control" type="file" name="profile_pic" accept="image/*"></div>
      <button class="btn btn-primary w-100">Register</button>
      <div class="text-center small mt-2">Already have an account? <a href="/login">Login</a></div>
    </form>
  </div></div>
</div></div>
</body></html>
