<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | {{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #4338ca, transparent),
                        radial-gradient(circle at bottom left, #6d28d9, transparent),
                        #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body class="p-6">

<div class="w-full max-w-md">
    <div class="glass-panel rounded-3xl p-8 md:p-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4">
                <i class="fas fa-rocket text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-white tracking-tight">Get Started</h1>
            <p class="text-indigo-200/50 text-sm mt-1">Create your account for {{ title }}</p>
        </div>

        {% if msg %}
        <div class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl flex items-center text-emerald-400 animate-pulse">
            <i class="fas fa-check-circle mr-3"></i>
            <span class="text-sm font-medium">{{ msg }}</span>
        </div>
        {% endif %}

        {% if error %}
        <div class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl flex items-center text-rose-400">
            <i class="fas fa-exclamation-circle mr-3"></i>
            <span class="text-sm font-medium">{{ error }}</span>
        </div>
        {% endif %}

        <form action="/register" method="POST" class="space-y-5">
            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Full Name</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-indigo-300/30 group-focus-within:text-indigo-400">
                        <i class="fas fa-user text-sm"></i>
                    </span>
                    <input type="text" name="full_name" required
                        class="input-field block w-full pl-11 pr-4 py-3.5 rounded-2xl text-white placeholder-indigo-300/20 focus:outline-none"
                        placeholder="Huda Ahmed">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Email Address</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-indigo-300/30 group-focus-within:text-indigo-400">
                        <i class="fas fa-envelope text-sm"></i>
                    </span>
                    <input type="email" name="email" required
                        class="input-field block w-full pl-11 pr-4 py-3.5 rounded-2xl text-white placeholder-indigo-300/20 focus:outline-none"
                        placeholder="huda@example.com">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-bold text-indigo-300 uppercase tracking-wider ml-1">Password</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-indigo-300/30 group-focus-within:text-indigo-400">
                        <i class="fas fa-lock text-sm"></i>
                    </span>
                    <input type="password" name="password" required
                        class="input-field block w-full pl-11 pr-4 py-3.5 rounded-2xl text-white placeholder-indigo-300/20 focus:outline-none"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-lg shadow-indigo-900/20 transition-all transform active:scale-[0.98] mt-4">
                Sign Up
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-indigo-200/40 text-sm">
                Already have an account? 
                <a href="/login" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors ml-1">Log in</a>
            </p>
        </div>
    </div>
    
    <div class="mt-8 flex items-center justify-center space-x-4 opacity-20">
        <i class="fas fa-shield-halved text-white text-xs"></i>
        <span class="text-white text-[10px] uppercase tracking-widest font-bold">Encrypted Connection</span>
    </div>
</div>

</body>
</html>
